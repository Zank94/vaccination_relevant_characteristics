---
label: Inne czynniki ryzyka poważnego zakażenia pneumokokowego (dzieci)
description: |-
  Grupy dzieci o wysokim ryzyku inwazyjnego zakażenia pneumokokami to :
  - Zakażenie ludzkim wirusem niedoboru odporności (HIV)
  - Choroba sierpowatokrwinkowa, czynnościowa lub anatomiczna asplenia
  Uszkodzenie/przetoka bariery mózgowo-rdzeniowej
  - Implant ślimakowy
  - Choroby przewlekłe, takie jak choroby układu krążenia, choroby płuc (z wyjątkiem astmy), choroby wątroby, zespół nerczycowy, cukrzyca
  - Konstytucjonalne niedobory odporności (w tym niedobory dopełniacza i properdyny) lub wtórne do leczenia immunosupresyjnego (chłoniaki, białaczki, nowotwory, przeszczepy narządów)
  - Wcześniaki z wiekiem ciążowym poniżej 32 tygodni i niemowlęta z masą urodzeniową poniżej 1500 g są narażone na wysokie ryzyko inwazyjnego zakażenia pneumokokami, tymczasowo do 24 miesiąca życia.
