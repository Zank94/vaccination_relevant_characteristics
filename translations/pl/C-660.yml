label: Stażysta ochotniczej służby wojskowej (SMV)
description: SMV to wojskowy program integracji społeczno-zawodowej dla młodych ludzi we Francji kontynentalnej w wieku od 18 do 25 lat z trudnościami edukacyjnymi i/lub społecznymi. Przez rok wolontariusze będą mieszkać w szkole z internatem o statusie wojskowym. Nadzór wojskowy pomoże im nabyć umiejętności życiowe, co z kolei ułatwi zdobycie profesjonalnego know-how. Ostatecznym celem jest zwiększenie ich szans na zatrudnienie w zawodach, których brakuje w ich regionie.
