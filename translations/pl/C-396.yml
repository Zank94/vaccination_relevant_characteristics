label: Dodatni wynik badania serologicznego w kierunku wirusowego zapalenia wątroby typu A
description: Serologia ta polega na wykrywaniu obecności całkowitych przeciwciał (IgG i IgM) przeciwko wirusowi zapalenia wątroby typu A (HAV). Dodatni wynik badania serologicznego wskazuje na wcześniejsze wystąpienie wirusowego zapalenia wątroby typu A. Wirusowe zapalenie wątroby typu A może wystąpić u dzieci bez objawów klinicznych. Osoby, które przeszły już wirusowe zapalenie wątroby typu A, są zdecydowanie chronione przed tą chorobą i szczepienie przeciwko wirusowemu zapaleniu wątroby typu A nie jest konieczne.
