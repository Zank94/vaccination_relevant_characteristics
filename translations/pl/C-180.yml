---
label: Psychomotoryk
description: Na podstawie zaleceń lekarskich psychomotoryk pomaga osobom cierpiącym na różne zaburzenia psychomotoryczne. Za pomocą technik relaksacyjnych, edukacji gestów, ekspresji ciała i plastycznej oraz poprzez działania związane z zabawą, rytmem i koordynacją, psychomotoryk stara się skorygować te trudności pochodzenia psychologicznego, które mogą napotkać dorośli lub dzieci. Terapeuci pracują głównie w szpitalach, ale mogą również prowadzić prywatną praktykę.
