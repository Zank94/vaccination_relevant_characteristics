label: Student - Asysta stomatologiczna
description: Zadaniem asystentki stomatologicznej jest wykonywanie czynności związanych z czyszczeniem i sterylizacją. Mogą one również pełnić rolę asystentek operacyjnych. Asystentki stomatologiczne są narażone na zakażenie wirusem zapalenia wątroby typu B, ponieważ obsługują ostre przedmioty po ich użyciu na pacjencie. W badaniu przeprowadzonym w latach 1995-2001 w Stanach Zjednoczonych 75% wypadków związanych z kontaktem z krwią miało miejsce w gabinetach dentystycznych.
