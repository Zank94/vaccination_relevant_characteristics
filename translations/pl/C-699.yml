label: Przebyta denga
description: Historia dengi jest definiowana przez istnienie udokumentowanych dowodów wcześniejszego zakażenia wirusem dengi, tj. potwierdzonych biologicznie w laboratorium (RT-PCR, antygenemia NS1, serologia IgM/IgG) LUB zdiagnozowanych klinicznie podczas epidemii dengi i odnotowanych w dokumencie medycznym (np. w karcie zdrowia).
