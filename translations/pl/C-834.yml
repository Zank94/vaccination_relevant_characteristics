label: Choroba sierpowatokrwinkowa leczona hydroksymocznikiem (Hydrea, Siklos)
description: "Niskie dawki hydroksymocznika są regularnie przepisywane osobom cierpiącym na anemię sierpowatokrwinkową w celu zapobiegania nawracającym bolesnym atakom naczyniowo-okluzyjnym, zarówno u dzieci w wieku powyżej dwóch lat, jak i u dorosłych cierpiących na objawową anemię sierpowatokrwinkową. W tym celu przepisywane są dwa leki: Hydrea i Siklos. Nie ma klinicznych dowodów na immunosupresję wywołaną niskimi dawkami hydroksymocznika u pacjentów z niedokrwistością sierpowatokrwinkową, a dostępne dane sugerują, że żywe szczepionki mogą być prawdopodobnie podawane pacjentom leczonym niskimi dawkami hydroksymocznika. Jednakże pozwolenie na dopuszczenie do obrotu produktu Hydrea, który jest stosowany poza wskazaniami u pacjentów z anemią sierpowatokrwinkową, zawiera przeciwwskazania do stosowania tego leku w skojarzeniu z żywymi atenuowanymi szczepionkami. Pozwolenie na dopuszczenie do obrotu produktu Siklos odradza jednoczesne stosowanie hydroksykarbamidu ze szczepionką zawierającą żywe wirusy. Określono w nim, że leczenie produktem Siklos i jednoczesna immunizacja szczepionkami zawierającymi żywe wirusy powinny być przeprowadzane tylko wtedy, gdy korzyści wyraźnie przewyższają potencjalne ryzyko."
