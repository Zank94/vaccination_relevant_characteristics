---
label: Choroba Brutona (agammaglobulinemia sprzężona z chromosomem X)
description: "Agammaglobulinemia sprzężona z chromosomem X objawia się nawracającymi infekcjami bakteryjnymi układu oddechowego i pokarmowego oraz predysponuje do ryzyka przewlekłych infekcji enterowirusowych. Częstość jej występowania wynosi około 1/200 000 urodzeń. Jest ona związana z brakiem produkcji immunoglobulin. Jest to choroba recesywna dziedziczna, sprzężona z chromosomem X. Choroba jest spowodowana mutacjami w genie kodującym kinazę tyrozynową Btk. Charakteryzuje się defektem w dojrzewaniu limfocytów B. Leczenie polega głównie na regularnym podawaniu immunoglobulin drogą dożylną lub podskórną (źródło: Orphanet)."
