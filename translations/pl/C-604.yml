---
label: Ryzyko narażenia na działanie czynników biologicznych
description: Dotyczy to w szczególności zawodów związanych z opieką zdrowotną (lekarze, farmaceuci, pielęgniarki, położne, dentyści itp.), albo w wyniku działalności związanej z czynnikami biologicznymi (przemysłowa produkcja szczepionek, laboratoria analiz medycznych, badania wirusologiczne itp.); lub w wyniku narażenia spowodowanego działalnością zawodową niezwiązaną z czynnikami biologicznymi (opieka zdrowotna nad ludźmi lub weterynaryjna, rolnictwo itp.). Ryzyko narażenia na czynniki biologiczne może wynikać z kontaktu z pacjentami, ciałami zmarłych osób lub produktami biologicznymi, zarówno bezpośrednio, w tym poprzez rozpylanie, jak i pośrednio, w szczególności podczas obsługi i transportu wyrobów medycznych, próbek biologicznych, bielizny lub zakaźnych odpadów medycznych. Lekarz medycyny pracy ocenia ryzyko narażenia indywidualnie, w zależności od charakterystyki stanowiska zajmowanego przez pracownika, i przepisuje niezbędne szczepienia.
