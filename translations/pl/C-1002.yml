---
label: Data ostatniego kontaktu z osobą zagrożoną ospą małpią
description: |-
  Istnieją dwie sytuacje ryzyka:
  - Każdy, kto miał niezabezpieczony bezpośredni kontakt fizyczny z uszkodzoną skórą lub płynami biologicznymi prawdopodobnego lub potwierdzonego przypadku objawowego, w dowolnych okolicznościach, w tym podczas stosunku płciowego, opieki medycznej lub paramedycznej, wspólnego korzystania z przyborów toaletowych lub kontaktu z tekstyliami (odzież, bielizna kąpielowa, pościel) lub brudnymi naczyniami używanymi przez prawdopodobny lub potwierdzony przypadek objawowy.
  - Każda osoba, która miała kontakt bez zabezpieczenia w promieniu 2 metrów od prawdopodobnego lub potwierdzonego przypadku objawowego przez okres 3 godzin (skumulowany w ciągu 24 godzin) (np. bliski przyjaciel, partner seksualny nawet w przypadku braku stosunku płciowego, osoby dzielące tę samą przestrzeń życiową bez żadnych intymnych powiązań, sąsiad w podróży na duże odległości, osoby korzystające z tego samego biura, opieki zdrowotnej lub higieny, tej samej klasy szkolnej, sali uniwersytetu, klubu sportowego do sportów kontaktowych, hal sportowych itp.)
