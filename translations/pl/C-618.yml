label: Odmowa szczepienia przeciwko meningokokom ACWY
description: "Często nazywana szczepionką przeciwko zapaleniu opon mózgowo-rdzeniowych, zapobiega poważnym infekcjom (zapaleniu opon mózgowo-rdzeniowych lub posocznicy) wywoływanym przez meningokoki serogrupy A, C, W lub Y. We Francji sprzedawane są dwie szczepionki tego typu: szczepionka Menveo i szczepionka Nimenrix."
