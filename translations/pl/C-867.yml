label: Udowodniona historia COVID 19
description: Wymagany jest dowód biologiczny (RT-PCR lub test antygenowy). Pozytywny wynik testu serologicznego wskazuje na wcześniejszy kontakt z wirusem, jeśli został przeprowadzony przed lub w tym samym czasie co szczepienie. Należy również wypełnić sekcję dotyczącą testów biologicznych i porozmawiać z lekarzem.
