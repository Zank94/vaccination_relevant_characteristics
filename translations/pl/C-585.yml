label: Niedobór IgA
description: "Selektywny niedobór immunoglobuliny A jest pierwotnym (lub wrodzonym) niedoborem odporności; jest to najczęstszy pierwotny niedobór przeciwciał. Przy częstości występowania 1/325 osób na Zachodzie, nie jest to rzadka choroba. Z powodu częściowego lub całkowitego braku przeciwciał IgA, które odgrywają główną rolę w ochronie błon śluzowych przed infekcjami, osoby dotknięte chorobą cierpią na nawracające epizody infekcji dróg oddechowych lub żołądkowo-jelitowych. Mogą również mieć powszechny zmienny niedobór odporności, a częstość występowania zaburzeń autoimmunologicznych jest zwiększona. Etiologia selektywnego niedoboru immunoglobuliny A nie została wyjaśniona, ale rodzinne przekazywanie obserwowane w 20-25% przypadków sugeruje wpływ genetyczny. Nie ma sprecyzowanego leczenia tej choroby, ale infekcje muszą być skutecznie leczone. Pacjenci z selektywnym całkowitym niedoborem IgA powinni poinformować personel medyczny o swoim stanie ze względu na potencjalne ryzyko wystąpienia reakcji anafilaktycznej po przetoczeniu produktów krwiopochodnych. Źródło: Orphanet."
