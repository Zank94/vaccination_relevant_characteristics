label: Przewlekła niewydolność oddechowa
description: Przewlekła obturacyjna lub restrykcyjna niewydolność oddechowa, niezależnie od przyczyny, w tym choroby nerwowo-mięśniowe z ryzykiem dekompensacji oddechowej, wady rozwojowe górnych lub dolnych dróg oddechowych, wady rozwojowe płuc lub wady rozwojowe klatki piersiowej.
