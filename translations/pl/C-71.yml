label: Asystent ds. opieki
description: "Jako część zespołu opiekuńczego, opiekun/asysta opieki zdrowotnej pomaga pielęgniarce w codziennych czynnościach związanych z opieką. Przyczyniają się do dobrego samopoczucia pacjentów, pomagając im we wszystkich aspektach codziennego życia i pomagając im zachować niezależność. Pracując we współpracy z pielęgniarką i pod jej nadzorem, opiekunowie wykonują czynności związane z higieną i komfortem pacjentów: mycie, posiłki, ścielenie łóżek, witanie, układanie i przenoszenie pacjentów. Asystenci opieki zdrowotnej pracują zarówno w szpitalach, jak i klinikach."
