---
label: Toczeń rumieniowaty układowy
description: Toczeń rumieniowaty układowy jest chorobą przewlekłą o podłożu autoimmunologicznym, charakteryzującą się obecnością autoprzeciwciał (tj. skierowanych przeciwko własnemu organizmowi). Jest to choroba, która atakuje różne narządy, co wyjaśnia dużą różnorodność objawów. Najczęstszymi objawami są zmęczenie, gorączka, objawy skórne i stawowe. Najcięższe objawy są związane z uszkodzeniem nerek, zaburzeniami neurologicznymi, anemią lub niską liczbą płytek krwi.
