label: Długotrwała lub wysokodawkowa terapia kortykosteroidami
description: Kortykosteroidy są przeciwwskazaniem do podania żywej szczepionki w ciągu następnych trzech miesięcy. Po zaprzestaniu immunosupresyjnej terapii kortykosteroidami okres, w którym należy podać żywą szczepionkę, jest zmienny. Zapytaj swojego lekarza o radę, czy Twoje leczenie powinno być uznawane za przedłużoną terapię steroidową.
