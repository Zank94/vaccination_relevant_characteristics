label: Asystent ds. opieki nad dziećmi
description: Pracownicy działów opiekuńczo – wychowawczych w żłobkach i przedszkolach, prowadzą zajęcia wczesnej edukacji i opieki mające na celu zapewnienie dziecku dobrego samopoczucia, niezależności i rozwoju. Ich rola jest częścią kompleksowego podejścia, uwzględniającego relacyjny wymiar opieki i komunikacji z rodziną w ramach wsparcia rodzicielstwa. Biorą oni udział w opiece nad dziećmi i integracji społecznej dzieci z niepełnosprawnościami, przewlekle chorymi lub zagrożonymi wykluczeniem. Pracownicy Ci zazwyczaj pracują jako część wielozawodowego zespołu w placówkach opieki zdrowotnej lub społecznej, we współpracy z pielęgniarkami lub innymi pracownikami zajmującymi się opieką nad dziećmi i pod ich nadzorem.
