---
label: Farmaceuta
description: Farmaceuci są specjalistami w dziedzinie leków. Są odpowiedzialni za wydawanie leków przepisanych przez lekarza w szpitalu lub lokalnej aptece, sprawdzając, czy nie występują interakcje lub inne czynniki, które mogłyby wpłynąć na bezpieczeństwo lub skuteczność leczenia. Farmaceuci pełnią także inne role, na przykład w dziedzinie profilaktyki. Obecnie są uprawnieni do szczepienia dorosłych przeciwko grypie.
