---
label: Rozedma płuc
description: Rozedma płuc jest przewlekłą chorobą płuc charakteryzującą się rozszerzeniem pęcherzyków płucnych (małych pęcherzyków powietrza na końcach oskrzelików, w których zachodzi wymiana gazowa z krwiobiegiem) i zniszczeniem przegród oddzielających pęcherzyki płucne. Główną przyczyną jest palenie tytoniu.
