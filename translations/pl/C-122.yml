label: Osoba zakażona wirusem zapalenia wątroby typu B lub przewlekły nosiciel antygenu HBs w otoczeniu
description: Są to osoby zakażone wirusem zapalenia wątroby typu B (lub HBV) lub nosiciele antygenu HBs (marker biologiczny wskazujący na przewlekłe zakażenie HBV). Chodzi o osoby mieszkające w tym samym gospodarstwie domowym.
