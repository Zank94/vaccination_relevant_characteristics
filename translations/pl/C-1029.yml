label: Data przebytej dengi
description: "Historia dengi jest definiowana jako obecność udokumentowanego dowodu wcześniejszej infekcji wirusem dengi. Może to być potwierdzone biologicznie w laboratorium (np. za pomocą RT-PCR, antygenem NS1, serologią IgM/IgG) lub klinicznie zdiagnozowane podczas epidemii dengi i zapisane w dokumentacji medycznej (takiej jak historia zdrowia pacjenta).\r

  Jeśli historia dengi została zgłoszona po 6 miesiącach, podaj przybliżoną datę."
