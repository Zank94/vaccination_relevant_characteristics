---
label: Zespół hiper IgM
description: "Zespół ten charakteryzuje się hipogammaglobulinemią IgG i IgA z prawidłowym lub podwyższonym poziomem IgM. Można zidentyfikować kilka patologii, w tym:1) Sytuacje, którym towarzyszy niedobór odporności komórkowej: mutacja genu kodującego ligand CD40, cząsteczkę zaangażowaną w przełączanie izotypowe w centrum zarodkowym podczas stymulacji antygenowej; mutacja genu NEMO.2)Podobnie jak w przypadku innych hipogammaglobulinemii, infekcje są zdominowane przez infekcje dróg oddechowych i laryngologiczne wywołane przez bakterie otoczkowe (S. pneumoniae, Haemophilus), a rzadziej przez P. aeruginosa (pałeczka ropy błękitnej) jest izolowana w przypadkach rozstrzeni oskrzeli. Infekcje przewodu pokarmowego są powszechne, z wysoką częstością występowania giardiozy: Pneumocystis, Cryptosporidium odpowiedzialne za biegunkę i stwardniające zapalenie dróg żółciowych."
