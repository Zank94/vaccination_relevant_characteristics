---
label: Osoba z przedłużającymi się objawami COVID-19 (długi COVID)
description: Nie ma zgody co do definicji grupy pacjentów z przedłużającymi się objawami (czasami określanymi jako "covid long"). Są to osoby z objawami utrzymującymi się przez ponad 3, 4 lub nawet 12 tygodni po wystąpieniu zakażenia, a częstość występowania tych przedłużających się objawów różni się w zależności od badania, ale czasami przekracza 50%. Najczęściej zgłaszane przedłużające się objawy to zmęczenie, ból stawów, ból w klatce piersiowej, kołatanie serca, trudności w oddychaniu, pogorszenie funkcji poznawczych i obniżona jakość życia.
