label: Stan po usunięciu śledziony albo śledziona o upośledzonej czynności
description: "Zaznacz to pole, jeśli śledziona została usunięta podczas operacji (np. po urazie lub wypadku drogowym), lub jeśli działanie śledziony jest nieprawidłowe z powodu choroby (w przypadku wątpliwości, skonsultuj to z lekarzem). Synonim: Splenektomia, asplenia."
