label: Pracownik zakładu pogrzebowego powiązanego z placówką profilaktyczną lub opiekuńczą
description: Artykuł 1 http://www.legifrance.gouv.fr/affichTexte.do?cidTexte=LEGITEXT000020375184 dekretu z dnia 15 marca 1991 r. ustala listę zakładów lub publicznych lub prywatnych organizacji zajmujących się profilaktyką lub opieką, w których każda osoba narażona na ryzyko zakażenia musi zostać zaszczepiona przeciwko wirusowemu zapaleniu wątroby typu B, błonicy, tężcowi i poliomyelitis, gdy wykonuje działalność zawodową. Zakłady pogrzebowe są przyrównani do zakładów i organizacji wymienionych w art. 1, o ile biorą udział w działalności tych ostatnich.
