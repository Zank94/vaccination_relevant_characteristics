---
label: Noworodek matki z HBsAg
description: Antygen HBs (lub HBsAg) jest składnikiem wirusa zapalenia wątroby typu B. Nosicielstwo antygenu HBs oznacza, że jesteś nosicielem wirusa zapalenia wątroby typu B. Nosicielstwo antygenu może pozostać niezauważone i nie powodować żadnych objawów zapalenia wątroby typu B. Mimo to może być przyczyną infekcji u noworodków.
