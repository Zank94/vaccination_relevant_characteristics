---
label: Położna
description: Rolą położnej jest wspieranie kobiet w ciąży przez cały okres ciąży, od diagnozy do porodu. W szerszym zakresie zapewniają one również monitorowanie ginekologiczne. Ten trudny zawód wymaga zarówno umiejętności medycznych, jak i psychologicznych. Położne mogą również wykonywać szczepienia.
