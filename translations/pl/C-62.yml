---
label: Pielęgniarka
description: Pielęgniarki pracują w prywatnych gabinetach, ośrodkach zdrowia, szpitalach i świadczą usługi profilaktyczne. Pielęgniarki zapewniają opiekę zalecaną przez lekarzy i mogą same przepisywać niektóre procedury. Ryzyko narażenia na niektóre choroby zakaźne jest związane z warunkami pracy.
