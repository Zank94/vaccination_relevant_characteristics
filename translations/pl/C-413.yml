label: Inne leczenie immunosupresyjne
description: "Może obejmować terapie stosowaną u pacjentów z chorobami autoimmunologicznymi, przeszczepami narządów lub szpiku kostnego lub nowotworami (chemioterapia, radioterapia). Zabiegi te zmniejszają obronę immunologiczną i narażają pacjentów na zwiększone ryzyko infekcji, co może uzasadniać niektóre szczepienia. I odwrotnie, mogą one stanowić przeciwwskazanie do innych szczepień (w szczególności szczepionek żywych). Po zaprzestaniu leczenia immunosupresyjnego termin podania żywej szczepionki jest różny. Minimalny okres to trzy miesiące. Przykłady leczenia immunosupresyjnego (uwaga: lista nie jest kompletna): kortykosteroidy, metotreksat, cyklosporyna, takrolimus, azatiopryna lub cyklofosfamid."
