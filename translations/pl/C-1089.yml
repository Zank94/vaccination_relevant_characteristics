label: Narażenie na wirusa Mpox na obszarach endemicznych
description: Osoby podróżujące do obszarów geograficznych, w których częstość występowania zakażeń jest wysoka i gdzie narażenie na MPXV w bezpośrednim otoczeniu lub w trakcie pracy (np. kontakt z lokalną ludnością w ramach organizacji pozarządowej) może stanowić zwiększone ryzyko zakażenia.
