---
label: Niedobór komórek fagocytarnych (ziarniniak septyczny)
description: Jest to niespecyficzny niedobór odporności, dziedziczony recesywnie sprzężony z płcią. Objawia się w pierwszych miesiącach życia u chłopców poprzez infekcje różnymi zarazkami, bakteriami lub grzybami, wpływając na skórę, układ limfatyczny, drzewo oskrzelowo-płucne, wątrobę i śledzionę.
