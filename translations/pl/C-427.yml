---
label: Stwardnienie rozsiane
description: Stwardnienie rozsiane jest przewlekłą, autoimmunologiczną chorobą neurologiczną ośrodkowego układu nerwowego, która najczęściej występuje w postaci trudnych do przewidzenia ataków o różnym nasileniu. Zaczyna się średnio w wieku 30 lat (między 20 a 40 rokiem życia) i częściej dotyka kobiety.
