label: Asystent apteki, witający pacjentów
description: Specjalista ten jest bardzo dobrze zaznajomiony z lekami i sposobem ich stosowania. Podlegając farmaceucie, technik przygotowuje recepty lekarskie zgodnie ze standardami dawkowania i higieny. Zarządza również zapasami leków w aptece lub aptece szpitalnej.
