label: Przewlekła obturacyjna choroba płuc (POChP)
description: Przewlekła choroba obturacyjna płuc charakteryzuje się trwałym, niecałkowicie odwracalnym ograniczeniem przepływu powietrza przez drogi oddechowe, wynikającym z zapalenia oskrzeli oraz zniszczenia pęcherzyków płucnych. Na tę chorobę cierpi ok. 2 milionów osób w Polsce; ok. 100 000 pacjentów ma ciężkie postacie wymagające przewlekłej tlenoterapii domowej . W 2020 r. przewlekła obturacyjna choroba płuc była trzecią najczęstszą przyczyną zgonów na świecie i piątą najczęstszą chorobą pod względem niepełnosprawności. Najczęściej jest spowodowana paleniem. Typowe objawy to duszność (uczucie braku powietrza lub ciężaru w klatce piersiowej), początkowo wysiłkowa, w bardziej zawansowanych stanach także spoczynkowa, odkrztuszanie śluzowo-ropnej plwociny i przewlekły kaszel. W miarę postępu choroby codzienne czynności, takie jak wchodzenie po schodach lub przeniesienie walizki, mogą być utrudnione.
