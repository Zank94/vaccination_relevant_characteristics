label: Rodzina objęta CMU, CMUc lub AME
description: Couverture maladie universelle (CMU) to obowiązkowe ubezpieczenie zdrowotne dla osób mieszkających we Francji, które nie są jeszcze objęte innym systemem obowiązkowego ubezpieczenia zdrowotnego. Uzupełniające C.M.U. (CMUc) to dodatkowa forma ochrony (porównywalna do towarzystwa ubezpieczeń wzajemnych) przyznawana na podstawie kryterium dochodowego. Aide Médicale de l'Etat (AME) zapewnia dostęp do opieki zdrowotnej obcokrajowcom mieszkającym we Francji.
