---
label: Leczenie przeciwzakrzepowe
description: Leczenie przeciwzakrzepowe jest stosowane w celu rozrzedzenia krwi w niektórych chorobach żylnych (zakrzepica żył głębokich, zatorowość płucna) lub chorobach serca (w szczególności arytmii). Główne stosowane cząsteczki to fluidione (Previscan) i kumadyna (Sintron).
