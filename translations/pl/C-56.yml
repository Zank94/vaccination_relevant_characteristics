label: Lekarz
description: Jako główny specjalista w świecie zdrowia, lekarz bada, stawia diagnozę, zleca testy i przepisuje niezbędne leki lub leczenie szpitalne. Monitoruje pacjentów i zarządza ich ogólnym stanem zdrowia. Istnieją lekarze ogólni i lekarze specjalizujący się w określonej patologii.
