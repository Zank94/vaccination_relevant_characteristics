label: Wrodzona sinicza wada serca
description: Należy wskazać, jeśli wrodzona wada serca jest sinicza, czyli prowadzi do mieszania się krwi nieutlenionej z utlenioną, jeśli jest odpowiedzialna za nadciśnienie tętnicze płucne lub jeśli towarzyszy jej niewydolność serca. Wrodzone wady serca to wady rozwojowe, które powstały w okresie embrionalnym i są obecne od urodzenia W razie wątpliwości skonsultuj się z lekarzem w celu uzyskania dalszych informacji.
