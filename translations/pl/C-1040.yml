label: Anty-HAV Ac (IgG lub całkowita Ig w IU/L)
description: Serologia ta polega na wykrywaniu obecności całkowitych przeciwciał (IgG i IgM) przeciwko wirusowi zapalenia wątroby typu A (HAV). Dodatni wynik badania serologicznego przeprowadzonego przed szczepieniem (badanie serologiczne przed szczepieniem) wskazuje, że wirusowe zapalenie wątroby typu A już wystąpiło. Wirusowe zapalenie wątroby typu A może wystąpić u dzieci bez żadnych objawów klinicznych. Osoby, które przeszły wirusowe zapalenie wątroby typu A są definitywnie chronione przed tą chorobą, dlatego szczepienie przeciwko wirusowemu zapaleniu wątroby typu A nie jest konieczne. Badanie serologiczne na WZW typu A, przeprowadzone po szczepieniu, może być wykorzystane do sprawdzenia skuteczności szczepienia, szczególnie u osób z obniżoną odpornością. Próg dodatniego wyniku wynosi 20 IU/L.
