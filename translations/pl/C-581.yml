---
label: Ciężka przewlekła neutropenia
description: Pacjenci z przewlekłą neutropenią mają stały lub nawracający spadek liczby neutrofili poniżej 1500 na mm3, co czyni ich podatnymi na infekcje bakteryjne (gronkowce, paciorkowce, pałeczki Gram-ujemne) i grzybicze (kandydoza, aspergiloza układowa). Cierpią również na zapalenie dziąseł i jamy ustnej. Ciężka neutropenia jest definiowana jako liczba neutrofili mniejsza niż 500 mm3.
