---
label: Zakażenie wirusem HIV
description: Wirus HIV jest ludzkim wirusem niedoboru odporności. Atakuje on układ immunologiczny organizmu, prowadząc do niedoboru odporności i zwiększonego ryzyka infekcji wirusowych lub bakteryjnych. Znaczenie niedoboru zależy od wartości komórek odpornościowych zwanych komórkami CD4.
