label: Student ratownictwa medycznego
description: "Kierowcy karetek pogotowia pracują dla prywatnych firm transportu medycznego lub placówek opieki zdrowotnej, zapewniając opiekę i transport chorym i rannym, na podstawie zaleceń lekarskich lub w nagłych wypadkach, w specjalnie przystosowanych pojazdach transportu medycznego do celów leczniczych lub diagnostycznych. Kierowca karetki zna stany nagłe swoich pacjentów, dowiadując się o stopniu ciężkości stanu pacjentów i ich rodzajach ran od struktury, dla której pracuje: SAMU, szpitala, Czerwonego Krzyża itp. Jest do usług pacjentów, zapewniając im komfort, pomaga im podczas podróży, a nawet może interweniować w nagłych wypadkach, aby udzielić pierwszej pomocy. Kierowcy karetek są odpowiedzialni za utrzymanie swoich pojazdów i sterylizację sprzętu. Mogą również pomagać pacjentom w formalnościach związanych z wejściem i wyjściem z pojazdu."
