label: Inne choroby autoimmunologiczne
description: 'Choroby autoimmunologiczne to grupa chorób związanych z układem odpornościowym. Charakteryzują się one atakiem własnych komórek odpornościowych na organizm. Leczenie tego typu chorób ma na celu tłumienie nadreaktywnego układu odpornościowego i jest znane jako "leki immunosupresyjne". Przykłady: zespół Gougerota-Sjögrena, zapalenie skórno-mięśniowe, zapalenie wielomięśniowe'
