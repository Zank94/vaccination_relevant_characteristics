---
label: Niedobór podklas IgG
description: Immunoglobuliny typu G składają się z 4 podgrup zwanych podklasami IgG. Prawidłowa surowica zawiera mieszaninę czterech podklas IgG, z około 65% IgG1, 25% IgG2, 5% IgG3 i 2,5% IgG4, które mają specyficzne właściwości, na przykład IgG2 i IgG4 są odpowiedzialne za większość odpowiedzi immunologicznej przeciwko bakteriom otoczkowym (pneumokoki, Haemophilus influenzae typu b).Niedobór podklas IgG jest odpowiedzialny za nawracające infekcje (szczególnie górnych dróg oddechowych) i objawy autoimmunologiczne (zapalenie naczyń).
