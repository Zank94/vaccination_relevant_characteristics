label: Osoba kształcąca się na opiekuna medycznego
description: "Jako część zespołu opiekuńczego, opiekun/asystent opieki zdrowotnej pomaga pielęgniarce w codziennych czynnościach związanych z opieką. Pracując we współpracy z pielęgniarką i pod jej nadzorem, opiekun zapewnia pacjentom opiekę higieniczną i komfortową: mycie, posiłki, ścielenie łóżek, witanie, układanie i przenoszenie pacjentów itp. Przekazuje swoje spostrzeżenia w formie pisemnej i ustnej w celu zapewnienia ciągłości opieki. Biorą udział w organizowaniu zajęć dla osób przyjętych do ośrodków opieki i rehabilitacji. Mogą być zobowiązani do pracy w nocy, w weekendy i święta państwowe. Asystenci opieki zdrowotnej pracują zarówno w szpitalach, jak i klinikach."
