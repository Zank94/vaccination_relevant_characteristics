label: Przewlekła polipatologia
description: "Co najmniej dwa z następujących schorzeń: przewlekła obturacyjna choroba płuc, choroba nowotworowa (onkologiczna lub hematologiczna) aktywna lub z niedawno przebytą chemioterapią, cukrzyca, ciężka przewlekła choroba nerek (w tym wymagająca dializy), powikłane nadciśnienie tętnicze, otyłość (30 kg/m2), niewydolność serca, przewlekła niewydolność oddechowa, przeszczep narządu lub szpiku oraz trisomia 21, rzadka choroba (patrz lista w odpowiedniej sekcji)"
