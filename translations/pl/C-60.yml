label: Chirurg
description: Chirurdzy to lekarze praktykujący wysoce techniczną specjalizację. Wykonują fizyczne interwencje na tkankach ciała, naprawiają poważne urazy, korygują wady rozwojowe, leczą infekcje, usuwają chore narządy itp. Chirurdzy są zatem szczególnie narażeni na zakażenie krwi. Istnieje wiele specjalności chirurgicznych.
