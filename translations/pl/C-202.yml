label: Alergia na jajka
description: Alergia na białko jaja kurzego jest jedną z najczęstszych alergii pokarmowych u dzieci (od 1 do 3% dzieci w wieku poniżej 3 lat). Ponieważ zwykle zanika wraz z wiekiem, alergia ta jest znacznie mniej powszechna u dorosłych. Objawy alergii pojawiają się zwykle wkrótce po zjedzeniu jajek lub pokarmów zawierających jajka, zwłaszcza surowych lub niedogotowanych (domowy mus czekoladowy, gotowane jajka itp.). Najczęstsze objawy to zaczerwienienie i swędzenie wokół ust, obrzęk jamy ustnej lub gardła, pokrzywka, wymioty, dyskomfort, trudności w oddychaniu lub niskie ciśnienie krwi. Jeśli uważasz, że możesz być uczulony na białko jaja kurzego to skonsultuj się z lekarzem, jeśli jeszcze tego nie zrobiłeś. Alergia na białko jaja kurzego może prowadzić do przeciwwskazań lub środków ostrożności dotyczących stosowania niektórych szczepionek, które mogą zawierać śladowe ilości jaj.
