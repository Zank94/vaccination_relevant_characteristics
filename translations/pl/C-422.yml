label: Sekretarka medyczna, recepcjonistka
description: Sekretarka medyczna pomaga lekarzowi i jest pierwszym punktem kontaktu z pacjentem, przez telefon, gdy chce on umówić się na wizytę, lub gdy jest przyjmowany w gabinecie lekarskim lub na oddziale szpitalnym. Uspokaja pacjentów i odpowiada na ich pytania.
