---
label: Dysplazja oskrzelowo-płucna
description: Dysplazja szczególnie predysponuje do wystąpienia ciężkiego przebiegu grypy lub zakażeń pneumokokowych, jeśli była leczona w ciągu ostatnich sześciu miesięcy wentylacją mechaniczną lub długotrwałą terapią tlenową lub jest leczona w sposób ciągły kortykosteroidami, lekami rozszerzającymi oskrzela lub diuretykami. Dysplazja oskrzelowo-płucna jest jednym z najczęstszych powikłań wcześniactwa. Objawia się niewydolnością oddechową. Noworodki dotknięte tą chorobą są bardziej podatne na infekcje dróg oddechowych, które czasami mogą być bardzo poważne.
