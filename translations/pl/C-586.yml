---
label: Ciężki złożony niedobór odporności
description: "Ciężki złożony niedobór odporności (SCID) lub agammaglobulinemia z brakiem limfocytów jest zaburzeniem dziedziczonym autosomalnie recesywnie. Charakteryzuje się defektem różnicowania limfocytów T i B. Istnieje kilka form: niedobór białka RAG-1 lub RAG-2, niedobór białka Artemis, charakteryzujący się nadmierną wrażliwością komórek na promieniowanie jonizujące. U dzieci DICS objawia się od pierwszych miesięcy życia nawracającymi infekcjami bakteryjnymi lub wirusowymi (wirus cytomegalii, Pneumocistis carinii), ciężką biegunką oraz opóźnionym wzrostem i rozwojem. W podejrzanych przypadkach należy zabronić stosowania żywych szczepionek i transfuzji nienapromieniowanych produktów krwiopochodnych. Częstość występowania wynosi około 1/500 000 urodzeń. Leczenie polega na allogenicznym przeszczepie krwiotwórczych komórek macierzystych. Przedporodowa diagnoza SCID opiera się zasadniczo na identyfikacji braku różnych populacji limfocytów, a tym samym ich funkcji. Diagnoza ta jest stawiana w 20 tygodniu ciąży poprzez pobranie krwi płodu. W rodzinach, w których zidentyfikowano mutację w genie RAG lub w których ustalono związek genetyczny między chorobą a locus obecnym na chromosomie 10p, diagnozę przedporodową można postawić w 11 tygodniu ciąży przy użyciu biopsji trofoblastu. Źródło: Orphanet."
