---
label: Pracuje w pralni
description: Rozporządzenie z dnia 15 marca 1991 r. ustanawiające wykaz publicznych lub prywatnych placówek lub organizacji prewencyjnych lub opiekuńczych, w których narażony personel musi zostać zaszczepiony. Pralnie są traktowane w taki sam sposób jak publiczne lub prywatne placówki i organizacje profilaktyczne lub opiekuńcze wymienione w art. 1 niniejszego dekretu, o ile uczestniczą w działalności tych ostatnich.
