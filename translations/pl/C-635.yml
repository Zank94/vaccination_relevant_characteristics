---
label: Pacjent z niedoborem dopełniacza lub leczony Soliris® (ekulizumab) lub Ultomiris® (ravulizumab) w otoczeniu
description: Zaznacz to pole, jeśli osoba mieszkająca lub pozostająca pod opieką w tym samym gospodarstwie domowym ma niedobór dopełniacza (frakcja końcowa lub properdyna) lub jest leczona produktem Soliris®.Soliris® (ekulizumab) jest lekiem anty-C5, który hamuje działanie dopełniacza. Dopełniacz to grupa białek (C5 jest jednym z nich) o właściwościach przeciwbakteryjnych, które odgrywają ważną rolę w stanach zapalnych i odporności. Soliris® jest wskazany w leczeniu napadowej nocnej hemoglobinurii (PNH) i atypowego zespołu hemolityczno-mocznicowego (atypowy HUS). Pacjenci z niedoborem dopełniacza (wrodzonym niedoborem lub niedoborem związanym z leczeniem produktem Soliris®) są narażeni na pewne infekcje, dlatego też osoby z ich otoczenia podlegają zaleceniom dotyczącym szczepień.
