label: Obecność kobiety w ciąży w najbliższym otoczeniu nie zaszczepionej przeciwko krztuścowi
description: "Osoby, które powinny zaznaczyć to pole, to: małżonek i dzieci kobiety ciężarnej; każda osoba, która może mieć bliski i trwały kontakt z nienarodzonym dzieckiem w ciągu pierwszych 6 miesięcy (mogą to być dziadkowie, opiekunki do dzieci itp.). Ale tylko wtedy, gdy kobieta w ciąży nie została zaszczepiona przeciwko krztuścowi."
