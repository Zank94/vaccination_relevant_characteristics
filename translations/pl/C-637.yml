---
label: Blizna po szczepieniu BCG
description: Blizna ta jest zwykle zlokalizowana za mięśniem naramiennym, w miejscu, w którym zwykle wykonuje się śródskórne wstrzyknięcie BCG. Świadczy ona o podaniu szczepionki, która wywołuje odpowiedź immunologiczną przeciwko laseczce Kocha (laseczce odpowiedzialnej za gruźlicę). Więcej informacji na ten temat można uzyskać od lekarza.
