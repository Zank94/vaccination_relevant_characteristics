label: Postępująca twardzina uogólniona
description: Twardzina układowa to choroba, która przede wszystkim atakuje małe naczynia (tętniczki i naczynia włosowate) całego ciała i której towarzyszy uogólnione włóknienie. Dysfunkcje układu odpornościowego, w szczególności stany zapalne i autoimmunizacja odgrywają ważną rolę w tej chorobie. Dotknięte tkanki i narządy to skóra, płuca, przewód pokarmowy, nerki i serce.
