label: Krewni z obniżoną odpornością
description: Rodzina i przyjaciele osób z obniżoną odpornością są potencjalnym źródłem przenoszenia czynników zakaźnych drogą powietrzną lub skórną. W związku z niepewnością dotyczącą skuteczności szczepień u pacjentów z obniżoną odpornością oraz przeciwwskazaniami do stosowania żywych szczepionek u tych pacjentów, zdecydowanie zaleca się, aby w celu stworzenia "kręgu ochrony" sprawdzić status szczepień najbliższej rodziny i przyjaciół oraz dokonać wszelkich niezbędnych aktualizacji zgodnie z aktualnym harmonogramem szczepień. Najbliższe otoczenie definiuje się jako każdą osobę mieszkającą w tym samym gospodarstwie domowym lub mogącą zapewnić opiekę (opiekunka do dziecka, rodzina, opiekun itp.) oraz każdy personel medyczny, który może się nimi opiekować.
