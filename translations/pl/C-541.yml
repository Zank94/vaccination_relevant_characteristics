label: "Leczenie anty-C5: Soliris® (ekulizumab) lub Ultomiris® (ravulizumab)"
description: Soliris® (ekulizumab) jest lekiem anty-C5A, który hamuje działanie dopełniacza. Dopełniacz to grupa białek (C5A jest jednym z nich) o właściwościach przeciwbakteryjnych, które odgrywają ważną rolę w stanach zapalnych i odporności. Soliris® jest wskazany w leczeniu pacjentów (dzieci lub dorosłych) z napadową nocną hemoglobinurią (PNH) lub atypowym zespołem hemolityczno-mocznicowym (atypowy HUS). Ultomiris® (ravulizumab) jest wskazany do stosowania w leczeniu dorosłych pacjentów z PNH u pacjentów, u których występuje hemoliza z objawami klinicznymi wskazującymi na wysoką aktywność choroby oraz u pacjentów, którzy są stabilni klinicznie po leczeniu ekulizumabem przez co najmniej ostatnie 6 miesięcy.
