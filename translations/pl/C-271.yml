label: Niemowlęta w wieku poniżej 6 miesięcy, wcześniaki lub osoby cierpiące na choroby przewlekłe mieszkające z tą osobą
description: To znaczy, jeśli niemowlę ma mniej niż 6 miesięcy i występuje u niego jeden z następujących czynników ryzyka ciężkiego przebiegu grypy:przedwcześnie urodzone, zwłaszcza jeśli cierpi na następstwa chorób układu oddechowego, takie jak bronchodysplazja leczona w ciągu ostatnich sześciu miesięcy za pomocą wentylacji mechanicznej lub przedłużonej tlenoterapii, lub poddawane ciągłemu leczeniu farmakologicznemu (kortykosteroidami, lekami rozszerzającymi oskrzela lub lekami moczopędnymi), cierpi na chorobę serca, ma wrodzony niedobór odporności (tj. nabyty przy urodzeniu), cierpi na chorobę płuc, neurologiczną lub nerwowo-mięśniową, lub jest leczone z powodu długotrwałej choroby.W razie jakichkolwiek wątpliwości należy zasięgnąć porady lekarza. Termin otoczenie obejmuje środowisko rodzinne (osoby mieszkające w tym samym gospodarstwie domowym), nianię i wszystkie inne osoby, które mają regularny kontakt z dzieckiem.
