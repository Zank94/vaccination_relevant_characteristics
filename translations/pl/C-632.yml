label: Data ostatniej historii krztuśca
description: Musisz mieć pewność, że jest to krztusiec (potwierdzone testem biologicznym, skontaktuj się z lekarzem). Szacuje się, że osoba, która przeszła krztusiec, jest chroniona przed ponownym zakażeniem krztuścem przez około 10 lat. Jeśli to pole jest zaznaczone, szczepienie nie jest uważane za konieczne. Jeśli choroba wystąpiła przed ukończeniem drugiego roku życia, program szczepień jest kontynuowany w normalny sposób.
