---
label: Homozygotyczna choroba sierpowatokrwinkowa
description: "Niedokrwistość sierpowatokrwinkowa to krwinkowa niedokrwistość hemolityczna związana ze strukturalną nieprawidłowością hemoglobiny. Jest to choroba dziedziczna, która jest szeroko rozpowszechniona na całym świecie, głównie w Afryce równikowej, ale także w regionie Morza Śródziemnego, na Bliskim Wschodzie, kontynencie indyjskim i obszarach, na które migrują te populacje. Osoby heterozygotyczne są bezobjawowe i klinicznie zdrowe, a homozygoty są chore. Inne nieprawidłowości Hb mogą być związane z niedokrwistością sierpowatokrwinkową: HbC, talasemia (podwójne heterozygoty). Choroba charakteryzuje się ostrymi atakami niedrożności małych tętnic (ataki naczynio-niedrożnościowe) i jest powikłana hemolizą. Głównym objawem jest intensywny ból z towarzyszącą gorączką."
