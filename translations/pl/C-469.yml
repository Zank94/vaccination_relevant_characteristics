label: Guzkowe zapalenie tętnic
description: Guzkowe zapalenie tętnic to choroba spowodowana zapaleniem niektórych naczyń krwionośnych. Ten stan zapalny utrudnia przepływ krwi do różnych narządów, których funkcja może być upośledzona. Choroba dotyka wszystkie populacje i wszystkie grupy wiekowe, w tym dzieci, chociaż występuje częściej w wieku od 40 do 60 lat. Najczęściej dotkniętymi narządami są skóra, nerki, układ nerwowy, mięśnie, przewód pokarmowy i serce. Najczęstszymi objawami są szybka utrata masy ciała, silne zmęczenie, ból mięśni i gorączka.Leczenie. Chorobę można wyleczyć w średnio w dwóch na trzy przypadki.
