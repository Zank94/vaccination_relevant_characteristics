---
label: Chirurg stomatolog
description: Chirurg stomatologiczny zajmuje się jamą ustną, zębami, dziąsłami i kośćmi szczęki. Łagodzi, naprawia, a także dba o estetykę uśmiechu. Leczy ubytki i poważniejsze infekcje jamy ustnej. Dopasowuje protezy zębowe. Chirurg stomatolog może być narażony na kontakt z krwią lub innymi płynami biologicznymi.
