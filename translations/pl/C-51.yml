label: Dorośli, którzy prawdopodobnie zostaną rodzicami w nadchodzących miesiącach lub latach
description: Są to osoby dorosłe, które prawdopodobnie zostaną rodzicami w nadchodzących miesiącach lub latach, w tym w drodze adopcji. Pytanie brzmi, czy należy zastosować strategię kokonowania, która polega na ochronie rodziców, aby zapobiec zakażeniu niemowląt bakteriami odpowiedzialnymi za krztusiec, bardzo poważną chorobę u bardzo małych dzieci. Pojawia się również pytanie, czy szczepienie przeciwko ospie wietrznej powinno być zalecane przyszłym matkom.
