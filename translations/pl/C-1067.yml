label: Bliski i długotrwały kontakt z lokalną ludnością
description: |-
  Pytanie to jest zadawane, ponieważ bliski i długotrwały kontakt z miejscową ludnością może sprzyjać przenoszeniu meningokoków. Meningokoki znajdują się w gardłach niektórych osób zwanych "nosicielami meningokoków". Przenoszenie meningokoków z jednego nosiciela na drugiego za pośrednictwem kropelek śliny (które mogą następnie wywołać zapalenie opon mózgowych) jest ułatwione przez : 
  - Bliski kontakt, tj. w odległości mniejszej niż 1 metr (kropelki śliny są dość ciężkie i szybko opadają);
   - Częsty lub długotrwały kontakt (np. ponad godzinę). 
  Przykłady sytuacji wysokiego ryzyka podczas pobytu: pobyt u miejscowych, chodzenie do klubów nocnych, długie lub zatłoczone podróże, uprawianie sportów kontaktowych, praktyki zawodowe w szkołach, szkoły z internatem itp.
