label: Osoba wykazująca objawy COVID-19 z pozytywnym wynikiem testu RT-PCR
description: "Covid-19 może objawiać się nagłym wystąpieniem jednego lub więcej z następujących objawów: objawy infekcyjne (gorączka lub uczucie gorączki, dreszcze), kaszel lub dyskomfort w oddychaniu, niewyjaśnione zmęczenie, niewyjaśnione bóle, bóle głowy inne niż znana migrena, utrata lub zmniejszenie węchu i smaku.U osób w wieku powyżej 80 lat sugerujące są inne objawy: pogorszenie ogólnego stanu zdrowia, powtarzające się upadki, pojawienie się lub pogorszenie problemów poznawczych, dezorientacja, biegunka, pogorszenie przewlekłej choroby itp. Rozpoznanie COVID 19 w ostrej fazie opiera się na wykryciu materiału genetycznego wirusa w próbce pobranej z nosogardzieli lub jamy nosowo-gardłowej za pomocą wymazu (test RT-PCR)."
