---
label: Pospolity zmienny niedobór odporności (CVID)
description: Pospolity zmienny niedobór odporności (CVID) to heterogenna grupa chorób charakteryzująca się hipogammaglobulinemią o nieznanej przyczynie z upośledzoną produkcją swoistych przeciwciał po immunizacji, powodująca nawracające infekcje bakteryjne, zwykle przez bakterie otoczkowe. Częstość jej występowania szacuje się na 1:25 000 u osób pochodzenia europejskiego i dotyka ona zarówno mężczyzn, jak i kobiety.
