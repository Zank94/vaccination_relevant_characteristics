---
label: Adaptowany ochotnik do służby wojskowej (SMA)
description: SMA to program wojskowy mający na celu integrację społeczną i zawodową młodych ludzi w wieku od 18 do 25 lat we francuskich departamentach i terytoriach zamorskich, którzy są daleko od zatrudnienia. Przez rok wolontariusze będą mieszkać w szkole z internatem o statusie wojskowym. Nadzór wojskowy pomoże im nabyć umiejętności życiowe, co z kolei ułatwi zdobycie profesjonalnego know-how. Ostatecznym celem jest zwiększenie ich szans na zatrudnienie w zawodach, których brakuje w ich regionie.
