label: Kierowca karetki
description: "Kierowcy karetek pogotowia pracują dla prywatnych firm transportowych lub placówek służby zdrowia. Na podstawie zaleceń lekarskich lub w nagłych przypadkach przejmują opiekę nad chorymi i rannymi oraz przewożą ich specjalnie przystosowanymi pojazdami transportu medycznego. Uzyskują informacje na temat stopnia ciężkości stanu pacjentów i rodzaju odniesionych przez nich obrażeń od struktury, dla której pracują: SAMU, szpitala, Czerwonego Krzyża itp. Służą pacjentom, zapewniając im komfort, wygodę podczas podróży, a nawet mogą interweniować w nagłych wypadkach, aby udzielić pierwszej pomocy. Kierowcy karetek są odpowiedzialni za utrzymanie swoich pojazdów i sterylizację sprzętu. Mogą również pomagać pacjentom w formalnościach związanych z wejściem i wyjściem z pojazdu."
