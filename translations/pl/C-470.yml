---
label: Choroba reumatyczna
description: Choroby reumatyczne, potocznie nazywane reumatyzmem, to grupa schorzeń, w których dochodzi do przewlekłego zapalenia tkanki łącznej. Tkanka łączna występuje w całym ciele, w tym w stawach, mięśniach, kościach, skórze i naczyniach krwionośnych. W chorobach reumatycznych układ odpornościowy, zamiast chronić organizm, atakuje własne tkanki, powodując stan zapalny i uszkodzenia.
