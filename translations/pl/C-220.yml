label: Student kierunku Asystent opieki nad dziećmi
description: Asystent opieki nad dzieckiem prowadzi zajęcia wczesnej edukacji i opieki mające na celu zapewnienie dziecku dobrego samopoczucia, niezależności i rozwoju. Ich rola jest częścią kompleksowego podejścia, uwzględniającego relacyjny wymiar opieki i komunikacji z rodziną w ramach wsparcia rodzicielstwa. Asystenci opieki nad dziećmi biorą udział w opiece nad dziećmi i integracji społecznej dzieci z niepełnosprawnościami, przewlekle chorych lub zagrożonych wykluczeniem. Asystenci zazwyczaj pracują jako część wielozawodowego zespołu w placówkach opieki zdrowotnej lub społecznej, we współpracy z pielęgniarkami lub pracownikami placówek opieki nad dziećmi i pod ich nadzorem.
