label: Poważna reakcja anafilaktyczna na szczepionkę, lek lub żywność w wywiadzie
description: "Anafilaksja jest najbardziej spektakularną i niebezpieczną formą alergii, z potencjalnie śmiertelnym skutkiem. Może przybierać różne formy kliniczne, wpływając na jeden lub więcej narządów z różnym nasileniem: pokrzywka (wysypka podobna do użądlenia pokrzywy), obrzęk twarzy i obrzęk naczynioruchowy (skurcz krtani), trudności w oddychaniu, atak astmy (skurcz oskrzeli), objawy trawienne (ból brzucha, nudności, wymioty, biegunka), złe samopoczucie (bladość, uczucie zbliżającej się śmierci, spadek ciśnienia krwi), utrata przytomności, a nawet śpiączka.Objawy zwykle pojawiają się bardzo szybko, w ciągu kilku minut od kontaktu z alergenem. W około 10% przypadków druga reakcja występuje kilka godzin po pierwszej reakcji: jest to tak zwana anafilaksja dwufazowa, zjawisko, które uzasadnia hospitalizację w celu monitorowania po zaobserwowaniu anafilaksji. anafilaksja jest spowodowana niewłaściwą aktywacją komórek układu odpornościowego, komórek tucznych w tkankach i bazofilów we krwi, powodując masowe uwalnianie histaminy w ciągu kilku sekund/minut, cząsteczki, która powoduje objawy."
