---
label: Plamica małopłytkowa
description: Plamica małopłytkowa odpowiada spadkowi liczby płytek krwi prowadzącemu do niewielkich powierzchownych krwawień na skórze zwanych plamicą. Spadek liczby płytek krwi jest wykrywany w badaniu krwi. W niektórych przypadkach znaczny spadek liczby płytek krwi może prowadzić do krwotoków (krwawienia z nosa, jamy ustnej, krwiaki itp.)
