---
label: Bioterapia powodująca immunosupresję
description: Bioterapie są skierowane przeciwko konkretnemu celowi immunologicznemu. Najczęściej stosowane są anty-TNF i anty-IL-1. Są one wskazane w reumatyzmie zapalnym i chorobach autoimmunologicznych. Terapie anty-TNF są obecnie lekami referencyjnymi w leczeniu ciężkich i aktywnych postaci reumatoidalnego zapalenia stawów i spondyloartropatii. Przykłady stosowanych leków to infliksymab (Inflectra®, Remicade®, Remsima®), adalimumab (Humira®, Trudexa®), etanercept (Enbrel®), anakinra (Kineret®), rytuksymab (MabThera®), abatacept (Orencia®) i brodalumab (Kyntheum®). Po zaprzestaniu bioterapii termin podania żywej szczepionki jest różny. Minimum to trzy miesiące (sześć miesięcy po leczeniu rytuksymabem).
