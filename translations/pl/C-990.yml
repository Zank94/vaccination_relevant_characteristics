---
label: Test na obecność przeciwciał przeciwtężcowych (IU/L)
description: Ten test powinien być przeprowadzony między 4 a 8 tygodniem po podaniu dawki szczepionki zawierającej komponent tężcowy w połączeniu z innymi składnikami. Wysoka wartość wskazuje na istnienie efektu przypominającego i oznacza, że osoba została już zaszczepiona.
