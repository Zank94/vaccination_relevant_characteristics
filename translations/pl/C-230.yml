label: Student technik analizy biomedycznej
description: "Technik biologii medycznej jest odpowiedzialny za przeprowadzanie testów biologii medycznej, umożliwiając lekarzowi potwierdzenie diagnozy lub wykrycie choroby. Na podstawie zaleceń lekarskich przeprowadza testy, szukając wszelkich nieprawidłowości we krwi lub płynach ustrojowych pobranych przez lekarza, pobierając próbki krwi i przygotowując przyrządy i produkty do użycia. Po przeprowadzeniu testu wyniki są przesyłane do odpowiedzialnego biologa, który jest odpowiedzialny za ich zatwierdzenie i interpretację. Jest również odpowiedzialny za konserwację i sprawdzanie sprzętu. Praca ta może być wykonywana w szpitalu, klinice lub w mieście. W środowisku szpitalnym specjalista ten może być zobowiązany do zapewnienia terapeutycznych działań następczych w stosunku do pacjentów i zespołu opieki, a także może być zaangażowany w wysoce specjalistyczne badania. Podczas pracy w prywatnym laboratorium w mieście technik analizy biologii medycznej wykonuje różne zadania: pobieranie próbek, rejestrowanie i przesyłanie wyników. Ich praca wymaga wielu umiejętności i może obejmować kilka obszarów biologii medycznej: hematologię, biochemię, mikrobiologię, immunologię itp."
