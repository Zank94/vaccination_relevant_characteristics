label: Niedawny kontakt z przypadkiem COVID-19
description: 'Niedawny kontakt: ostatni kontakt w ciągu ostatnich 10 dni. Osoba narażona na kontakt to osoba, która przy braku skutecznych środków ochronnych na czas trwania kontaktu dzieliła tę samą przestrzeń życiową z potwierdzonym lub prawdopodobnym przypadkiem; miała bezpośredni kontakt twarzą w twarz z przypadkiem, w odległości mniejszej niż jeden metr, przez dowolny czas (np. rozmowa, posiłki, flirt, uściski, pocałunki). Jednak osoby napotkane przelotnie w przestrzeni publicznej nie są uważane za osoby narażone na ryzyko kontaktu;zapewniał lub otrzymywał higienę lub opiekę;dzielił zamkniętą przestrzeń (biuro lub salę konferencyjną, pojazd osobisty itp.) przez co najmniej 15 kolejnych lub skumulowanych minut w ciągu 24 godzin z przypadkiem lub był twarzą w twarz z przypadkiem podczas kilku epizodów kaszlu lub kichania;jest uczniem lub nauczycielem w tej samej klasie szkolnej (przedszkole, szkoła podstawowa, średnia, grupa nauczycieli akademickich).Przestrzeń zamknięta to taka, w której nie można spełnić kryterium dystansu społecznego, tj. minimalnej odległości 2 metrów wokół osoby. Wreszcie, następujące środki nie są uważane za skuteczne środki ochronne: arkusz pleksiglasu umieszczony na ladzie, "domowe" maski z tkaniny i przezroczyste plastikowe przyłbice noszone samodzielnie.'
