---
label: Σοβαρή συνδυασμένη ανοσοανεπάρκεια
description: "Η σοβαρή συνδυασμένη ανοσοανεπάρκεια (SCID) ή η αγαμμασφαιριναιμία τύπου αλμφοκυττάρωσης είναι μια κληρονομική διαταραχή με αυτοσωμική υπολειπόμενη κληρονομικότητα. Χαρακτηρίζεται από ελάττωμα στη διαφοροποίηση των Τ και Β λεμφοκυττάρων. Υπάρχουν διάφορες μορφές: ανεπάρκεια της πρωτεΐνης RAG-1 ή RAG-2, ανεπάρκεια της πρωτεΐνης Artemis, που χαρακτηρίζεται από υπερβολική ευαισθησία των κυττάρων στην ιονίζουσα ακτινοβολία. Στα παιδιά, η DICS εκδηλώνεται από τους πρώτους μήνες της ζωής με υποτροπιάζουσες βακτηριακές ή ιογενείς λοιμώξεις (κυτταρομεγαλοϊός, Pneumocistis carinii), σοβαρή διάρροια και καθυστέρηση της αύξησης και της ανάπτυξης. Η χρήση ζωντανών εμβολίων και η μετάγγιση μη ακτινοβολημένων προϊόντων αίματος πρέπει να απαγορεύεται σε ύποπτες περιπτώσεις. Η επίπτωση είναι περίπου 1/500.000 γεννήσεις. Η θεραπεία συνίσταται σε αλλογενείς μεταμοσχεύσεις αιμοποιητικών βλαστικών κυττάρων. Η προγεννητική διάγνωση του SCID βασίζεται ουσιαστικά στον εντοπισμό της απουσίας διαφόρων πληθυσμών λεμφοκυττάρων και, συνεπώς, της λειτουργίας τους. Η διάγνωση αυτή γίνεται κατά την 20ή εβδομάδα κύησης με δειγματοληψία εμβρυϊκού αίματος. Σε οικογένειες όπου έχει εντοπιστεί μετάλλαξη στο γονίδιο RAG ή όπου έχει διαπιστωθεί η γενετική σχέση μεταξύ της νόσου και του τόπου που υπάρχει στο χρωμόσωμα 10p, η προγεννητική διάγνωση μπορεί να γίνει στις 11 εβδομάδες κύησης με βιοψία τροφοβλάστης. Πηγή: Orphanet."
