---
label: Εργάζεται σε μονάδα προσχολικής φροντίδας παιδιών (βρεφονηπιακός σταθμός, κέντρο φιλοξενίας κ.λπ.)
description: Ιδρύματα, υπηρεσίες και κέντρα για παιδιά κάτω των έξι ετών- αναφέρονται στο άρθρο L.2324-1 του κώδικα δημόσιας υγείας. Διάταγμα της 15ης Μαρτίου 1991 για την κατάρτιση του καταλόγου των δημόσιων ή ιδιωτικών εγκαταστάσεων ή οργανισμών πρόληψης ή περίθαλψης στους οποίους το εκτεθειμένο προσωπικό πρέπει να είναι εμβολιασμένο.
