---
label: Ανεπάρκεια υποκατηγορίας IgG
description: Οι ανοσοσφαιρίνες τύπου G αποτελούνται από 4 υποομάδες που ονομάζονται υποκατηγορίες IgG. Ο φυσιολογικός ορός περιέχει ένα μείγμα των τεσσάρων υποκατηγοριών IgG, με περίπου 65% IgG1, 25% IgG2, 5% IgG3 και 2,5% IgG4, οι οποίες έχουν συγκεκριμένες ιδιότητες, για παράδειγμα οι IgG2 και IgG4 είναι υπεύθυνες για την πλειονότητα της ανοσολογικής απάντησης έναντι των ενθυλακωμένων βακτηρίων (πνευμονιόκοκκος, Haemophilus influenzae τύπου b).Η ανεπάρκεια στις υποκατηγορίες IgG ευθύνεται για υποτροπιάζουσες λοιμώξεις (ιδίως των ανώτερων αεραγωγών) και αυτοάνοσες εκδηλώσεις (αγγειίτιδα).
