label: Ενσωμάτωση στην επιχειρησιακή εφεδρεία στην ηπειρωτική Γαλλία ή στο εξωτερικό
description: "Ένα άτομο που έχει εγγραφεί για να υπηρετήσει στην επιχειρησιακή εφεδρεία (ESR). Σε περίπτωση αποστολής OM-OPEX-Embarquement, το πρόγραμμα εμβολιασμού για το στρατιωτικό προσωπικό που αναπτύσσεται σε αποστολή OM-OPEX-Embarquement εφαρμόζεται στο προσωπικό της εφεδρείας. DROM: Γαλλικά υπερπόντια διαμερίσματα και περιοχές. COM: υπερπόντιες συλλογικότητες. POM: υπερπόντιες χώρες."
