---
label: Τεχνικός ιατρικής ηλεκτροακτινολογίας
description: Ο χειριστής ιατρικής ηλεκτροακτινολογίας είναι ένας επαγγελματίας υγείας που είναι ταυτόχρονα φροντιστής και τεχνικός. Στην ιατρική απεικόνιση, συμμετέχουν σε ιατρικές εξετάσεις (ακτινολογία, σαρωτής, μαγνητική τομογραφία, πυρηνική ιατρική, ηλεκτροφυσιολογία) με στόχο την καθιέρωση διάγνωσης.
