---
label: Ημερομηνία της τελευταίας επαφής με άτομο που κινδυνεύει από μαϊμούδες
description: |-
  Υπάρχουν δύο καταστάσεις που κινδυνεύουν:
  - Οποιοσδήποτε είχε απροστάτευτη άμεση σωματική επαφή με το τραυματισμένο δέρμα ή τα βιολογικά υγρά ενός πιθανού ή επιβεβαιωμένου συμπτωματικού κρούσματος, υπό οποιεσδήποτε συνθήκες, συμπεριλαμβανομένης της σεξουαλικής επαφής, της ιατρικής ή παραϊατρικής φροντίδας ή της κοινής χρήσης σκευών τουαλέτας ή της επαφής με υφάσματα (ρούχα, σεντόνια μπάνιου, κλινοσκεπάσματα) ή βρώμικα σκεύη που χρησιμοποιούνται από το πιθανό ή επιβεβαιωμένο συμπτωματικό κρούσμα.
  - Κάθε άτομο που είχε επαφή χωρίς προφυλάξεις σε απόσταση 2 μέτρων από πιθανό ή επιβεβαιωμένο συμπτωματικό κρούσμα για διάστημα 3 ωρών (συσσωρευμένο σε 24 ώρες) (π.χ. στενός ή οικείος φίλος, συνήθης σεξουαλικός σύντροφος ακόμη και χωρίς σεξουαλική επαφή, άτομα που μοιράζονται τον ίδιο χώρο διαβίωσης χωρίς καμία στενή σχέση, γείτονας σε μακρινό ταξίδι, άτομα που μοιράζονται το ίδιο γραφείο, διαδικασία υγειονομικής περίθαλψης ή υγιεινής, ίδια σχολική τάξη, αίθουσα TD του πανεπιστημίου, αθλητικό σωματείο για αθλήματα επαφής, αθλητικές αίθουσες κ.λπ.)
