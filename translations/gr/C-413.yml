---
label: Άλλη ανοσοκατασταλτική αγωγή
description: "Αυτές μπορεί να περιλαμβάνουν θεραπείες που χορηγούνται σε ασθενείς με αυτοάνοσα νοσήματα, μεταμοσχεύσεις οργάνων ή μυελού των οστών ή καρκίνο (χημειοθεραπεία, ακτινοθεραπεία). Αυτές οι θεραπείες μειώνουν την ανοσολογική άμυνα και εκθέτουν τους ασθενείς σε αυξημένο κίνδυνο μόλυνσης, γεγονός που μπορεί να δικαιολογεί ορισμένους εμβολιασμούς. Αντίθετα, μπορεί να αντενδείξουν άλλους εμβολιασμούς (ιδίως τα ζωντανά εμβόλια). Μόλις διακοπεί η ανοσοκατασταλτική θεραπεία, το χρονικό όριο για τη χορήγηση ζωντανού εμβολίου ποικίλλει. Το ελάχιστο όριο είναι τρεις μήνες. Παραδείγματα ανοσοκατασταλτικών θεραπειών (μη εξαντλητικός κατάλογος): κορτικοστεροειδή, μεθοτρεξάτη, κυκλοσπορίνη, τακρόλιμους, αζαθειοπρίνη ή κυκλοφωσφαμίδη."
