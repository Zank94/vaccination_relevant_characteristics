---
label: Εμφύσημα
description: Το εμφύσημα είναι μια χρόνια πνευμονοπάθεια που χαρακτηρίζεται από τη διάταση των πνευμονικών κυψελίδων (μικροί αεροφόροι σάκοι στο τέλος των τελικών βρογχιολίων, όπου γίνεται η ανταλλαγή αερίων με την κυκλοφορία του αίματος) και από την καταστροφή των διαχωριστικών διαφραγμάτων που χωρίζουν τις κυψελίδες. Το κάπνισμα είναι η κύρια αιτία.
