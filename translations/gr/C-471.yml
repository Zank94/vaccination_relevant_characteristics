---
label: Φλεγμονώδης νόσος του εντέρου
description: Η φλεγμονώδης νόσος του εντέρου (ΦΝΕ) είναι μια ομάδα γαστρεντερικών διαταραχών, συμπεριλαμβανομένης της νόσου του Crohn και της ελκώδους κολίτιδας, που χαρακτηρίζεται από επίμονη και υποτροπιάζουσα φλεγμονή του εντερικού βλεννογόνου. Η ΙΦΝΕ προκαλεί συμπτώματα όπως κοιλιακό άλγος, διάρροια και αιμορραγία από το ορθό και μπορεί να έχει σημαντικό αντίκτυπο στην ποιότητα ζωής των ασθενών. Η θεραπεία αποσκοπεί στον έλεγχο της φλεγμονής και στην ανακούφιση των συμπτωμάτων.
