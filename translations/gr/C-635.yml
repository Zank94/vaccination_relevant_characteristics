---
label: Ασθενής με ανεπάρκεια συμπληρώματος ή υπό αγωγή με Soliris® (eculizumab) ή Ultomiris® (ravulizumab) στο περιβάλλον
description: Σημειώστε αυτό το πλαίσιο εάν ένα άτομο που ζει ή φροντίζεται στο ίδιο νοικοκυριό έχει ανεπάρκεια συμπληρώματος (τελικό κλάσμα ή προπερδίνη) ή λαμβάνει θεραπεία με Soliris®.Το Soliris® (eculizumab) είναι μια θεραπεία κατά του C5 που αναστέλλει τη δράση του συμπληρώματος. Το συμπλήρωμα είναι μια ομάδα πρωτεϊνών (η C5 είναι μία από αυτές) με αντιβακτηριακές ιδιότητες, οι οποίες διαδραματίζουν σημαντικό ρόλο στη φλεγμονή και την ανοσία. Το Soliris® ενδείκνυται για τη θεραπεία της παροξυσμικής νυχτερινής αιμοσφαιρινουρίας (PNH) και του άτυπου αιμολυτικού ουραιμικού συνδρόμου (άτυπο HUS). Οι ασθενείς με ανεπάρκεια συμπληρώματος (συγγενής ανεπάρκεια ή ανεπάρκεια που συνδέεται με τη θεραπεία με Soliris®) διατρέχουν κίνδυνο ορισμένων λοιμώξεων, γι' αυτό και ισχύουν οι συστάσεις εμβολιασμού για τους γύρω τους.
