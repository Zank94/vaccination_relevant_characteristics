---
label: Ημερομηνία του τελευταίου ιστορικού κοκκύτη
description: Πρέπει να είστε βέβαιοι ότι έχετε κοκκύτη (που αποδεικνύεται με βιολογική εξέταση, την οποία πρέπει να ελέγξετε με τον γιατρό σας). Υπολογίζεται ότι ένα άτομο που έχει πάθει κοκκύτη προστατεύεται από μια νέα λοίμωξη από κοκκύτη για περίπου 10 χρόνια. Εάν η νόσος εκδηλώθηκε πριν από την ηλικία των δύο ετών, το πρόγραμμα εμβολιασμού συνεχίζεται κανονικά.
