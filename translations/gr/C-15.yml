label: Νεογέννητα από μητέρες που φέρουν αντιγόνο HBs
description: Το αντιγόνο HBs (ή HBsAg) είναι συστατικό του ιού της ηπατίτιδας Β. Η ύπαρξη του αντιγόνου HBs σημαίνει ότι ζείτε με τον ιό της ηπατίτιδας Β. Η μεταφορά του αντιγόνου μπορεί να περάσει απαρατήρητη και να μην προκαλέσει κανένα σημάδι ηπατίτιδας Β. Παρόλα αυτά, μπορεί να αποτελέσει την αιτία μόλυνσης στα νεογέννητα μωρά.
