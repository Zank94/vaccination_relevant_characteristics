---
label: Φλεγμονώδης ρευματισμός
description: Ο φλεγμονώδης ρευματισμός είναι ένας γενικός όρος για μια ομάδα χρόνιων ρευματικών παθήσεων που χαρακτηρίζονται από επίμονη φλεγμονή των αρθρώσεων και των συνδετικών ιστών. Αυτές οι παθήσεις είναι συχνά αυτοάνοσες, πράγμα που σημαίνει ότι το ανοσοποιητικό σύστημα επιτίθεται λανθασμένα στους ιστούς του ίδιου του σώματος, οδηγώντας σε φλεγμονή και βλάβη των αρθρώσεων. Συνήθη παραδείγματα φλεγμονωδών ρευματισμών είναι η ρευματοειδής αρθρίτιδα, η αγκυλοποιητική σπονδυλίτιδα και ο συστηματικός ερυθηματώδης λύκος. Τα τυπικά συμπτώματα περιλαμβάνουν πόνο στις αρθρώσεις, δυσκαμψία, πρήξιμο και κόπωση. Η θεραπεία αποσκοπεί στη μείωση της φλεγμονής, την ανακούφιση των συμπτωμάτων και την πρόληψη μόνιμης βλάβης των αρθρώσεων, συχνά με ανοσοκατασταλτικά φάρμακα.
