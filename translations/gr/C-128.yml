---
label: Βρογχοπνευμονική δυσπλασία
description: Η βρογχοπνευμονική δυσπλασία είναι μία από τις συχνότερες επιπλοκές της προωρότητας. Εκδηλώνεται ως αναπνευστική δυσχέρεια. Τα νεογέννητα με αυτή την πάθηση είναι πιο ευάλωτα σε λοιμώξεις του αναπνευστικού συστήματος, οι οποίες μπορεί μερικές φορές να είναι πολύ σοβαρές.
