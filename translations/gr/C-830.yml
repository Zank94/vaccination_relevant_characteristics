label: Σύνδρομο Hyper IgM
description: "Το σύνδρομο αυτό χαρακτηρίζεται από υπογαμμασφαιριναιμία των IgG και IgA με φυσιολογικά ή αυξημένα επίπεδα IgM. Μπορούν να εντοπιστούν διάφορες παθολογίες, όπως:1) Καταστάσεις που συνοδεύονται από ανεπάρκεια της κυτταρικής ανοσίας:μετάλλαξη του γονιδίου που κωδικοποιεί τον CD40 ligand, ένα μόριο που εμπλέκεται στην ισοτυπική εναλλαγή στο βλαστικό κέντρο κατά τη διάρκεια αντιγονικής διέγερσης,μετάλλαξη του γονιδίου NEMO.2)Όπως και με άλλες υπογαμμασφαιριναιμίες, οι λοιμώξεις κυριαρχούνται από λοιμώξεις του αναπνευστικού και της ΩΡΛ που προκαλούνται από ενθυλακωμένα βακτήρια (S. pneumoniae, Haemophilus) και σπανιότερα από πυογόνους. Η P. aeruginosa απομονώνεται σε περιπτώσεις βρογχικής διάτασης. Οι λοιμώξεις του πεπτικού συστήματος είναι συχνές, με υψηλό επιπολασμό της γκιαρδίασης: Pneumocystis, κρυπτοσπορίδια που ευθύνονται για διάρροια και σκληρυντική χολαγγειίτιδα."
