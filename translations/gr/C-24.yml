---
label: Λοίμωξη HIV
description: HIV σημαίνει ιός της ανθρώπινης ανοσοανεπάρκειας. Είναι ένας ιός που επιτίθεται στην ανοσολογική άμυνα του οργανισμού, οδηγώντας σε ανεπάρκεια ανοσίας και αυξημένο κίνδυνο ιογενών ή βακτηριακών λοιμώξεων. Η έκταση της ανεπάρκειας εξαρτάται από την αξία των κυττάρων του ανοσοποιητικού συστήματος που είναι γνωστά ως κύτταρα CD4.
