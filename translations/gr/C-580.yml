---
label: Ανεπάρκεια φαγοκυτταρικών κυττάρων (σηπτική κοκκιωμάτωση)
description: Πρόκειται για μια μη ειδική ανοσολογική ανεπάρκεια, η οποία μεταδίδεται με υπολειπόμενη κληρονομικότητα που συνδέεται με το φύλο. Εκδηλώνεται κατά τους πρώτους μήνες της ζωής, στα αγόρια, μέσω λοιμώξεων με διάφορα μικρόβια, βακτήρια ή μύκητες, προσβάλλοντας το δέρμα, το λεμφικό σύστημα, το βρογχοπνευμονικό δέντρο, το ήπαρ και τον σπλήνα.
