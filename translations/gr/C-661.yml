---
label: Εθελοντής εκπαιδευόμενος προσαρμοσμένης στρατιωτικής υπηρεσίας (SMA)
description: Το SMA είναι ένα στρατιωτικό πρόγραμμα για την κοινωνική και επαγγελματική ένταξη των νέων ηλικίας 18 έως 25 ετών στα γαλλικά υπερπόντια διαμερίσματα και εδάφη που βρίσκονται μακριά από την απασχόληση. Για ένα έτος, οι εθελοντές αυτοί θα ζουν σε οικοτροφείο υπό στρατιωτικό καθεστώς. Η στρατιωτική εποπτεία θα τους βοηθήσει να αποκτήσουν δεξιότητες ζωής, οι οποίες με τη σειρά τους θα διευκολύνουν την απόκτηση επαγγελματικής τεχνογνωσίας. Τελικά, ο στόχος είναι να γίνουν πιο απασχολήσιμοι σε μια θέση εργασίας που είναι ανεπαρκής στην περιοχή τους.
