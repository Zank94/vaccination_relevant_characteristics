label: Έκθεση στον ιό Mpox σε ενδημικές περιοχές
description: Άτομα που ταξιδεύουν σε γεωγραφικές περιοχές όπου ο επιπολασμός της λοίμωξης είναι υψηλός και όπου η έκθεση στον MPXV στο άμεσο περιβάλλον ή κατά τη διάρκεια της εργασίας (π.χ. επαφή με τον τοπικό πληθυσμό στο πλαίσιο μιας ΜΚΟ) μπορεί να συνιστά αυξημένο κίνδυνο μόλυνσης.
