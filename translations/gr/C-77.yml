---
label: Τεχνικός βιοϊατρικής ανάλυσης
description: Ο τεχνικός ιατρικής βιολογικής ανάλυσης είναι υπεύθυνος για τη διενέργεια ιατρικών βιολογικών εξετάσεων, οι οποίες επιτρέπουν στο γιατρό να επιβεβαιώσει μια διάγνωση ή να ανιχνεύσει μια ασθένεια. Η εργασία μπορεί να εκτελείται σε νοσοκομείο, κλινική ή κέντρο πόλης.
