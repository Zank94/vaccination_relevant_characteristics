label: Άτομο που εμφανίζει σημεία covid 19 με θετική δοκιμή RT-PCR
description: "Το Covid 19 μπορεί να εκδηλωθεί με την αιφνίδια εμφάνιση ενός ή περισσοτέρων από τα ακόλουθα σημεία: μολυσματικά σημεία (πυρετός ή αίσθημα πυρετού, ρίγη), βήχας ή αναπνευστική δυσφορία, ανεξήγητη κόπωση, ανεξήγητοι πόνοι, πονοκέφαλοι εκτός από γνωστή ημικρανία, απώλεια ή μείωση της αίσθησης της όσφρησης και της γεύσης.Σε άτομα άνω των 80 ετών, άλλα σημεία είναι ενδεικτικά: έκπτωση της γενικής κατάστασης, επανειλημμένες πτώσεις, εμφάνιση ή επιδείνωση γνωστικών προβλημάτων, σύγχυση, διάρροια, επιδείνωση μιας χρόνιας νόσου κ.ά. Η διάγνωση του covid 19 στην οξεία φάση βασίζεται στην ανίχνευση του γενετικού υλικού του ιού σε ρινοφαρυγγικό ή ρινοφαρυγγικό δείγμα που λαμβάνεται με επίχρισμα (RT-PCR test)."
