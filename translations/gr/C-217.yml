---
label: Μαθητής οδηγός ασθενοφόρου
description: "Οι οδηγοί ασθενοφόρων εργάζονται για μια ιδιωτική εταιρεία ιατρικών μεταφορών ή για ένα ίδρυμα υγειονομικής περίθαλψης, παρέχοντας περίθαλψη και μεταφορά ασθενών και τραυματιών, κατόπιν ιατρικής συνταγής ή σε επείγοντα ιατρικά περιστατικά, με ειδικά προσαρμοσμένα οχήματα ιατρικών μεταφορών για θεραπευτικούς ή διαγνωστικούς σκοπούς. Ο οδηγός ασθενοφόρου γνωρίζει την κατάσταση έκτακτης ανάγκης των ασθενών του, μαθαίνοντας για τη σοβαρότητα της κατάστασής τους και το είδος του τραυματισμού από τον οποίο πάσχουν από τη δομή για την οποία εργάζεται: SAMU, νοσοκομείο, Ερυθρός Σταυρός κ.λπ. Είναι στην υπηρεσία των ασθενών, εξασφαλίζοντας την άνεσή τους, κάνοντάς τους να αισθάνονται άνετα κατά τη διάρκεια του ταξιδιού και μπορεί ακόμη και να επέμβει σε περίπτωση έκτακτης ανάγκης για να παράσχει τις πρώτες βοήθειες. Οι οδηγοί ασθενοφόρων είναι υπεύθυνοι για τη συντήρηση των οχημάτων τους και την αποστείρωση του εξοπλισμού τους. Μπορούν επίσης να βοηθούν τους ασθενείς με τις διατυπώσεις για την είσοδο και την έξοδο από το όχημα."
