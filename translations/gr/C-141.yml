---
label: Παρατεταμένη ή υψηλής δόσης θεραπεία με κορτικοστεροειδή
description: 'Όσον αφορά τη θεραπεία με κορτικοστεροειδή, η δόση και η διάρκεια πέραν της οποίας αντενδείκνυται η χορήγηση ζωντανού εμβολίου (ανοσοκατασταλτική θεραπεία με κορτικοστεροειδή) έχουν ως εξής.  Ενήλικες: 10 mg ισοδύναμο πρεδνιζόνης ανά ημέρα για περισσότερες από δύο εβδομάδες. Σε παιδιά: 2 mg/kg ισοδύναμο πρεδνιζόνης ανά ημέρα (και περισσότερα από 20 mg ανά ημέρα σε παιδιά με βάρος άνω των 10 kg), για περισσότερες από δύο εβδομάδες. Τα "bolus" κορτικοστεροειδή αντενδείκνυνται για τη χορήγηση ζωντανού εμβολίου για τους επόμενους τρεις μήνες.'
