---
label: Νοσοκόμα
description: Οι νοσηλευτές εργάζονται σε ιδιωτικά ιατρεία, κέντρα υγείας, νοσοκομεία και προληπτικές υπηρεσίες. Οι νοσηλευτές παρέχουν φροντίδα που συνταγογραφείται από τους γιατρούς και μπορεί να συνταγογραφούν οι ίδιοι ορισμένες διαδικασίες. Οι κίνδυνοι έκθεσης σε ορισμένες μολυσματικές ασθένειες συνδέονται με τις συνθήκες εργασίας.
