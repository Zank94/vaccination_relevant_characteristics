---
label: Κοινή μεταβλητή ανοσοανεπάρκεια (CVID)
description: "Η μεταβλητή κοινή ανοσοανεπάρκεια (VCIID) είναι μια ετερογενής ομάδα ασθενειών που χαρακτηρίζεται από υπογαμμασφαιριναιμία άγνωστης αιτίας με ανεπαρκή παραγωγή ειδικών αντισωμάτων μετά από ανοσοποίηση, προκαλώντας υποτροπιάζουσες βακτηριακές λοιμώξεις, συνήθως με ενθυλακωμένα βακτήρια. Ο επιπολασμός της εκτιμάται σε 1:25.000 σε άτομα ευρωπαϊκής καταγωγής και προσβάλλει τόσο τους άνδρες όσο και τις γυναίκες. "
