label: Υπάλληλος σε επιχείρηση νεκροθάφτη που συνδέεται με ίδρυμα πρόληψης ή περίθαλψης
description: Άρθρο 1 του http://www.legifrance.gouv.fr/affichTexte.do?cidTexte=LEGITEXT000020375184 l'arrêté du 15 mars 1991 fixe la liste des établissements ou organismes publics ou privés de prévention ou de soins dans lequel toute personne exposée à des risques de contamination doit être immunisée contre l'hépatite B, la diphtérie, le tétanos et la poliomyélite lorsqu'une exercce une activité professionnelle.Les entreprises de pompes funèbres sont assimilées aux établissements et organismes mentionnés à l'article 1, dans la mesure où ils participent à l'activité de ces derniers.
