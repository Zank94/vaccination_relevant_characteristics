---
label: Βιοθεραπεία που προκαλεί ανοσοκαταστολή
description: Οι βιοθεραπείες στρέφονται κατά ενός συγκεκριμένου ανοσολογικού στόχου. Οι πιο συχνά χρησιμοποιούμενες είναι οι αντι-TNF και αντι-IL-1. Ενδείκνυνται σε φλεγμονώδεις ρευματισμούς και αυτοάνοσα νοσήματα. Οι θεραπείες αντι-TNF αποτελούν σήμερα τη θεραπεία αναφοράς για τις σοβαρές και ενεργές μορφές ρευματοειδούς αρθρίτιδας και σπονδυλοαρθροπάθειας.Παραδείγματα των φαρμάκων που χρησιμοποιούνται είναι το infliximab (Inflectra®, Remicade®, Remsima®), το adalimumab (Humira®, Trudexa®), το etanercept (Enbrel®), το anakinra (Kineret®), το rituximab (MabThera®), το abatacept (Orencia®) και το brodalumab (Kyntheum®). Μετά τη διακοπή μιας βιοθεραπείας, το χρονικό όριο για τη χορήγηση ζωντανού εμβολίου ποικίλλει. Το ελάχιστο είναι τρεις μήνες (έξι μήνες μετά τη θεραπεία με rituximab).
