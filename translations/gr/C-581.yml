---
label: Σοβαρή χρόνια ουδετεροπενία
description: Οι ασθενείς με χρόνια ουδετεροπενία έχουν μόνιμη ή υποτροπιάζουσα πτώση των ουδετερόφιλων κάτω από 1.500 ανά mm3, γεγονός που τους καθιστά ευάλωτους σε βακτηριακές λοιμώξεις (σταφυλόκοκκος, στρεπτόκοκκος, αρνητικοί κατά Gram βάκιλοι) και μυκητιασικές λοιμώξεις (καντιντίαση, συστηματική ασπεργίλλωση). Υποφέρουν επίσης από ουλικοστοματίτιδα. Η σοβαρή ουδετεροπενία ορίζεται ως αριθμός ουδετερόφιλων μικρότερος από 500 mm3.
