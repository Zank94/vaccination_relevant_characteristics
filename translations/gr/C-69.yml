---
label: Φαρμακοποιός
description: Οι φαρμακοποιοί είναι ειδικοί στα φάρμακα. Είναι υπεύθυνοι για τη χορήγηση φαρμάκων που συνταγογραφούνται από γιατρό σε νοσοκομείο ή τοπικό φαρμακείο, ελέγχοντας ότι δεν υπάρχουν αλληλεπιδράσεις ή άλλοι παράγοντες που θα μπορούσαν να επηρεάσουν την ασφάλεια ή την αποτελεσματικότητα της θεραπείας. Οι φαρμακοποιοί έχουν και άλλους ρόλους, για παράδειγμα στον τομέα της πρόληψης. Είναι πλέον εξουσιοδοτημένοι να εμβολιάζουν ενήλικες κατά της γρίπης.
