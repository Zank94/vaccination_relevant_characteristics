label: Οικογένειες που λαμβάνουν παροχές CMU, CMUc ή AME
description: Η Couverture maladie universelle (CMU) είναι η υποχρεωτική υγειονομική κάλυψη για τα άτομα που ζουν στη Γαλλία και δεν καλύπτονται ήδη από άλλο σύστημα υποχρεωτικής ασφάλισης. Η συμπληρωματική C.M.U. (CMUc) είναι μια πρόσθετη μορφή προστασίας (συγκρίσιμη με μια αλληλασφαλιστική εταιρεία) που χορηγείται με κριτήριο τα μέσα. Η Aide Médicale de l'Etat (AME) παρέχει πρόσβαση στην υγειονομική περίθαλψη σε αλλοδαπούς υπηκόους που διαμένουν στη Γαλλία.
