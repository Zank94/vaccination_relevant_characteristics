---
label: Φοιτητής τακτικός
description: "Ως μέρος της ομάδας φροντίδας, ο βοηθός νοσηλευτή βοηθά τον νοσηλευτή στις καθημερινές δραστηριότητες φροντίδας. Σε συνεργασία με τον νοσηλευτή και υπό την ευθύνη του νοσηλευτή, ο βοηθός νοσηλευτή παρέχει στους ασθενείς φροντίδα υγιεινής και άνεσης: πλύσιμο, γεύματα, στρώσιμο κρεβατιών, υποδοχή, εγκατάσταση και μεταφορά ασθενών κ.ά. Ανακοινώνει τις παρατηρήσεις του γραπτώς και προφορικώς για να διασφαλίσει τη συνέχεια της φροντίδας. Συμμετέχει στην οργάνωση δραστηριοτήτων για τα άτομα που εισάγονται σε κέντρα παρακολούθησης και αποκατάστασης. Ενδέχεται να χρειαστεί να εργαστούν τη νύχτα, τα Σαββατοκύριακα και τις αργίες. Οι βοηθοί υγείας εργάζονται τόσο σε νοσοκομεία όσο και σε κλινικές."
