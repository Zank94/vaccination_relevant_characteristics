---
label: Αιμορροφιλία
description: Η αιμορροφιλία είναι μια διαταραχή της πήξης που προκαλείται από έλλειψη πρωτεϊνών πήξης. Το αποτέλεσμα είναι συχνότερη αιμορραγία και αιματώματα με το παραμικρό τραύμα. Η ασθένεια αυτή μεταδίδεται συχνότερα από τη γέννηση. Οι μορφές που εμφανίζονται στην ενήλικη ζωή είναι εξαιρετικές.
