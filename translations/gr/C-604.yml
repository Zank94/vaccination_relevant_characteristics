---
label: Κίνδυνος έκθεσης σε βιολογικούς παράγοντες
description: Αυτό ισχύει ιδίως για τα επαγγέλματα υγειονομικής περίθαλψης (γιατροί, φαρμακοποιοί, νοσηλευτές, μαίες, οδοντίατροι κ.λπ.), είτε ως αποτέλεσμα δραστηριοτήτων που περιλαμβάνουν βιολογικούς παράγοντες (βιομηχανική παραγωγή εμβολίων, εργαστήρια ιατρικών αναλύσεων, ιολογική έρευνα κ.λπ.)- είτε ως αποτέλεσμα έκθεσης που προκαλείται από επαγγελματικές δραστηριότητες που δεν περιλαμβάνουν βιολογικούς παράγοντες (ανθρώπινη ή κτηνιατρική περίθαλψη, γεωργία κ.λπ.).Ο κίνδυνος έκθεσης σε βιολογικούς παράγοντες μπορεί να προκύψει από την επαφή με ασθενείς, τα σώματα νεκρών ή βιολογικά προϊόντα, είτε άμεσα, συμπεριλαμβανομένου του ψεκασμού, είτε έμμεσα, ιδίως κατά το χειρισμό και τη μεταφορά ιατρικών συσκευών, βιολογικών δειγμάτων, ιματισμού ή αποβλήτων υγειονομικής περίθαλψης με μολυσματικό κίνδυνο. Ο γιατρός εργασίας αξιολογεί τον κίνδυνο έκθεσης σε ατομική βάση, ανάλογα με τα χαρακτηριστικά της θέσης που κατέχει ο εργαζόμενος, και συνταγογραφεί τους απαραίτητους εμβολιασμούς.
