---
label: Ανοσοκατασταλμένοι συγγενείς
description: Η οικογένεια και οι φίλοι των ανοσοκατεσταλμένων ατόμων αποτελούν δυνητική πηγή αερομεταφερόμενης ή δερματικής μετάδοσης μολυσματικών παραγόντων. Λόγω των αβεβαιοτήτων που περιβάλλουν την αποτελεσματικότητα του εμβολιασμού σε ανοσοκατεσταλμένους ασθενείς και της αντένδειξης των ζωντανών εμβολίων σε αυτούς τους ασθενείς, συνιστάται έντονα, προκειμένου να δημιουργηθεί ένας "κύκλος προστασίας", να ελέγχεται η κατάσταση εμβολιασμού των ατόμων του άμεσου περιβάλλοντός τους και να γίνονται οι απαραίτητες ενημερώσεις σύμφωνα με το ισχύον πρόγραμμα εμβολιασμού. Ως άμεσο περιβάλλον ορίζεται κάθε άτομο που ζει στο ίδιο νοικοκυριό ή είναι πιθανό να παρέχει φροντίδα (παιδαγωγός, οικογένεια, φροντιστής κ.λπ.) και κάθε προσωπικό υγείας που είναι πιθανό να τους φροντίζει.
