---
label: Χρόνια αποφρακτική πνευμονοπάθεια (ΧΑΠ)
description: "Η χρόνια αποφρακτική πνευμονοπάθεια (ΧΑΠ) είναι μια κοινή πνευμονοπάθεια που μειώνει τη ροή του αέρα και προκαλεί αναπνευστικά προβλήματα. Είναι επίσης γνωστή ως εμφύσημα ή χρόνια βρογχίτιδα.\r

  \r

  Στη ΧΑΠ, οι εκκρίσεις μπορεί να βλάψουν ή να φράξουν τους πνεύμονες. Τα συμπτώματα περιλαμβάνουν βήχα (μερικές φορές με βλεννώδη πτύελα), δυσκολία στην αναπνοή, συριγμό και κόπωση.\r

  \r

  Το κάπνισμα και η ατμοσφαιρική ρύπανση είναι οι κύριες αιτίες. Οι ασθενείς διατρέχουν μεγαλύτερο κίνδυνο να αναπτύξουν άλλα προβλήματα υγείας.\r

  \r

  Η ΧΑΠ δεν θεραπεύεται, αλλά μπορεί να ανακουφιστεί αποφεύγοντας το κάπνισμα και την ατμοσφαιρική ρύπανση και κάνοντας εμβόλια για την πρόληψη των λοιμώξεων. Αντιμετωπίζεται με φαρμακευτική αγωγή, οξυγόνο και πνευμονική αποκατάσταση."
