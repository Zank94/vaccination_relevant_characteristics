---
label: Στενή και παρατεταμένη επαφή με τον τοπικό πληθυσμό
description: |-
  Η ερώτηση αυτή τίθεται επειδή η στενή και παρατεταμένη επαφή με τον τοπικό πληθυσμό μπορεί να ευνοήσει τη μετάδοση του μηνιγγιτιδόκοκκου. Ο μηνιγγιτιδόκοκκος βρίσκεται στο λαιμό ορισμένων ατόμων που είναι γνωστά ως "φορείς μηνιγγιτιδόκοκκου". Η μετάδοση του μηνιγγιτιδόκοκκου από έναν φορέα σε άλλον μέσω σταγονιδίων σάλιου (τα οποία μπορεί στη συνέχεια να προκαλέσουν μηνιγγίτιδα) διευκολύνεται από : 
  - Στενή επαφή, δηλαδή σε απόσταση μικρότερη του 1 μέτρου (τα σταγονίδια σάλιου είναι αρκετά βαριά και πέφτουν γρήγορα),
  - Συχνή ή παρατεταμένη επαφή (π.χ. πάνω από μία ώρα). 
  Παραδείγματα καταστάσεων υψηλού κινδύνου κατά τη διάρκεια της διαμονής σας: διαμονή με ντόπιους, επίσκεψη σε νυχτερινά κέντρα, μακρινά ή πολυσύχναστα ταξίδια, αθλήματα επαφής, πρακτική άσκηση σε σχολεία, οικοτροφεία κ.λπ.
