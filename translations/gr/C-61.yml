---
label: Οδοντίατρος
description: Οι οδοντιατρικοί χειρουργοί παρέχουν ιατρική φροντίδα για το στόμα, τα δόντια, τα ούλα και τα γνάθια. Παρέχει ανακούφιση, επιδιορθώσεις και φροντίζει επίσης για την αισθητική του χαμόγελου. Αντιμετωπίζει τις κοιλότητες και τις πιο σοβαρές λοιμώξεις της στοματικής κοιλότητας. Τοποθετεί προσθετικές εργασίες. Επομένως, ο οδοντοχειρουργός μπορεί να εκτεθεί σε αίμα ή άλλα βιολογικά υγρά.
