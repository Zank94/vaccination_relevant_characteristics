---
label: Χειρουργός
description: Οι χειρουργοί είναι ιατροί που ασκούν μια ιδιαίτερα τεχνική ειδικότητα. Πραγματοποιούν φυσικές επεμβάσεις στους ιστούς του σώματος, αποκαθιστούν σοβαρά τραύματα, διορθώνουν δυσπλασίες, θεραπεύουν λοιμώξεις, αφαιρούν άρρωστα όργανα κ.ά. Οι χειρουργοί είναι επομένως ιδιαίτερα εκτεθειμένοι στη μόλυνση του αίματος. Υπάρχουν πολλές χειρουργικές ειδικότητες.
