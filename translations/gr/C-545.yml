label: Η μητέρα αυτού του μωρού θεωρείται ότι δεν έχει ανοσία στην ιλαρά (δεν έχει τεκμηριωμένο ιστορικό ιλαράς, δεν έχει εμβολιαστεί ή έχει εμβολιαστεί με μία μόνο δόση).
description: "Μη ανοσοποιητική μητέρα: σημειώστε αυτό το τετραγωνίδιο εάν δεν υπάρχει τεκμηριωμένο ιστορικό ιλαράς, εάν δεν έχετε εμβολιαστεί κατά της ιλαράς ή εάν έχετε εμβολιαστεί με μία μόνο δόση."
