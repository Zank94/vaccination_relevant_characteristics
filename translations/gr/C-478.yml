---
label: Αντιπηκτική αγωγή
description: Η αντιπηκτική αγωγή χρησιμοποιείται για την αραίωση του αίματος σε ορισμένες φλεβικές παθήσεις (εν τω βάθει φλεβική θρόμβωση, πνευμονική εμβολή) ή καρδιακές παθήσεις (ιδίως αρρυθμία). Τα κύρια μόρια που χρησιμοποιούνται είναι η φλουδιόνη (Previscan) και η κουμαδίνη (Sintron).
