---
label: Αλλεργία στα αυγά
description: Αλλεργία στα αυγά. Η αλλεργία στο αυγό είναι μία από τις πιο συχνές τροφικές αλλεργίες στα παιδιά (1 έως 3% των παιδιών ηλικίας κάτω των 3 ετών). Καθώς συνήθως εξαφανίζεται με την ηλικία, η αλλεργία αυτή είναι πολύ λιγότερο συχνή στους ενήλικες. Τα αλλεργικά συμπτώματα εμφανίζονται συνήθως λίγο μετά την κατανάλωση αυγών ή τροφών που περιέχουν αυγά, ιδίως ωμών ή μη καλά μαγειρεμένων αυγών (σπιτική μους σοκολάτας, βραστά αυγά κ.λπ.). Τα πιο συνηθισμένα συμπτώματα είναι ερυθρότητα και κνησμός γύρω από το στόμα, πρήξιμο του στόματος ή του λαιμού, κνίδωση, εμετός, δυσφορία, δυσκολία στην αναπνοή ή χαμηλή αρτηριακή πίεση. Αλλεργία στο κοτόπουλο. Η αλλεργία στο κοτόπουλο αναφέρεται σε αλλεργία στη σάρκα του κοτόπουλου, σε αντίθεση με τα φτερά. Αν πιστεύετε ότι μπορεί να είστε αλλεργικοί στα αυγά ή στο κοτόπουλο, συμβουλευτείτε το γιατρό σας, αν δεν το έχετε ήδη κάνει. Η αλλεργία στο αυγό ή το κοτόπουλο μπορεί να οδηγήσει σε αντένδειξη ή σε προφυλάξεις για τη χρήση ορισμένων εμβολίων που μπορεί να περιέχουν ίχνη αυγού ή κοτόπουλου.
