---
label: "Αντι-C5 θεραπεία: Soliris® (εκουλιζουμάμπη) ή Ultomiris® (ραβουλιζουμάμπη)"
description: Το Soliris® (eculizumab) είναι μια θεραπεία κατά του C5A που αναστέλλει τη δράση του συμπληρώματος. Το συμπλήρωμα είναι μια ομάδα πρωτεϊνών (η C5A είναι μία από αυτές) με αντιβακτηριακές ιδιότητες, οι οποίες διαδραματίζουν σημαντικό ρόλο στη φλεγμονή και την ανοσία. Το Soliris® ενδείκνυται για τη θεραπεία ασθενών (παιδιών ή ενηλίκων) με παροξυσμική νυχτερινή αιμοσφαιρινουρία (PNH) ή άτυπο αιμολυτικό ουραιμικό σύνδρομο (άτυπο HUS). Το Ultomiris® (ραβουλιζουμάμπη) ενδείκνυται για χρήση στη θεραπεία ενηλίκων ασθενών με PNH σε ασθενείς που παρουσιάζουν αιμόλυση με κλινικό σύμπτωμα(-τα) ενδεικτικό(-α) υψηλής δραστηριότητας της νόσου και σε ασθενείς που είναι κλινικά σταθεροί μετά από θεραπεία με εκουλιζουμάμπη τουλάχιστον τους τελευταίους 6 μήνες.
