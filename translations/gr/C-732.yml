---
label: Υψηλός κίνδυνος έκθεσης σε φυματίωση (αξιολογείται από τον ιατρό εργασίας)
description: Προσωπικό που ενδέχεται να εκτεθεί σε μεγάλο βαθμό, όπως επαγγελματίες που έρχονται επανειλημμένα σε επαφή με ασθενείς με φυματίωση, ιδίως με εκείνους που κινδυνεύουν από πολυανθεκτική φυματίωση, ή εργαστηριακό προσωπικό που εργάζεται με μυκοβακτηρίδια (καλλιέργειες, ζωικά μοντέλα κ.λπ.).
