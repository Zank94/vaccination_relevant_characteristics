---
label: Οδηγός ασθενοφόρου
description: "Οι οδηγοί ασθενοφόρων εργάζονται για ιδιωτικές εταιρείες μεταφορών υγείας ή για ιδρύματα υγείας. Κατόπιν ιατρικής συνταγής ή σε περίπτωση επείγοντος ιατρικού περιστατικού, αναλαμβάνουν και μεταφέρουν ασθενείς και τραυματίες με ειδικά προσαρμοσμένα οχήματα ιατρικών μεταφορών. Λαμβάνουν πληροφορίες σχετικά με το βαθμό σοβαρότητας των ασθενών και το είδος των τραυματισμών που υφίστανται από τη δομή για την οποία εργάζονται: SAMU, νοσοκομείο, Ερυθρός Σταυρός κ.λπ. Είναι στην υπηρεσία των ασθενών, εξασφαλίζοντας την άνεσή τους, κάνοντάς τους να αισθάνονται άνετα κατά τη διάρκεια του ταξιδιού και μπορεί ακόμη και να επέμβουν σε περίπτωση έκτακτης ανάγκης για να παράσχουν τις πρώτες βοήθειες. Οι οδηγοί ασθενοφόρων είναι υπεύθυνοι για τη συντήρηση των οχημάτων τους και την αποστείρωση του εξοπλισμού τους. Μπορούν επίσης να βοηθούν τους ασθενείς με τις διατυπώσεις για την είσοδο και την έξοδο από το όχημα."
