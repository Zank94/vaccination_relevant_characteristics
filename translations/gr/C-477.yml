---
label: Θρομβοπενική πορφύρα
description: Η θρομβοπενική πορφύρα αντιστοιχεί σε πτώση των αιμοπεταλίων που οδηγεί σε μικρές επιφανειακές αιμορραγίες στο δέρμα που ονομάζονται πορφύρα. Η πτώση των αιμοπεταλίων αποκαλύπτεται με μια εξέταση αίματος. Σε ορισμένες περιπτώσεις, η σημαντική πτώση των αιμοπεταλίων μπορεί να οδηγήσει σε αιμορραγία (ρινορραγία, αιμορραγία από το στόμα, αιματώματα κ.λπ.).
