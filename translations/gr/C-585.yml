---
label: Ανεπάρκεια IgA
description: "Η εκλεκτική ανεπάρκεια ανοσοσφαιρίνης Α είναι μια πρωτογενής (ή συγγενής) ανοσοανεπάρκεια- είναι η πιο συχνή πρωτογενής ανεπάρκεια αντισωμάτων. Με συχνότητα εμφάνισης 1/325 άτομα στη Δύση, δεν πρόκειται για σπάνια ασθένεια. Λόγω της μερικής ή ολικής απουσίας των αντισωμάτων IgA, τα οποία παίζουν σημαντικό ρόλο στην προστασία των βλεννογόνων μεμβρανών από τις λοιμώξεις, τα πάσχοντα άτομα υποφέρουν από επαναλαμβανόμενα επεισόδια αναπνευστικών ή γαστρεντερικών λοιμώξεων. Μπορεί επίσης να παρουσιάζουν μια μεταβλητή κοινή ανοσοανεπάρκεια και η συχνότητα εμφάνισης αυτοάνοσων διαταραχών είναι αυξημένη. Η αιτιολογία της επιλεκτικής ανεπάρκειας της ανοσοσφαιρίνης Α δεν έχει διευκρινιστεί, αλλά η οικογενειακή μετάδοση που παρατηρείται στο 20-25% των περιπτώσεων υποδηλώνει γενετική επίδραση. Δεν υπάρχει ειδική θεραπεία για τη νόσο αυτή, αλλά οι λοιμώξεις πρέπει να αντιμετωπίζονται αποτελεσματικά. Οι ασθενείς με εκλεκτική ολική ανεπάρκεια IgA θα πρέπει να ενημερώνουν το υγειονομικό προσωπικό για την κατάστασή τους, λόγω του πιθανού κινδύνου αναφυλακτικής αντίδρασης κατά τη μετάγγιση προϊόντων αίματος. Πηγή: Orphanet."
