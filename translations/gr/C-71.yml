---
label: Βοηθός φροντίδας
description: "Ως μέλος της ομάδας φροντίδας, ο βοηθός νοσηλευτή βοηθά τον νοσηλευτή στις καθημερινές δραστηριότητες φροντίδας. Συμβάλλουν στην ευημερία των ασθενών βοηθώντας τους σε όλες τις πτυχές της καθημερινής ζωής και βοηθώντας τους να διατηρήσουν την ανεξαρτησία τους. Σε συνεργασία με τον νοσηλευτή και υπό την ευθύνη του νοσηλευτή, ο βοηθός νοσηλευτή εκτελεί εργασίες υγιεινής και φροντίδας άνεσης των ασθενών: πλύσιμο, γεύματα, στρώσιμο κρεβατιών, υποδοχή, εγκατάσταση και μεταφορά ασθενών. Οι βοηθοί υγείας εργάζονται τόσο σε νοσοκομεία όσο και σε κλινικές."
