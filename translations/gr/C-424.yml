---
label: Συστηματικός ερυθηματώδης λύκος
description: Ο συστηματικός ερυθηματώδης λύκος, συχνά συντομογραφούμενος ως "λύκος", είναι μια συστηματική αυτοάνοση ασθένεια που προσβάλλει διάφορα όργανα και ιστούς του σώματος. Χαρακτηρίζεται από φλεγμονώδη συμπτώματα όπως εξανθήματα στο πρόσωπο σε σχήμα πεταλούδας, πόνο στις αρθρώσεις, πυρετό, κόπωση και βλάβες σε εσωτερικά όργανα όπως τα νεφρά ή η καρδιά. Ο λύκος προκαλείται από μια μη φυσιολογική ανοσολογική απόκριση κατά την οποία το ανοσοποιητικό σύστημα επιτίθεται στα κύτταρα και τους ιστούς του ίδιου του σώματος. Η πορεία της νόσου ποικίλλει, με περιόδους ύφεσης και εξάρσεων. Η θεραπεία περιλαμβάνει γενικά ανοσοκατασταλτικά φάρμακα για τον έλεγχο της φλεγμονής και των συμπτωμάτων.
