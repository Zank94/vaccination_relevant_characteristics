label: Εγκυμοσύνη - Ημερομηνία τελευταίας περιόδου
description: Η εγκυμοσύνη σε εξέλιξη μπορεί να οδηγήσει σε ειδικές συστάσεις εμβολιασμού ή αντενδείξεις, ανάλογα με την ασθένεια που πρόκειται να προληφθεί και το ενδιαφερόμενο άτομο. Για να λάβετε την ημερομηνία έναρξης της εγκυμοσύνης, προσθέστε 14 ημέρες στην ημερομηνία της τελευταίας σας περιόδου.
