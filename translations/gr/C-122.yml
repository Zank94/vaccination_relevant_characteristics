---
label: Πρόσωπο που έχει μολυνθεί από τον ιό της ηπατίτιδας Β ή χρόνιος φορέας του αντιγόνου HBs στο περιβάλλον του
description: Πρόκειται για άτομα που έχουν μολυνθεί από τον ιό της ηπατίτιδας Β (ή HBV) ή είναι φορείς του αντιγόνου HBs (βιολογικός δείκτης που υποδεικνύει χρόνια λοίμωξη από HBV). Πρόκειται για άτομα που ζουν στο ίδιο νοικοκυριό.
