---
label: Άλλοι παράγοντες κινδύνου για σοβαρή πνευμονιοκοκκική λοίμωξη (παιδιά)
description: |-
  Οι ομάδες παιδιών που διατρέχουν υψηλό κίνδυνο διεισδυτικής πνευμονιοκοκκικής λοίμωξης είναι :
  - Λοίμωξη με τον ιό της ανθρώπινης ανοσοανεπάρκειας (HIV)
  - Δρεπανοκυτταρική νόσος, λειτουργική ή ανατομική ασπληνία
  Ελάττωμα του εγκεφαλικού-μηνιγγικού φραγμού/φίστουλα
  - Κοχλιακό εμφύτευμα
  - Χρόνια νοσήματα όπως καρδιαγγειακά νοσήματα, πνευμονοπάθειες (με εξαίρεση το άσθμα), ηπατική νόσος, νεφρωσικό σύνδρομο, διαβήτης
  - Συνταγματικές ανοσοανεπάρκειες (συμπεριλαμβανομένων των ανεπαρκειών του συμπληρώματος και της προπερδίνης) ή δευτερογενείς ανοσοκατασταλτικές θεραπείες (λεμφώματα, λευχαιμίες, καρκίνοι, μεταμοσχεύσεις οργάνων)
  - Τα πρόωρα βρέφη με ηλικία κύησης μικρότερη των 32 εβδομάδων και τα βρέφη με βάρος γέννησης μικρότερο των 1.500 γραμμαρίων διατρέχουν υψηλό κίνδυνο διεισδυτικής πνευμονιοκοκκικής λοίμωξης, προσωρινά μέχρι την ηλικία των 24 μηνών.
