---
label: Ψυχομετρικός
description: Κατόπιν ιατρικής συνταγής, ο ψυχοθεραπευτής βοηθά άτομα που πάσχουν από διάφορες ψυχοκινητικές διαταραχές. Χρησιμοποιώντας τεχνικές χαλάρωσης, κινητική αγωγή, σωματική και πλαστική έκφραση και δραστηριότητες που περιλαμβάνουν παιχνίδι, ρυθμό και συντονισμό, ο ψυχοκινητικός θεραπευτής προσπαθεί να διορθώσει τις ψυχικές δυσκολίες που μπορεί να αντιμετωπίζουν ενήλικες και παιδιά. Εργάζονται κυρίως σε νοσοκομεία, αλλά μπορεί επίσης να εργαστούν σε ιδιωτική πρακτική.
