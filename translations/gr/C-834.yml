---
label: Δρεπανοκυτταρική νόσος υπό θεραπεία με υδροξυουρία (Hydrea, Siklos)
description: Η χαμηλής δόσης υδροξυουρία συνταγογραφείται τακτικά σε άτομα που πάσχουν από δρεπανοκυτταρική νόσο για την πρόληψη επαναλαμβανόμενων επώδυνων αγγειοαποφρακτικών κρίσεων, τόσο σε παιδιά ηλικίας άνω των δύο ετών όσο και σε ενήλικες με συμπτωματική δρεπανοκυτταρική νόσο. Δύο φάρμακα συνταγογραφούνται για τον σκοπό αυτό, η Hydrea και το Siklos. Δεν υπάρχουν κλινικές ενδείξεις ανοσοκαταστολής που προκαλείται από χαμηλή δόση υδροξυουρίας σε δρεπανοκυτταρικούς ασθενείς και τα διαθέσιμα δεδομένα υποδηλώνουν ότι ζωντανά εμβόλια θα μπορούσαν πιθανώς να χορηγηθούν σε άτομα που υποβάλλονται σε θεραπεία με χαμηλή δόση υδροξυουρίας. Ωστόσο, η άδεια κυκλοφορίας για την Υδρία, η οποία χρησιμοποιείται εκτός επισήμανσης σε δρεπανοκυτταρικούς ασθενείς, αντενδείκνυται το φάρμακο αυτό σε συνδυασμό με ζώντα εξασθενημένα εμβόλια. Η άδεια κυκλοφορίας για το Siklos συνιστά την αποφυγή της ταυτόχρονης χρήσης υδροξυκαρβαμίδης με εμβόλιο ζώντος ιού. Διευκρινίζει ότι η θεραπεία με Siklos και η ταυτόχρονη ανοσοποίηση με εμβόλια ζώντων ιών θα πρέπει να πραγματοποιείται μόνο εάν τα οφέλη υπερτερούν σαφώς των πιθανών κινδύνων.
