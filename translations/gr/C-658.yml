---
label: Βοηθός οδοντιάτρου
description: Η δουλειά του βοηθού οδοντιάτρου είναι να εκτελεί εργασίες καθαρισμού και αποστείρωσης. Μπορούν επίσης να ενεργούν ως βοηθοί χειρουργείου. Οι οδοντιατρικοί βοηθοί εκτίθενται στον ιό της ηπατίτιδας Β επειδή χειρίζονται αιχμηρά αντικείμενα μετά τη χρήση τους σε ασθενή. Σε μελέτη που πραγματοποιήθηκε μεταξύ 1995 και 2001 στις Ηνωμένες Πολιτείες, το 75% των ατυχημάτων που αφορούσαν έκθεση σε αίμα συνέβησαν σε οδοντιατρεία.
