label: Πρόσφατη επαφή με κρούσμα covid 19
description: 'Πρόσφατη επαφή: τελευταία επαφή εντός των τελευταίων 10 ημερών. Πρόσωπο επαφής που διατρέχει κίνδυνο είναι ένα άτομο το οποίο, ελλείψει αποτελεσματικών μέτρων προστασίας για τη διάρκεια της επαφής, έχει μοιραστεί τον ίδιο χώρο διαβίωσης με το επιβεβαιωμένο ή πιθανό κρούσμα, έχει έρθει σε άμεση επαφή πρόσωπο με πρόσωπο με ένα κρούσμα, σε απόσταση μικρότερη του ενός μέτρου, για οποιοδήποτε χρονικό διάστημα (π.χ. συζήτηση, γεύματα, φλερτ, αγκαλιές, φιλιά). Ωστόσο, τα άτομα που συναντώνται φευγαλέα στο δημόσιο χώρο δεν θεωρούνται επαφές σε κίνδυνο;έχει παράσχει ή λάβει υγιεινή ή φροντίδα;έχει μοιραστεί έναν περιορισμένο χώρο (γραφείο ή αίθουσα συνεδριάσεων, προσωπικό όχημα κ.λπ.) για τουλάχιστον 15 συνεχόμενα ή αθροιστικά λεπτά σε διάστημα 24 ωρών με ένα κρούσμα ή έχει βρεθεί πρόσωπο με πρόσωπο με ένα κρούσμα κατά τη διάρκεια πολλών επεισοδίων βήχα ή φτερνίσματος;είναι μαθητής ή καθηγητής στην ίδια σχολική τάξη (νηπιαγωγείο, δημοτικό, γυμνάσιο, πανεπιστημιακή ομάδα φροντιστηρίων).Περιορισμένος χώρος είναι αυτός στον οποίο δεν μπορεί να ικανοποιηθεί το κριτήριο της κοινωνικής απόστασης, δηλαδή μια ελάχιστη απόσταση 2 μέτρων γύρω από ένα άτομο. Τέλος, τα ακόλουθα δεν θεωρούνται αποτελεσματικά μέτρα προστασίας: ένα φύλλο πλεξιγκλάς τοποθετημένο σε έναν πάγκο, "αυτοσχέδιες" υφασμάτινες μάσκες και διαφανείς πλαστικές προσωπίδες που φοριούνται μόνες τους.'
