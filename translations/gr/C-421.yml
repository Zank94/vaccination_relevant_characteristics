---
label: Βοηθός φαρμακείου, υποδοχή ασθενών
description: Αυτός ο επαγγελματίας είναι πολύ εξοικειωμένος με τα φάρμακα και τον τρόπο χρήσης τους. Αναφερόμενος στον φαρμακοποιό, ο τεχνικός σύνθεσης παρασκευάζει ιατρικές συνταγές σύμφωνα με τα πρότυπα δοσολογίας και υγιεινής. Διαχειρίζεται επίσης τα αποθέματα φαρμάκων σε ένα φαρμακείο ή νοσοκομειακό φαρμακείο.
