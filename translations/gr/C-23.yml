---
label: Ομόζυγη δρεπανοκυτταρική νόσος
description: Η ομόζυγη δρεπανοκυτταρική νόσος είναι μια γενετική διαταραχή του αίματος που χαρακτηρίζεται από την παρουσία δύο μη φυσιολογικών αντιγράφων του γονιδίου της αιμοσφαιρίνης, που ονομάζεται HbS. Αυτό προκαλεί την παραγωγή ανώμαλης αιμοσφαιρίνης, της αιμοσφαιρίνης S, η οποία παραμορφώνει τα ερυθρά αιμοσφαίρια σε δρεπανοειδές σχήμα αντί του φυσιολογικού τους σχήματος. Αυτά τα ερυθρά αιμοσφαίρια με δρεπανοειδές σχήμα μπορούν να φράξουν τα αιμοφόρα αγγεία, προκαλώντας κρίσεις έντονου πόνου, αγγειακές επιπλοκές και αναιμία. Η ομόζυγη δρεπανοκυτταρική νόσος είναι μια σοβαρή μορφή της νόσου και απαιτεί συνεχή ιατρική φροντίδα.
