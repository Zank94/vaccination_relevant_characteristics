---
label: Other cancer involving the bone marrow or lymphatic system
description: "This concerns the following cancers: acute myeloid leukemia (AML), acute lymphoblastic leukemia (ALL), chronic myeloid leukemia (CML), chronic lymphocytic leukemia (CLL), multiple myeloma, myelodysplastic syndromes, myeloproliferative neoplasms, Hodgkin lymphoma, non-Hodgkin lymphomas (including diffuse large B-cell lymphoma, follicular lymphoma, mantle cell lymphoma, and peripheral T-cell lymphoma), as well as adult T-cell leukemia/lymphoma associated with the HTLV-1 virus."
