---
label: Οζώδης περιαρτηρίτιδα
description: Η οζώδης περιαρτηρίτιδα, επίσης γνωστή ως μικροσκοπική πολυαγγειίτιδα, είναι μια φλεγμονώδης νόσος των αιμοφόρων αγγείων (αγγειίτιδα) που προσβάλλει κυρίως τις μικρές και μεσαίου μεγέθους αρτηρίες. Αυτή η αυτοάνοση πάθηση προκαλεί φλεγμονή των τοιχωμάτων των αρτηριών, η οποία μπορεί να οδηγήσει σε στένωση ή απόφραξη, διακόπτοντας τη ροή του αίματος προς διάφορα όργανα και ιστούς. Τα συμπτώματα της οζώδους περιαρτηρίτιδας ποικίλλουν ανάλογα με το ποιες αρτηρίες έχουν προσβληθεί, αλλά μπορεί να περιλαμβάνουν μυϊκό πόνο, πυρετό, κόπωση και προβλήματα με όργανα όπως τα νεφρά, τα νεύρα ή το γαστρεντερικό σύστημα. Η θεραπεία περιλαμβάνει γενικά ανοσοκατασταλτικά φάρμακα για τον έλεγχο της φλεγμονής και την πρόληψη της αγγειακής βλάβης.
