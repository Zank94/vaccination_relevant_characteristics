---
label: Κυανογενής συγγενής καρδιοπάθεια
description: Η κυανογενής συγγενής καρδιοπάθεια είναι ένα καρδιακό ελάττωμα που υπάρχει από τη γέννηση και προκαλεί ένα μη φυσιολογικό μείγμα οξυγονωμένου και μη οξυγονωμένου αίματος στην καρδιά, οδηγώντας σε κυάνωση (κυανή απόχρωση του δέρματος και των χειλιών). Συνήθη παραδείγματα κυανογενών συγγενών καρδιοπαθειών είναι η τετραλογία Fallot και η μετάθεση των μεγάλων αγγείων. Τα συμπτώματα περιλαμβάνουν κόπωση, δυσκολίες στην αναπνοή και αργή ανάπτυξη.
