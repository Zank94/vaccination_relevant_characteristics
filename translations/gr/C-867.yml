label: Αποδεδειγμένο ιστορικό του covid 19
description: Απαιτείται βιολογική απόδειξη (RT-PCR ή αντιγονική εξέταση). Μια θετική ορολογική εξέταση υποδηλώνει προηγούμενη επαφή με τον ιό, εάν διενεργήθηκε πριν ή ταυτόχρονα με τον εμβολιασμό. Θα πρέπει επίσης να συμπληρώσετε την ενότητα σχετικά με τις βιολογικές εξετάσεις και να μιλήσετε με το γιατρό σας.
