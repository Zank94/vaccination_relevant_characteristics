---
label: Έγκυος γυναίκα στη συνοδεία
description: "Τα άτομα που πρέπει να σημειώσουν αυτό το τετραγωνίδιο είναι: ο σύζυγος και τα παιδιά της εγκύου- οποιοσδήποτε είναι πιθανό να έχει στενή και μόνιμη επαφή με το αγέννητο παιδί κατά τους πρώτους 6 μήνες (αυτό μπορεί να περιλαμβάνει παππούδες, γιαγιάδες, μπέιμπι σίτερ κ.λπ.). Αλλά μόνο εάν η έγκυος δεν έχει εμβολιαστεί κατά του κοκκύτη."
