---
label: Anti-HAV Ac (IgG ή συνολική Ig σε IU/L)
description: Αυτή η ορολογική εξέταση συνίσταται στην ανίχνευση της παρουσίας ολικών αντισωμάτων (IgG και IgM) έναντι του ιού της ηπατίτιδας Α (HAV). Μια θετική ορολογική εξέταση που διενεργείται πριν από τον εμβολιασμό (ορολογική εξέταση πριν από τον εμβολιασμό) υποδηλώνει ότι έχει ήδη εμφανιστεί ηπατίτιδα Α. Η ηπατίτιδα Α μπορεί να εμφανιστεί σε παιδιά χωρίς κανένα κλινικό σύμπτωμα. Τα άτομα που έχουν πάθει ηπατίτιδα Α προστατεύονται οριστικά από την ασθένεια αυτή και επομένως ο εμβολιασμός κατά της ηπατίτιδας Α δεν είναι απαραίτητος. Η ορολογική εξέταση της ηπατίτιδας Α, που διενεργείται μετά τον εμβολιασμό, μπορεί να χρησιμοποιηθεί για τον έλεγχο της αποτελεσματικότητας του εμβολιασμού, ιδίως σε ανοσοκατεσταλμένα άτομα. Το όριο θετικότητας είναι 20 IU/L.
