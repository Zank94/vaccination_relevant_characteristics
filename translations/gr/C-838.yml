---
label: Άτομο με παρατεταμένα συμπτώματα covid 19 (long covid)
description: Δεν υπάρχει συναίνεση σχετικά με τον ορισμό της ομάδας των ασθενών με παρατεταμένα συμπτώματα (μερικές φορές αναφέρεται ως "covid long"). Πρόκειται για άτομα με συμπτώματα που επιμένουν για περισσότερο από 3, 4 ή ακόμη και 12 εβδομάδες μετά την έναρξη της λοίμωξης, και η συχνότητα αυτών των παρατεταμένων συμπτωμάτων ποικίλλει από μελέτη σε μελέτη, αλλά μερικές φορές υπερβαίνει το 50%. Τα πιο συχνά αναφερόμενα παρατεταμένα συμπτώματα είναι κόπωση, πόνος στις αρθρώσεις, πόνος στο στήθος, αίσθημα παλμών, αναπνευστικές δυσκολίες, γνωστική έκπτωση και μειωμένη ποιότητα ζωής.
