---
label: Θετική ορολογική εξέταση ηπατίτιδας Α
description: Αυτή η ορολογική εξέταση συνίσταται στην ανίχνευση της παρουσίας ολικών αντισωμάτων (IgG και IgM) έναντι του ιού της ηπατίτιδας Α (HAV). Μια θετική ορολογική εξέταση υποδηλώνει την προηγούμενη εμφάνιση ηπατίτιδας Α. Η ηπατίτιδα αυτή μπορεί να εμφανιστεί σε παιδιά χωρίς κανένα κλινικό σύμπτωμα. Εάν έχετε ήδη εμφανίσει ηπατίτιδα Α, είστε σίγουρα προστατευμένοι από τη νόσο αυτή και ο εμβολιασμός κατά της ηπατίτιδας Α δεν είναι απαραίτητος.
