---
label: Νόσος του Bruton (Χ-συνδεδεμένη αγαμμασφαιριναιμία)
description: "Η Χ-συνδεόμενη αγαμμασφαιριναιμία εκδηλώνεται με υποτροπιάζουσες βακτηριακές λοιμώξεις του αναπνευστικού και του πεπτικού συστήματος και προδιαθέτει στον κίνδυνο χρόνιων λοιμώξεων από εντεροϊούς. Η επίπτωσή της είναι περίπου 1/200.000 γεννήσεις. Συνδέεται με την απουσία παραγωγής ανοσοσφαιρίνης. Πρόκειται για μια Χ-δεσμευόμενη υπολειπόμενη κληρονομική νόσο. Η νόσος προκαλείται από μεταλλάξεις στο γονίδιο που κωδικοποιεί την κινάση τυροσίνης Btk. Χαρακτηρίζεται από αδυναμία ωρίμανσης των Β λεμφοκυττάρων. Η θεραπεία βασίζεται κυρίως στην τακτική χορήγηση ανοσοσφαιρινών μέσω της φλεβικής ή υποδόριας οδού (πηγή: Orphanet)."
