label: Συνεχιζόμενη χημειοθεραπεία για αιματολογική κακοήθεια (λευχαιμία)
description: "Συνεχής χημειοθεραπεία για λευχαιμία: πρόκειται για μια βαριά θεραπεία που έχει σχεδιαστεί για την καταστροφή των καρκινικών κυττάρων, αλλά μπορεί επίσης να αποδυναμώσει τον οργανισμό και να οδηγήσει σε ανοσοκαταστολή κατά τη διάρκεια της θεραπείας και για αρκετούς μήνες μετά."
