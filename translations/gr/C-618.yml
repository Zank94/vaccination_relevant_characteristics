label: Άρνηση εμβολιασμού κατά του μηνιγγιτιδοκόκκου ACWY
description: "Συχνά αναφέρεται ως εμβόλιο μηνιγγίτιδας και προλαμβάνει τις σοβαρές λοιμώξεις (μηνιγγίτιδα ή σηψαιμία) που προκαλούνται από μηνιγγιτιδόκοκκους οροομάδων A, C, W ή Y. Υπάρχουν δύο εμβόλια αυτού του τύπου που κυκλοφορούν στη Γαλλία: το εμβόλιο Menveo και το εμβόλιο Nimenrix."
