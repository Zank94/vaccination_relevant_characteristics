label: Ιστορικό δάγκειου πυρετού που επιβεβαιώνεται με ανίχνευση του ιού
description: Για να επιλέξετε αυτή την επιλογή, η διάγνωση του δάγκειου πυρετού πρέπει να είναι τεκμηριωμένη και να έχει αποδειχθεί με ιολογική εξέταση που διενεργήθηκε κατά την έναρξη της νόσου (δείτε τον ιατρικό φάκελο και ζητήστε τη βοήθεια του γιατρού σας).
