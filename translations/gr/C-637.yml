label: Ουλή εμβολιασμού BCG
description: Αυτή η ουλή βρίσκεται συνήθως πίσω από τον δελτοειδή μυ, το συνηθισμένο σημείο της ενδοδερμικής ένεσης του BCG. Δείχνει ότι έχει χορηγηθεί αυτό το εμβόλιο, το οποίο αναπτύσσει ανοσολογική απόκριση κατά του βάκιλου του Koch (του βακίλου που ευθύνεται για τη φυματίωση). Συμβουλευτείτε το γιατρό σας για περισσότερες πληροφορίες σχετικά με το θέμα αυτό.
