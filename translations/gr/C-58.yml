---
label: Μαία
description: Ο ρόλος της μαίας είναι να υποστηρίζει τις έγκυες γυναίκες καθ' όλη τη διάρκεια της εγκυμοσύνης τους, από τη διάγνωση έως τον τοκετό. Γενικότερα, παρέχει επίσης γυναικολογική παρακολούθηση. Αυτό το δύσκολο επάγγελμα απαιτεί τόσο ιατρικές όσο και ψυχολογικές δεξιότητες. Οι μαίες μπορούν επίσης να παρέχουν εμβολιασμούς.
