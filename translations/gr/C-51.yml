---
label: Ενήλικες που ενδέχεται να γίνουν γονείς τους επόμενους μήνες ή χρόνια
description: Πρόκειται για ενήλικες που είναι πιθανό να γίνουν γονείς τους επόμενους μήνες ή χρόνια, μεταξύ άλλων μέσω υιοθεσίας. Το ερώτημα είναι αν θα πρέπει να εφαρμοστεί η στρατηγική του cocooning, η οποία συνίσταται στην προστασία των γονέων για την πρόληψη της μόλυνσης των βρεφών από τα βακτήρια που ευθύνονται για τον κοκκύτη, μια πολύ σοβαρή ασθένεια σε πολύ μικρά παιδιά. Υπάρχει επίσης το ερώτημα αν θα πρέπει να συστήνεται ο εμβολιασμός κατά της ανεμευλογιάς στις μέλλουσες μητέρες.
