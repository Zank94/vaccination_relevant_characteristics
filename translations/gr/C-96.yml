---
label: Εργάζεται σε πλυντήριο
description: Διάταγμα της 15ης Μαρτίου 1991 για την κατάρτιση καταλόγου δημόσιων ή ιδιωτικών εγκαταστάσεων ή οργανισμών πρόληψης ή περίθαλψης, στους οποίους πρέπει να εμβολιάζεται το εκτεθειμένο προσωπικό. Τα πλυντήρια εξομοιώνονται με τα δημόσια ή ιδιωτικά ιδρύματα και οργανισμούς πρόληψης ή περίθαλψης που αναφέρονται στο άρθρο 1 του παρόντος διατάγματος, εφόσον συμμετέχουν στη δραστηριότητα των τελευταίων.
