---
label: Ημερομηνία έναρξης της εγκυμοσύνης
description: Η ημερομηνία έναρξης της εγκυμοσύνης αντιστοιχεί στη στιγμή της γονιμοποίησης. Η εγκυμοσύνη αρχίζει περίπου 15 ημέρες μετά την τελευταία έμμηνο ρύση. Η πληροφορία αυτή είναι σημαντική διότι ορισμένοι εμβολιασμοί συνιστώνται για τις εγκύους (γρίπη, κοκκύτης), ενώ άλλοι αντενδείκνυνται (ιδίως εκείνοι που χρησιμοποιούν ζωντανά εμβόλια).
