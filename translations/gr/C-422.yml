---
label: Ιατρική γραμματέας, υποδοχή ασθενών
description: Ο ιατρικός γραμματέας επικουρεί τον ιατρό και είναι το πρώτο σημείο επαφής του ασθενούς, στο τηλέφωνο όταν θέλει να κλείσει ραντεβού ή όταν τον υποδέχεται στο ιατρείο ή στον θάλαμο νοσηλείας. Διευκολύνει τους ασθενείς και απαντά στις ερωτήσεις τους.
