label: Άλλες αυτοάνοσες ασθένειες
description: 'Τα αυτοάνοσα νοσήματα είναι μια ομάδα ασθενειών που συνδέονται με το ανοσοποιητικό σύστημα. Χαρακτηρίζονται από μια επίθεση στο σώμα από τα ίδια του τα ανοσοποιητικά κύτταρα. Οι θεραπείες για αυτόν τον τύπο νόσου αποσκοπούν στην καταστολή του υπερδραστήριου ανοσοποιητικού συστήματος και είναι γνωστές ως "ανοσοκατασταλτικά". Παραδείγματα: σύνδρομο Gougerot-Sjögren, δερματομυοσίτιδα, πολυμυοσίτιδα.'
