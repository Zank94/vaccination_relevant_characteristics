label: Ιστορικό σοβαρής αναφυλακτικής αντίδρασης σε εμβόλιο, φάρμακο ή τρόφιμο
description: "Η αναφυλαξία είναι η πιο θεαματική και επικίνδυνη μορφή αλλεργίας, με δυνητικά θανατηφόρο αποτέλεσμα. Μπορεί να λάβει ποικίλες κλινικές μορφές, επηρεάζοντας ένα ή περισσότερα όργανα με διαφορετικό βαθμό έντασης: κνίδωση (εξάνθημα παρόμοιο με το τσίμπημα τσουκνίδας), οίδημα προσώπου και αγγειοοίδημα (λαρυγγικός σπασμός), δυσκολία στην αναπνοή, κρίση άσθματος (βρογχικός σπασμός), πεπτικά συμπτώματα (κοιλιακό άλγος, ναυτία, έμετος, διάρροια), κακουχία (ωχρότητα, αίσθηση επικείμενου θανάτου, πτώση της αρτηριακής πίεσης), απώλεια συνείδησης ή ακόμη και κώμα.Τα συμπτώματα εμφανίζονται συνήθως πολύ γρήγορα, μέσα σε λίγα λεπτά από την επαφή με το αλλεργιογόνο. Σε ποσοστό περίπου 10% των περιπτώσεων, μια δεύτερη αντίδραση εμφανίζεται λίγες ώρες μετά την αρχική αντίδραση: αυτό είναι γνωστό ως διφασική αναφυλαξία, ένα φαινόμενο που δικαιολογεί τη νοσηλεία για παρακολούθηση μετά την παρατήρηση της αναφυλαξίας.η αναφυλαξία οφείλεται σε ακατάλληλη ενεργοποίηση των κυττάρων του ανοσοποιητικού συστήματος, των μαστοκυττάρων στους ιστούς και των βασεόφιλων στο αίμα, προκαλώντας μαζική απελευθέρωση ισταμίνης σε λίγα δευτερόλεπτα/λεπτά, του μορίου που προκαλεί τα συμπτώματα."
