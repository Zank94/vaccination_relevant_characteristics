---
label: Εθελοντής εκπαιδευόμενος στρατιωτικής υπηρεσίας (SMV)
description: Το SMV είναι ένα στρατιωτικό πρόγραμμα κοινωνικοεπαγγελματικής ένταξης για νέους της ηπειρωτικής Γαλλίας ηλικίας 18 έως 25 ετών με εκπαιδευτικές ή/και κοινωνικές δυσκολίες. Για ένα έτος, οι εθελοντές αυτοί θα ζουν σε οικοτροφείο υπό στρατιωτικό καθεστώς. Η στρατιωτική εποπτεία θα τους βοηθήσει να αποκτήσουν δεξιότητες ζωής, οι οποίες με τη σειρά τους θα διευκολύνουν την απόκτηση επαγγελματικής τεχνογνωσίας. Τελικά, ο στόχος είναι να γίνουν πιο απασχολήσιμοι σε μια θέση εργασίας που είναι ανεπαρκής στην περιοχή τους.
