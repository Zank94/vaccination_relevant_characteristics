---
label: Χρόνια πολυπαθολογία
description: "Τουλάχιστον δύο από τις ακόλουθες παθήσεις: χρόνια αποφρακτική πνευμονοπάθεια, καρκίνος (ογκολογικός ή αιματολογικός) ενεργός ή με πρόσφατη χημειοθεραπεία, διαβήτης, σοβαρή χρόνια νεφρική νόσος (συμπεριλαμβανομένων εκείνων που απαιτούν αιμοκάθαρση), περίπλοκη αρτηριακή υπέρταση, παχυσαρκία (;#8805; 30 kg/m2), καρδιακή ανεπάρκεια, χρόνια αναπνευστική ανεπάρκεια, μεταμόσχευση οργάνων ή μυελού και τρισωμία 21, μια σπάνια νόσος (βλ. κατάλογο στην αντίστοιχη ενότητα)."
