label: Alerģija pret olām
description: Alerģija pret olām. Alerģija pret olām ir viena no visbiežāk sastopamajām pārtikas alerģijām bērniem (1 līdz 3 % bērnu līdz 3 gadu vecumam). Tā kā ar vecumu tā parasti izzūd, pieaugušajiem šī alerģija ir daudz retāk sastopama. Alerģijas simptomi parasti parādās neilgi pēc olu vai olu saturošu pārtikas produktu, īpaši jēlu vai nepietiekami termiski apstrādātu olu (mājās gatavots šokolādes putas, vārītas olas u. c.), ēšanas. Visbiežāk sastopamās pazīmes ir apsārtums un nieze ap muti, mutes vai rīkles pietūkums, nātrene, vemšana, diskomforts, apgrūtināta elpošana vai zems asinsspiediens. Vistas alerģija. Vistas alerģija ir alerģija pret vistas gaļu, nevis spalvām. Ja domājat, ka Jums varētu būt alerģija pret olām vai vistas gaļu, konsultējieties ar ārstu, ja vēl neesat to izdarījis. Alerģija pret olām vai vistas gaļu var izraisīt kontrindikācijas vai piesardzības pasākumus dažu vakcīnu lietošanai, kas var saturēt olu vai vistas gaļas pēdas.
