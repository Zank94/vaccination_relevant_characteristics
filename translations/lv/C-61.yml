---
label: Zobu ķirurgs
description: Zobu ķirurgi nodrošina mutes dobuma, zobu, smaganu un žokļa kaulu medicīnisko aprūpi. Viņš sniedz atvieglojumus, veic zobu labošanu un rūpējas arī par smaida estētiku. Viņš ārstē dobumus un nopietnākas mutes dobuma infekcijas. Viņi uzstāda protēzes. Tādēļ zobu ķirurgs var saskarties ar asinīm vai citiem bioloģiskiem šķidrumiem.
