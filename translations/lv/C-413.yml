label: Cita imūnsupresīvā ārstēšana
description: "Tie var būt ārstēšanas veidi, ko lieto pacientiem ar autoimūnām slimībām, orgānu vai kaulu smadzeņu transplantāciju vai vēzi (ķīmijterapija, staru terapija). Šāda ārstēšana mazina imūnsistēmas aizsargspējas un pakļauj pacientus paaugstinātam infekcijas riskam, kas var attaisnot noteiktu vakcināciju. Un otrādi, tās var būt kontrindicējošas citām vakcinācijām (īpaši dzīvām vakcīnām). Kad imūnsupresīvā ārstēšana ir pārtraukta, dzīvu vakcīnu ievadīšanas termiņš ir atšķirīgs. Minimālais termiņš ir trīs mēneši. Imunosupresīvās ārstēšanas piemēri (nepilnīgs saraksts): kortikosteroīdi, metotreksāts, ciklosporīns, takrolīms, azatioprīns vai ciklofosfamīds."
