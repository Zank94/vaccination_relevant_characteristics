label: Nopietna anafilaktiska reakcija uz vakcīnu, medikamentiem vai pārtiku anamnēzē.
description: "Anafilakse ir visspilgtākā un bīstamākā alerģijas forma, kas var beigties letāli. Tā var izpausties dažādos klīniskajos veidos, ietekmējot vienu vai vairākus orgānus ar dažādu intensitātes pakāpi: nātrene (izsitumi, kas līdzīgi nātru dzēlieniem), sejas tūska un angioneirotiskā tūska (balsenes spazmas), elpošanas grūtības, astmas lēkme (bronhu spazmas), gremošanas traucējumi (sāpes vēderā, slikta dūša, vemšana, caureja), nespēks (bālums, tuvojošās nāves sajūta, asinsspiediena pazemināšanās), samaņas zudums vai pat koma.Simptomi parasti parādās ļoti ātri, dažu minūšu laikā pēc saskares ar alergēnu. Aptuveni 10 % gadījumu dažas stundas pēc sākotnējās reakcijas parādās otra reakcija: to sauc par bifāzisko anafilaksi, parādību, kas attaisno hospitalizāciju novērošanai pēc anafilakses novērošanas. anafilakse rodas imūnsistēmas šūnu, tuklo šūnu audos un bazofilu asinīs, neatbilstošas aktivizācijas dēļ, kas dažu sekunžu/minūšu laikā izraisa masveida histamīna - molekulas, kas izraisa simptomus - izdalīšanos."
