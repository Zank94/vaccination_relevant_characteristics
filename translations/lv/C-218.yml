label: Skolēnu kārtīgs
description: "Māsas palīgstrādnieks kā aprūpes komandas daļa palīdz māsai ikdienas aprūpes darbos. Sadarbojoties ar māsu un māsas uzraudzībā, aprūpes palīgs nodrošina pacientu higiēnas un komforta aprūpi: mazgāšanos, ēdināšanu, gultu iekārtošanu, pacientu sagaidīšanu, iekārtošanu un pārvietošanu u. c. Viņš rakstiski un mutiski paziņo savus novērojumus, lai nodrošinātu aprūpes nepārtrauktību. Viņi piedalās pasākumu organizēšanā cilvēkiem, kas uzņemti turpmākās aprūpes un rehabilitācijas centros. Viņiem var nākties strādāt naktīs, brīvdienās un svētku dienās. Veselības aprūpes palīgi strādā gan slimnīcās, gan klīnikās."
