---
label: Bioloģisko aģentu iedarbības risks
description: Tas jo īpaši attiecas uz veselības aprūpes profesiju pārstāvjiem (ārstiem, farmaceitiem, medicīnas māsām, vecmātēm, vecmātēm, zobārstiem u. c.) vai nu saistībā ar darbībām, kas saistītas ar bioloģiskiem aģentiem (rūpnieciskā vakcīnu ražošana, medicīniskās analīzes laboratorijas, virusoloģiskie pētījumi u. c.), vai arī saistībā ar iedarbību, ko izraisa profesionālās darbības, kas nav saistītas ar bioloģiskiem aģentiem (cilvēku vai veterinārā veselības aprūpe, lauksaimniecība u. c.).Bioloģisko aģentu iedarbības risks var rasties, saskaroties ar pacientiem, mirušu cilvēku ķermeņiem vai bioloģiskiem produktiem tieši, tostarp izsmidzinot, vai netieši, jo īpaši, pārvietojot un transportējot medicīnas ierīces, bioloģiskos paraugus, veļu vai infekciozus veselības aprūpes atkritumus. Arodslimību ārsts individuāli novērtē ekspozīcijas risku atkarībā no darbinieka ieņemamā amata īpatnībām un nosaka nepieciešamo vakcināciju.
