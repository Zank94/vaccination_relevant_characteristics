label: Cianogēna iedzimta sirds slimība
description: Cianogēna iedzimta sirds slimība ir sirds defekts, kas rodas no dzimšanas un izraisa patoloģisku skābekli saturošu un skābekli nesaturošu asiņu maisījumu sirdī, kā rezultātā rodas cianoze (zilgana ādas un lūpu nokrāsa). Biežāk sastopamie cianogēno iedzimto sirds slimību piemēri ir Fallota tetralogija un lielo asinsvadu transpozīcija. Simptomi ir nogurums, elpošanas grūtības un lēna augšana.
