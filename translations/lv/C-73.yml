---
label: Ātrās palīdzības automašīnas vadītājs
description: "Ātrās palīdzības autovadītāji strādā privātos veselības pārvadājumu uzņēmumos vai veselības aprūpes iestādēs. Pēc ārsta norādījuma vai neatliekamās medicīniskās palīdzības gadījumā viņi pārņem un pārvadā slimus un ievainotus cilvēkus īpaši pielāgotos medicīniskā transporta transportlīdzekļos. Informāciju par pacientu smaguma pakāpi un traumu veidu viņi iegūst no struktūras, kurā viņi strādā: SAMU, slimnīcas, Sarkanā Krusta u. c. Viņi ir pacientu rīcībā, nodrošinot viņu komfortu, nodrošinot ērtības brauciena laikā un var pat iejaukties ārkārtas situācijā, lai sniegtu pirmo palīdzību. Ātrās palīdzības autovadītāji ir atbildīgi par savu transportlīdzekļu uzturēšanu un aprīkojuma sterilizāciju. Viņi var arī palīdzēt pacientiem nokārtot formalitātes, kas saistītas ar iekāpšanu transportlīdzeklī un izkāpšanu no tā."
