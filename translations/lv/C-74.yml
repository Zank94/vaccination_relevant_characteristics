label: Bērnu aprūpes asistents
description: Bērnu aprūpētāja asistents veic agrīnās apmācības un aprūpes pasākumus, kas vērsti uz bērna labklājību, patstāvību un attīstību. Viņu loma ir daļa no visaptverošas pieejas, ņemot vērā aprūpes un saziņas ar ģimeni attiecību dimensiju, kas ir daļa no atbalsta vecākiem. Bērnudārza asistenti piedalās bērnu aprūpē un bērnu ar invaliditāti, hroniskām slimībām vai atstumtības riskam pakļautu bērnu sociālajā integrācijā. Bērnudārza asistenti parasti strādā kā daļa no daudzprofesionālas komandas veselības vai sociālajās iestādēs, sadarbojoties ar medmāsām vai medmāsām un to vadībā.
