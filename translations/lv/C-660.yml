---
label: Brīvprātīgais militārā dienesta stažieris (SMV)
description: SMV ir militāra sociāli profesionālās integrācijas programma, kas paredzēta Francijas kontinentālās daļas jauniešiem vecumā no 18 līdz 25 gadiem ar izglītības un/vai sociālām grūtībām. Vienu gadu šie brīvprātīgie dzīvos internātskolā ar militāro statusu. Militārā uzraudzība palīdzēs viņiem apgūt dzīves prasmes, kas savukārt atvieglos profesionālo zināšanu apguvi. Galu galā mērķis ir padarīt viņus nodarbinātākus darbavietās, kuru viņu reģionā trūkst.
