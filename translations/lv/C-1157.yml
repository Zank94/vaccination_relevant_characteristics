label: Maladie neuromusculaire chronique avec risque de fausse déglutition
description: These are chronic neuromuscular diseases with a risk of false swallowing pneumonia (amyotrophic lateral sclerosis (ALS), myasthenia gravis, muscular dystrophy, polymyositis and dermatomyositis, congenital myasthenic syndromes, Parkinson's disease, stroke).
