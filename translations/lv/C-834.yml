label: Sirpjveida šūnu slimība, ko ārstē ar hidroksiurīnvielu (Hydrea, Siklos)
description: Mazas hidroksiurēzes devas regulāri izraksta sirpjveida šūnu slimības slimniekiem, lai novērstu atkārtotas sāpīgas vazookluzīvas lēkmes gan bērniem, kas vecāki par diviem gadiem, gan pieaugušajiem ar simptomātisku sirpjveida šūnu slimību. Šim nolūkam tiek izrakstītas divas zāles - Hydrea un Siklos. Nav klīnisku pierādījumu, ka mazas hidroksiurēzes devas izraisītu imūnsupresiju sirpjveida šūnu slimniekiem, un pieejamie dati liecina, ka dzīvas vakcīnas, iespējams, varētu ievadīt personām, kuras ārstē ar mazām hidroksiurēzes devām. Tomēr Hydrea, ko lieto bez lietošanas atļaujas sirpjveida šūnu slimniekiem, tirdzniecības atļaujā ir kontrindicēta šo zāļu lietošana kombinācijā ar dzīvām novājinātām vakcīnām. Siklos tirdzniecības atļaujā ir ieteikts hidroksikarbamīdu vienlaikus lietot ar dzīvu vīrusu vakcīnu. Tajā norādīts, ka ārstēšanu ar Siklos un vienlaicīgu imunizāciju ar dzīvu vīrusu vakcīnām drīkst veikt tikai tad, ja ieguvumi ir nepārprotami lielāki par iespējamo risku.
