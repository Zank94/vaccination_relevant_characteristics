label: Persona, kurai ir kovid 19 pazīmes ar pozitīvu RT-PCR testu
description: "Covid 19 var izpausties kā pēkšņa vienas vai vairāku šādu pazīmju parādīšanās: infekcijas pazīmes (drudzis vai drudža sajūta, drebuļi), klepus vai elpošanas diskomforts, neizskaidrojams nogurums, neizskaidrojamas sāpes, galvassāpes, izņemot zināmu migrēnu, ožas un garšas sajūtas zudums vai samazināšanās.Cilvēkiem, kas vecāki par 80 gadiem, liecina arī citas pazīmes: vispārējā stāvokļa pasliktināšanās, atkārtoti kritieni, kognitīvo traucējumu parādīšanās vai pasliktināšanās, apjukums, caureja, hroniskas slimības pasliktināšanās u. c. Kovid 19 diagnosticēšana akūtā fāzē balstās uz vīrusa ģenētiskā materiāla noteikšanu ar uztriepes paņemtā nosa vai deguna blakusdobumu paraugā (RT-PCR tests)."
