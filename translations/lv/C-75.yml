---
label: Medicīnas elektroradioloģijas tehniķis
description: Medicīniskais elektroradioloģijas manipulators ir veselības aprūpes speciālists, kas ir gan aprūpētājs, gan tehniķis. Medicīniskās attēlveidošanas jomā viņi piedalās medicīniskajos izmeklējumos (radioloģiskajos, skenera, magnētiskās rezonanses, kodolmedicīnas, elektrofizioloģijas), kuru mērķis ir noteikt diagnozi.
