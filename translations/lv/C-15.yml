---
label: HBs antigēnu nēsājošo māšu jaundzimušie
description: HBs antigēns (jeb HBsAg) ir B hepatīta vīrusa sastāvdaļa. HBs antigēna nēsāšana nozīmē, ka esat inficēts ar B hepatīta vīrusu. Antigēna nēsāšana var palikt nepamanīta un neizraisīt nekādas B hepatīta pazīmes. Neskatoties uz to, tas var būt infekcijas cēlonis jaundzimušajiem.
