---
label: Hiper IgM sindroms
description: "Šo sindromu raksturo IgG un IgA hipogammaglobulinēmija ar normālu vai paaugstinātu IgM līmeni. Var identificēt vairākas patoloģijas, tostarp:1) Situācijas, ko pavada šūnu imunitātes deficīts:CD40 liganda gēna mutācija, kas kodē CD40 ligandu, molekulu, kura ir iesaistīta izotipiskā pārslēgšanās procesā germinālajā centrā antigēnu stimulācijas laikā;NEMO gēna mutācija.2)Tāpat kā citu hipogammaglobulinēmiju gadījumā dominē elpceļu un LOR infekcijas, ko izraisa inkapsulētas baktērijas (S. pneumoniae, Haemophilus), retāk - piogēni. P. aeruginosa izolē bronhu dilatācijas gadījumos. Bieži sastopamas gremošanas trakta infekcijas, ar augstu giardiozes izplatību: Pneumocystis, kriptosporīdijas, kas izraisa caureju un sklerozējošu holangītu."
