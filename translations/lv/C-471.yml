---
label: Zarnu iekaisuma slimības
description: Zarnu iekaisuma slimība (IBD) ir kuņģa un zarnu trakta slimību grupa, tostarp Krona slimība un čūlainais kolīts, kam raksturīgs pastāvīgs un atkārtots zarnu gļotādas iekaisums. IBD izraisa tādus simptomus kā sāpes vēderā, caureju un asiņošanu no taisnās zarnas, un var būtiski ietekmēt pacientu dzīves kvalitāti. Ārstēšanas mērķis ir kontrolēt iekaisumu un mazināt simptomus.
