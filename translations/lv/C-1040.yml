label: Anti-HAV Ac (IgG vai kopējais Ig, IU/l)
description: Šī seroloģiskā izmeklēšana ir kopējo antivielu (IgG un IgM) pret A hepatīta vīrusu (HAV) noteikšana. Pozitīva seroloģija, kas veikta pirms vakcinācijas (pirmsvakcinācijas seroloģija), norāda, ka A hepatīts jau ir bijis. A hepatīts var rasties bērniem bez jebkādām klīniskām pazīmēm. Cilvēki, kuri ir pārcietuši A hepatītu, ir galīgi pasargāti no šīs slimības, tāpēc vakcinācija pret A hepatītu nav nepieciešama. A hepatīta seroloģisko izmeklēšanu, ko veic pēc vakcinācijas, var izmantot, lai pārbaudītu vakcinācijas efektivitāti, jo īpaši imūnkompromitētiem cilvēkiem. Pozitīvais slieksnis ir 20 IU/l.
