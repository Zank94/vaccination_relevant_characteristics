---
label: Zīdaiņi līdz 6 mēnešu vecumam, priekšlaicīgi dzimuši bērni vai personas, kas cieš no hroniskām slimībām un dzīvo kopā ar šo personu.
description: Tas ir, ja zīdainis ir jaunāks par 6 mēnešiem un viņam ir kāds no šādiem smagas gripas riska faktoriem:ja viņš ir priekšlaicīgi dzimis, jo īpaši, ja viņam ir respiratorās slimības, piemēram, bronhodisplāzija, kas iepriekšējo sešu mēnešu laikā ārstēta ar mehānisko ventilāciju vai ilgstošu skābekļa terapiju, vai ja viņam tiek veikta nepārtraukta ārstēšana (kortikosteroīdi, bronhodilatatori vai diurētiskie līdzekļi), ja viņš slimo ar sirds slimību, ja viņam ir iedzimta imūndeficīta slimība (t.i., iegūta piedzimstot), ja viņš slimo ar plaušu, neiroloģisku vai neiromuskulāru slimību vai tiek ārstēts no ilgstošas slimības.Ja jums ir šaubas, jautājiet padomu savam ārstam. Termins "ģimene" ietver ģimenes vidi (vienā mājsaimniecībā dzīvojošus cilvēkus), aukli un visus citus cilvēkus, kuriem ir regulāra saskare ar bērnu.
