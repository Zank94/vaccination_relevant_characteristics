---
label: Grūtniecības sākuma datums
description: Grūtniecības sākuma datums atbilst apaugļošanās brīdim. Grūtniecība sākas aptuveni 15 dienas pēc pēdējām menstruācijām. Šī informācija ir svarīga, jo dažas vakcinācijas grūtniecēm ir ieteicamas (pret gripu, garo klepu), bet citas ir kontrindicētas (īpaši tās, kurās izmanto dzīvas vakcīnas).
