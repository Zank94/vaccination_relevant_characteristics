---
label: Progresējoša ģeneralizēta sklerodermija
description: Progresējoša ģeneralizēta sklerodermija ir reta hroniska autoimūna slimība, kas skar organisma saistaudus. Tai raksturīga pārmērīga kolagēna veidošanās, kas izraisa ādas, locītavu un iekšējo orgānu sabiezēšanu un sacietēšanu. Slimība var progresēt pakāpeniski un ietekmēt dažādas organisma sistēmas, izraisot tādus simptomus kā locītavu sāpes, stīvums, iekšējo orgānu disfunkcija, ādas čūlas un asinsrites traucējumi. Progresējošas ģeneralizētas sklerodermijas prognozes var būt dažādas, un ārstēšanas mērķis ir mazināt simptomus, kontrolēt iekaisumu un novērst komplikācijas. Ārstēšana var ietvert imūnsupresīvus medikamentus un rūpīgu katram pacientam raksturīgo problēmu risināšanu.
