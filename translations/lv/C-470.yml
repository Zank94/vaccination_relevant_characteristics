---
label: Iekaisuma reimatisms
description: Iekaisuma reimatisms ir vispārējs termins hronisku reimatisku slimību grupai, ko raksturo pastāvīgs locītavu un saistaudu iekaisums. Šīs slimības bieži ir autoimūnas, kas nozīmē, ka imūnsistēma kļūdaini uzbrūk paša organisma audiem, izraisot iekaisumu un locītavu bojājumus. Biežāk sastopamie iekaisuma reimatisma piemēri ir reimatoīdais artrīts, ankilozējošais spondilīts un sistēmiskā sarkanā vilkēde. Tipiski simptomi ir sāpes locītavās, stīvums, pietūkums un nogurums. Ārstēšanas mērķis ir mazināt iekaisumu, mazināt simptomus un novērst neatgriezeniskus locītavu bojājumus, bieži vien izmantojot imūnsupresīvus medikamentus.
