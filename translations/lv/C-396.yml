---
label: Pozitīva A hepatīta seroloģija
description: Šī seroloģiskā izmeklēšana ir kopējo antivielu (IgG un IgM) pret A hepatīta vīrusu (HAV) noteikšana. Pozitīvs seroloģiskais rezultāts norāda uz iepriekšēju saslimšanu ar A hepatītu. A hepatīts var rasties bērniem bez klīniskām pazīmēm. Ja Jūs jau esat saslimuši ar A hepatītu, Jūs noteikti esat pasargāti no šīs slimības un vakcinācija pret A hepatītu nav nepieciešama.
