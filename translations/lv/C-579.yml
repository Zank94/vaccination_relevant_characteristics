---
label: Bioterapija, kas izraisa imunosupresiju
description: Bioterapija ir vērsta pret konkrētu imūno mērķi. Visbiežāk izmanto anti-TNF un anti-IL-1. Tās ir indicētas iekaisuma reimatisma un autoimūno slimību ārstēšanai. Anti-TNF terapija pašlaik ir references terapija smagām un aktīvām reimatoīdā artrīta un spondiloartropātijas formām.Lieto, piemēram, infliksimabu (Inflectra®, Remicade®, Remsima®), adalimumabu (Humira®, Trudexa®), etanerceptu (Enbrel®), anakinru (Kineret®), rituksimabu (MabThera®), abatacept (Orencia®) un brodalumabu (Kyntheum®). Pēc bioterapijas pārtraukšanas dzīvās vakcīnas ievadīšanas termiņš ir atšķirīgs. Minimālais termiņš ir trīs mēneši (seši mēneši pēc ārstēšanas ar rituksimabu).
