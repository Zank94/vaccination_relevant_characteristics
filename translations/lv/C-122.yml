label: Ar B hepatīta vīrusu inficēta persona vai hronisks HBs antigēna nēsātājs apkārtnē
description: Tie ir cilvēki, kas inficēti ar B hepatīta vīrusu (jeb HBV) vai ir HBs antigēna (bioloģiskais marķieris, kas norāda uz hronisku HBV infekciju) nēsātāji. Tie ir cilvēki, kas dzīvo vienā mājsaimniecībā.
