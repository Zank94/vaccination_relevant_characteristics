---
label: Sistēmiskais vaskulīts (smaga forma)
description: Smaga sistēmiskā vaskulīta forma ir asinsvadu iekaisuma slimība, kas var skart vairākus ķermeņa orgānus un audus. Slimībai ir raksturīgs plaši izplatīts asinsvadu iekaisums, kas var izraisīt nopietnus bojājumus. Simptomi bieži ir drudzis, vājums, muskuļu un locītavu sāpes, izsitumi, elpošanas traucējumi, nieru darbības traucējumi, sirdsdarbības traucējumi vai nervu darbības traucējumi atkarībā no skartajiem orgāniem. Smagu sistēmiskā vaskulīta formu ārstēšanā parasti tiek lietoti spēcīgi imūnsupresīvi medikamenti, lai mazinātu iekaisumu un novērstu asinsvadu bojājumus. Rūpīga medicīniskā vadība ir būtiska, lai uzraudzītu un pārvaldītu šo slimību.
