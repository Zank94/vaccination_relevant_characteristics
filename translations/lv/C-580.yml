---
label: Fagocītisko šūnu deficīts (septiskā granulomatozi)
description: Tā ir nespecifiska imūndeficīta slimība, kas tiek pārmantota ar dzimumu saistītas recesīvas pārmantojamības ceļā. Tas izpaužas pirmajos dzīves mēnešos zēniem, inficējoties ar dažādiem mikrobiem, baktērijām vai sēnītēm, ietekmējot ādu, limfātisko sistēmu, bronhopulmonālo koku, aknas un liesu.
