---
label: Smags kombinēts imūndeficīts
description: "Smaga kombinēta imūndeficīta (SCID) jeb alimfocitozes tipa agammaglobulinēmija ir iedzimta slimība ar autosomāli recesīvu iedzimtību. To raksturo T un B limfocītu diferenciācijas defekts. Pastāv vairākas formas: RAG-1 vai RAG-2 proteīna deficīts, Artemis proteīna deficīts, kam raksturīga pārmērīga šūnu jutība pret jonizējošo starojumu. Bērniem DICS izpaužas jau pirmajos dzīves mēnešos ar atkārtotām bakteriālām vai vīrusu infekcijām (citomegalovīruss, Pneumocistis carinii), smagu caureju un aizkavētu augšanu un attīstību. Aizdomīgos gadījumos jāaizliedz dzīvu vakcīnu lietošana un neapstarotu asins pagatavojumu pārliešana. Saslimstība ir aptuveni 1/500 000 dzimušo. Ārstēšana ietver alogēnu hematopoētisko cilmes šūnu transplantāciju. Antenatālā SCID diagnostika būtībā balstās uz dažādu limfocītu populāciju trūkuma un līdz ar to arī to funkciju noteikšanu. Šo diagnozi nosaka 20 grūtniecības nedēļā, ņemot augļa asins paraugus. Ģimenēs, kurās ir konstatēta mutācija RAG gēnā vai kurās ir noteikta ģenētiskā saikne starp slimību un lokusu, kas atrodas 10p hromosomā, pirmsdzemdību diagnozi var noteikt 11 grūtniecības nedēļā, izmantojot trofoblasta biopsiju. Avots: Orphanet."
