label: Pārbaudīta covid 19 vēsture
description: Nepieciešams bioloģisks pierādījums (RT-PCR vai antigēnu tests). Pozitīvs seroloģiskais tests norāda uz iepriekšēju kontaktu ar vīrusu, ja tas veikts pirms vakcinācijas vai vienlaikus ar vakcināciju. Jāaizpilda arī sadaļa par bioloģiskajiem testiem un jārunā ar savu ārstu.
