label: Ilgstoša vai lielu kortikosteroīdu devu terapija
description: 'Attiecībā uz kortikosteroīdu terapiju devas un ilgums, pēc kuru pārsniegšanas dzīvas vakcīnas lietošana ir kontrindicēta (imunosupresīvā kortikosteroīdu terapija), ir šādi.  Pieaugušajiem: 10 mg prednizonam ekvivalenta dienā ilgāk par divām nedēļām. Bērniem: 2 mg/kg prednizonam ekvivalenta dienā (un vairāk nekā 20 mg dienā bērniem, kas sver vairāk nekā 10 kg), ilgāk nekā divas nedēļas. Bolus" kortikosteroīdi kontrindicē dzīvas vakcīnas ievadīšanu turpmākos trīs mēnešus.'
