label: Citas autoimūnās slimības
description: 'Autoimūnās slimības ir ar imūnsistēmu saistītu slimību grupa. Tām raksturīgs organisma imūnšūnu uzbrukums. Šāda veida slimību ārstēšanas mērķis ir nomākt pārmērīgi reaģējošo imūnsistēmu, un to sauc par "imūnsupresantiem". Piemēri: Gūžero-Šēgrena sindroms, dermatomiozīts, polimiozīts.'
