label: Hroniska polipatoloģija
description: "Vismaz divas no šādām slimībām: hroniska obstruktīva plaušu slimība, vēzis (onkoloģisks vai hematoloģisks), aktīvs vai nesen veikta ķīmijterapija, diabēts, smaga hroniska nieru slimība (tostarp tāda, kurai nepieciešama dialīze), komplicēta arteriāla hipertensija, aptaukošanās (;#8805; 30 kg/m2), sirds mazspēja, hroniska elpošanas mazspēja, orgānu vai smadzeņu smadzeņu transplantācija un trisomija 21 - reta slimība (skatīt sarakstu attiecīgajā sadaļā)."
