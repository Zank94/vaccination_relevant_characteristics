---
label: Trombocitopēniska purpura
description: Trombocitopēniska purpura ir saistīta ar trombocītu samazināšanos, kas izraisa nelielas virspusējas asiņošanas uz ādas, ko sauc par purpuru. Trombocītu samazināšanos atklāj asins analīzē. Dažos gadījumos ievērojams trombocītu samazinājums var izraisīt asiņošanu (asiņošana no deguna, asiņošana no mutes, hematomas u. c.).
