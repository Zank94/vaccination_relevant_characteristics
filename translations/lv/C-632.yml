---
label: Datums, kad pēdējo reizi konstatēts saslimšanas gadījums ar garo klepu
description: Jums ir jābūt pārliecinātam, ka jums ir garo klepus klepus (to pierāda ar bioloģisko testu, par ko jums jākonsultējas ar savu ārstu). Tiek lēsts, ka persona, kas ir pārcietuši garo klepu, ir aizsargāta pret jaunu inficēšanos ar garo klepu aptuveni 10 gadus. Ja saslimšana notikusi pirms divu gadu vecuma, vakcinācijas programma tiek turpināta kā parasti.
