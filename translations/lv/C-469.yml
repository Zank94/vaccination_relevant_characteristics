---
label: Periarterīts mezgliņš
description: Periarteritis nodosa, pazīstams arī kā mikroskopisks poliangiīts, ir asinsvadu iekaisuma slimība (vaskulīts), kas galvenokārt skar mazās un vidēja izmēra artērijas. Šī autoimūnā slimība izraisa artēriju sieniņu iekaisumu, kas var izraisīt to sašaurināšanos vai nosprostojumu, traucējot asins plūsmu uz dažādiem orgāniem un audiem. Periarterīta mezglainā iekaisuma simptomi atšķiras atkarībā no tā, kuras artērijas ir skartas, bet tie var būt muskuļu sāpes, drudzis, nogurums un problēmas ar tādiem orgāniem kā nieres, nervi vai kuņģa un zarnu trakts. Ārstēšana parasti ietver imūnsupresīvus medikamentus, lai kontrolētu iekaisumu un novērstu asinsvadu bojājumus.
