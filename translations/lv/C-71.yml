label: Aprūpes palīgs
description: "Māsas palīgstrādnieks kā aprūpes komandas daļa palīdz māsai ikdienas aprūpes darbos. Viņi veicina pacientu labklājību, palīdzot viņiem visos ikdienas dzīves aspektos un palīdzot saglabāt viņu neatkarību. Sadarbībā ar māsu un māsas uzraudzībā māsas palīgstrādnieks veic pacientu higiēnas un komforta aprūpi: mazgāšanu, ēdināšanu, gultu iekārtošanu, pacientu sagaidīšanu, iekārtošanu un pārvietošanu. Aprūpes palīgi strādā gan slimnīcās, gan klīnikās."
