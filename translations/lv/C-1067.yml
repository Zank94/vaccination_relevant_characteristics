---
label: Cieša un ilgstoša saikne ar vietējiem iedzīvotājiem.
description: |-
  Šis jautājums tiek uzdots, jo ciešs un ilgstošs kontakts ar vietējiem iedzīvotājiem var veicināt meningokoka pārnešanu. Meningokoks ir atrodams dažu cilvēku, ko dēvē par "meningokoka nēsātājiem", rīkles dobumos. Meningokoka pārnešanu no viena nēsātāja otram ar siekalu pilieniem (kas pēc tam var izraisīt meningītu) veicina : 
  - ciešs kontakts, t. i., attālumā, kas mazāks par 1 metru (siekalu pilieni ir diezgan smagi un ātri krīt);
  - biežs vai ilgstošs kontakts (piemēram, vairāk nekā stundu). 
   Augsta riska situāciju piemēri uzturēšanās laikā: uzturēšanās pie vietējiem iedzīvotājiem, naktsklubu apmeklēšana, ilgi vai pārpildīti braucieni, kontaktsporta nodarbības, darba prakse skolās, internātskolās utt.
