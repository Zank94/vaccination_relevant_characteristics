---
label: Sistēmiskā sarkanā vilkēde
description: Sistēmiskā sarkanā vilkēde, bieži saīsināti "lupus", ir sistēmiska autoimūna slimība, kas skar dažādus ķermeņa orgānus un audus. Tai raksturīgi iekaisuma simptomi, piemēram, tauriņa formas izsitumi uz sejas, locītavu sāpes, drudzis, nogurums un iekšējo orgānu, piemēram, nieru vai sirds, bojājumi. Lupusu izraisa patoloģiska imūnā reakcija, kuras laikā imūnsistēma uzbrūk paša organisma šūnām un audiem. Slimības gaita ir dažāda, ir gan remisijas, gan paasinājumu periodi. Ārstēšana parasti ietver imūnsupresīvus medikamentus, lai kontrolētu iekaisumu un simptomus.
