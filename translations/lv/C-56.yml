label: Ārsts
description: Kā galvenais profesionālis veselības aprūpes jomā ārsts veic izmeklēšanu, nosaka diagnozi, izraksta testus un izraksta nepieciešamos medikamentus vai ārstēšanu slimnīcā. Viņš uzrauga pacientus un pārvalda viņu vispārējo veselības stāvokli. Ir ģimenes ārsti un ārsti, kas specializējas konkrētā patoloģijā.
