label: Vecmāte
description: Vecmātes uzdevums ir atbalstīt grūtnieces grūtniecības laikā, sākot no diagnozes noteikšanas līdz dzemdībām. Plašākā nozīmē tās nodrošina arī ginekoloģisko uzraudzību. Šajā sarežģītajā profesijā nepieciešamas gan medicīniskās, gan psiholoģiskās prasmes. Vecmātes var veikt arī vakcināciju.
