---
label: Pieaugušie, kuri tuvākajos mēnešos vai gados varētu kļūt par vecākiem.
description: Tie ir pieaugušie, kuri tuvāko mēnešu vai gadu laikā, iespējams, kļūs par vecākiem, tostarp adopcijas ceļā. Šis jautājums tiek uzdots, lai noskaidrotu, vai piemērot kokonēšanas stratēģiju, kas ietver vecāku aizsardzību, lai novērstu zīdaiņu inficēšanos ar baktērijām, kas izraisa garo klepu, ļoti nopietnu ļoti mazu bērnu saslimšanu. Ir arī jautājums par to, vai vakcinācija pret vējbakām būtu ieteicama topošajām māmiņām.
