label: Ģimenes, kas saņem CMU, CMUc vai AME pabalstus
description: Couverture maladie universelle (CMU) ir obligātā veselības apdrošināšana tiem Francijas iedzīvotājiem, kuri vēl nav apdrošināti citā obligātās veselības apdrošināšanas sistēmā. Papildu C.M.U. (CMUc) ir papildu aizsardzības veids (pielīdzināms savstarpējās apdrošināšanas sabiedrībai), ko piešķir, pamatojoties uz ienākumu pārbaudi. Aide Médicale de l'Etat (AME) nodrošina piekļuvi veselības aprūpei ārvalstniekiem, kas uzturas Francijā.
