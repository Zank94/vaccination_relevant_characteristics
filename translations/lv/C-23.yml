---
label: Homozigotā sirpjveida šūnu slimība
description: Homozigotiskā sirpjveida šūnu slimība ir ģenētiska asins slimība, ko raksturo divas hemoglobīna gēna, ko sauc par HbS, patoloģiskas kopijas. Tas izraisa patoloģiska hemoglobīna, hemoglobīna S, veidošanos, kas deformē sarkanos asinsķermenīšus sirpjveida, nevis normālas formas. Šie sirpjveida sarkanie asinsķermenīši var bloķēt asinsvadus, izraisot stipras sāpes, asinsvadu komplikācijas un anēmiju. Homozigotā sirpjveida šūnu slimība ir smaga slimības forma, un tai nepieciešama pastāvīga medicīniska aprūpe.
