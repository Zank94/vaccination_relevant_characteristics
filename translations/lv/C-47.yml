---
label: Imunokompromitēti radinieki
description: Imunokompromitētu cilvēku ģimenes locekļi un draugi ir potenciāls infekcijas ierosinātāju pārnešanas pa gaisu vai ādu avots. Ņemot vērā neskaidrības par vakcinācijas efektivitāti imūnkompromitētiem pacientiem un dzīvu vakcīnu kontrindikāciju šiem pacientiem, ir ļoti ieteicams, lai izveidotu "aizsardzības loku", pārbaudīt tuvākajā apkārtnē esošo cilvēku vakcinācijas statusu un veikt nepieciešamos atjauninājumus saskaņā ar spēkā esošo vakcinācijas grafiku. Par tuvāko apkārtni uzskata jebkuru personu, kas dzīvo vienā mājsaimniecībā vai varētu sniegt aprūpi (bērnu aukle, ģimene, aprūpētājs u. c.), un jebkuru veselības aprūpes personālu, kas varētu aprūpēt šos cilvēkus.
