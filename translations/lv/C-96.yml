label: Strādā veļas mazgātavā
description: 1991. gada 15. marta rīkojums, ar ko izveido to valsts vai privāto profilakses vai aprūpes iestāžu vai organizāciju sarakstu, kurās jāvakcinē pakļautais personāls. Veļas mazgātavas tiek pielīdzinātas šā dekrēta 1. pantā minētajām sabiedriskajām vai privātajām profilakses vai aprūpes iestādēm un organizācijām, ciktāl tās piedalās to darbībā.
