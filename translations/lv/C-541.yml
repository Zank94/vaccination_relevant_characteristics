---
label: "Anti-C5 ārstēšana: Soliris® (eklulizumabs) vai Ultomiris® (ravulizumabs)."
description: Soliris® (ekulizumabs) ir anti-C5A līdzeklis, kas kavē komplementa darbību. Komplements ir olbaltumvielu grupa (C5A ir viena no tām) ar antibakteriālām īpašībām, kam ir svarīga loma iekaisuma un imunitātes procesā. Soliris® ir indicēts pacientu (bērnu vai pieaugušo) ar paroksismālu nakts hemoglobinūriju (PNH) vai atipisku hemolītiski urēmisko sindromu (atipisku HUS) ārstēšanai. Ultomiris® (ravulizumabs) ir indicēts lietošanai pieaugušo pacientu ar PNH ārstēšanai pacientiem, kuriem ir hemolīze ar klīniskajiem simptomiem, kas liecina par augstu slimības aktivitāti, un pacientiem, kuri ir klīniski stabili pēc ārstēšanas ar ekulizumabu vismaz pēdējos 6 mēnešus.
