---
label: Pielāgotā militārā dienesta (SMA) brīvprātīgais praktikants
description: SMA ir militāra programma, kas paredzēta to jauniešu sociālai un profesionālai integrācijai Francijas aizjūras departamentos un teritorijās, kuri ir vecumā no 18 līdz 25 gadiem un kuri ir tālu no darba. Vienu gadu šie brīvprātīgie dzīvos internātskolā ar militāro statusu. Militārā uzraudzība palīdzēs viņiem apgūt dzīves iemaņas, kas savukārt atvieglos profesionālo prasmju apguvi. Galu galā mērķis ir padarīt viņus nodarbinātākus darbavietās, kuru viņu reģionā trūkst.
