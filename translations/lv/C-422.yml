label: Medicīnas sekretāre, pacientu sagaidīšana
description: Medicīnas sekretāre palīdz ārstam un ir pacienta pirmā kontaktpersona, ar kuru viņš sazinās pa tālruni, kad viņš vēlas pierakstīties uz pieņemšanu, vai kad viņš tiek uzņemts ārsta kabinetā vai slimnīcas nodaļā. Viņi pacientus nomierina un atbild uz viņu jautājumiem.
