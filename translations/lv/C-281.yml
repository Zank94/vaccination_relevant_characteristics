---
label: Hroniska obstruktīvā plaušu slimība (HOPS)
description: "Hroniska obstruktīvā plaušu slimība (HOPS) ir izplatīta plaušu slimība, kas samazina gaisa plūsmu un izraisa elpošanas problēmas. To sauc arī par emfizēmu vai hronisku bronhītu.\r

  \r

  HOPS gadījumā izdalījumi var bojāt vai bloķēt plaušas. Simptomi ir klepus (dažreiz ar gļotādu krēpām), apgrūtināta elpošana, sēkšana un nogurums.\r

  \ \r

  Galvenie cēloņi ir smēķēšana un gaisa piesārņojums. Pacientiem ir lielāks risks saslimt ar citām veselības problēmām.\r

  \r

  HOPS nav izārstējama, taču to var mazināt, izvairoties no smēķēšanas un gaisa piesārņojuma un vakcinējoties, lai novērstu infekcijas. To ārstē ar medikamentiem, skābekli un plaušu rehabilitāciju."
