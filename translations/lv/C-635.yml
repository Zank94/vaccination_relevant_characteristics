label: Pacients ar komplementa deficītu vai ārstēts ar Soliris® (ekulizumabu) vai Ultomiris® (ravulizumabu).
description: Atzīmējiet šo lodziņu, ja personai, kas dzīvo vai tiek aprūpēta vienā mājsaimniecībā, ir komplementa deficīts (terminālā frakcija vai properdīns) vai tā tiek ārstēta ar Soliris®.Soliris® (ekulīzumabs) ir anti-C5 līdzeklis, kas kavē komplementa darbību. Komplements ir olbaltumvielu grupa (C5 ir viena no tām) ar antibakteriālām īpašībām, kam ir svarīga loma iekaisuma un imunitātes procesā. Soliris® ir indicēts paroksismālas nakts hemoglobinūrijas (PNH) un atipiska hemolītiski urēmiskā sindroma (atipisks HUS) ārstēšanai. Pacienti ar komplementa deficītu (iedzimtu deficītu vai deficītu, kas saistīts ar ārstēšanu ar Soliris®) ir pakļauti noteiktu infekciju riskam, tāpēc viņu apkārtējiem ir spēkā vakcinācijas ieteikumi.
