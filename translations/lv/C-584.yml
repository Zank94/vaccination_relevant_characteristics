---
label: IgG apakšklases deficīts
description: G tipa imūnglobulīnus veido 4 apakšgrupas, ko sauc par IgG apakšklasēm. Normālā serumā ir četru IgG apakšgrupu maisījums, kurā ir aptuveni 65 % IgG1, 25 % IgG2, 5 % IgG3 un 2,5 % IgG4, kam piemīt specifiskas īpašības, piemēram, IgG2 un IgG4 ir atbildīgas par lielāko daļu imūnās atbildes reakcijas pret kapsulētām baktērijām (pneimokoku, Haemophilus influenzae b tipa).IgG apakšklases trūkums ir atbildīgs par atkārtotām infekcijām (īpaši augšējo elpceļu) un autoimūnām izpausmēm (vaskulītu).
