---
label: Kontaktpersona, kas pakļauta Mpox riskam
description: |-
  Pastāv divas riska situācijas:
  - Ikviena persona, kurai ir bijis neaizsargāts tiešs fizisks kontakts ar iespējamā vai apstiprināta saslimšanas gadījuma ievainoto ādu vai bioloģiskajiem šķidrumiem jebkādos apstākļos, tostarp dzimumakta laikā, medicīniskās vai feldšeru aprūpes laikā, vai koplietojot tualetes piederumus, vai kontaktējoties ar iespējamā vai apstiprināta saslimšanas gadījuma lietotajiem tekstilizstrādājumiem (apģērbu, vannas veļu, gultas veļu) vai netīriem traukiem.
  - Jebkura persona, kurai ir bijis neaizsargāts kontakts 2 metru attālumā no iespējamā vai apstiprinātā saslimšanas gadījuma 3 stundu laikā (kopā 24 stundu laikā) (piemēram, tuvs vai intīms draugs, ierasts seksuālais partneris, pat ja nav bijis dzimumakta, cilvēki, kas uzturas vienā dzīves telpā bez jebkādas intīmas saiknes, kaimiņš, kas dodas tālā ceļā, cilvēki, kas uzturas vienā birojā, veselības aprūpes vai higiēnas procedūrā, vienā skolas klasē, augstskolas TD telpā, sporta klubā, sporta zālēs u. c.).
