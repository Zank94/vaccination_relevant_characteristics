label: BCG vakcinācijas rēta
description: Šis rēta parasti atrodas aiz deltoidālā muskuļa, kur parasti tiek veikta BCG intradermālā injekcija. Tas liecina, ka ir ievadīta šī vakcīna, kas attīsta imūnreakciju pret Koha bacilu (tuberkulozi izraisošo bacilu). Konsultējieties ar savu ārstu, lai iegūtu plašāku informāciju par šo jautājumu.
