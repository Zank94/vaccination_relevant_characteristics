---
label: Studentu ātrās palīdzības autovadītājs
description: "Neatliekamās medicīniskās palīdzības autovadītāji strādā privātā medicīniskā transporta uzņēmumā vai veselības aprūpes iestādē, sniedzot aprūpi un pārvadājot slimos un ievainotos pēc ārsta norādījuma vai neatliekamās medicīniskās palīdzības gadījumā ar īpaši pielāgotiem medicīniskā transporta transportlīdzekļiem ārstēšanas vai diagnostikas vajadzībām. Neatliekamās medicīniskās palīdzības autovadītājs zina savu pacientu ārkārtas stāvokli, uzzinot par viņu stāvokļa nopietnību un traumu veidu, ko viņi guvuši no struktūras, kurā viņš strādā: SAMU, slimnīcas, Sarkanā Krusta u. c. Viņš ir pacientu rīcībā, nodrošinot viņu komfortu, nodrošinot viņiem ērtības brauciena laikā un var pat iejaukties ārkārtas situācijā, lai sniegtu pirmo palīdzību. Ātrās palīdzības autovadītāji ir atbildīgi par savu transportlīdzekļu uzturēšanu un aprīkojuma sterilizāciju. Viņi var arī palīdzēt pacientiem nokārtot formalitātes, kas saistītas ar iekāpšanu transportlīdzeklī un izkāpšanu no tā."
