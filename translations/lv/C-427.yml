---
label: Multiplā skleroze
description: Multiplā skleroze (MS) ir hroniska autoimūna neiroloģiska centrālās nervu sistēmas, īpaši galvas un muguras smadzeņu, slimība. Tai raksturīga demielinizējošu plāksnīšu veidošanās, kad tiek bojāts nervu šķiedras aptverošais aizsargapvalks, kā rezultātā tiek traucēta nervu signālu pārraide. Multiplās sklerozes simptomi ir dažādi, un tie var izpausties kā intensīvs nogurums, redzes traucējumi, koordinācijas traucējumi, nejutīgums, kognitīvie traucējumi un kustību traucējumi. MS parasti attīstās ar recidīviem un remisijām, kad simptomi saasinās, kam seko daļējas atveseļošanās posmi. Lai gan ārstēšana nav iespējama, dažādi ārstēšanas veidi var mazināt simptomus, palēnināt slimības progresēšanu un uzlabot pacientu dzīves kvalitāti.
