---
label: Grūtniecība - Pēdējo menstruāciju datums
description: Notiekoša grūtniecība var būt par iemeslu īpašiem vakcinācijas ieteikumiem vai kontrindikācijām atkarībā no slimības, kas jānovērš, un konkrētās personas. Lai noteiktu grūtniecības sākuma datumu, pieskaita 14 dienas pēdējām menstruācijām.
