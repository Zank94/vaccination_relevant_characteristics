---
label: Psihomotriķis
description: Pēc ārsta norādījuma psihomotriķis palīdz cilvēkiem, kas cieš no dažādiem psihomotoriskiem traucējumiem. Izmantojot relaksācijas tehnikas, kustību izglītību, fiziskās un plastiskās izpausmes un rotaļu, ritma un koordinācijas aktivitātes, psihomotoriķis cenšas novērst psihiskās grūtības, ar kurām var saskarties pieaugušie un bērni. Viņi galvenokārt strādā slimnīcās, bet var strādāt arī privātpraksē.
