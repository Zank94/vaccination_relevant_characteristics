label: IgA deficīts
description: "Selektīvs imūnglobulīna A deficīts ir primārais (vai iedzimtais) imūndeficīts; tas ir visbiežāk sastopamais primārais antivielu deficīts. Rietumos tā sastopamība ir 1/325 cilvēku, tātad tā nav reta slimība. Tā kā IgA antivielas, kurām ir būtiska nozīme gļotādu aizsardzībā pret infekcijām, daļēji vai pilnībā trūkst, slimniekiem, kuriem ir šī slimība, ir atkārtotas elpceļu vai kuņģa un zarnu trakta infekciju epizodes. Tiem var būt arī mainīgs kopējais imūndeficīts, un ir palielināts autoimūno traucējumu biežums. Selektīvā A imūnglobulīna deficīta etioloģija nav noskaidrota, bet 20-25 % gadījumu novērotais ģimenes pārmantojamības faktors liecina par ģenētisku ietekmi. Šai slimībai nav specifiskas ārstēšanas, bet infekcijas ir efektīvi jāārstē. Pacientiem ar selektīvo kopējo IgA deficītu jāinformē veselības aprūpes personāls par savu stāvokli, jo, pārlejot asins pagatavojumus, ir iespējams anafilaktiskas reakcijas risks. Avots: Orphanet."
