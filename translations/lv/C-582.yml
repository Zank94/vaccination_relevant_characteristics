---
label: Kopējais mainīgais imūndeficīts (CVID)
description: Mainīgs vispārējs imūndeficīts (VCIID) ir heterogēna slimību grupa, ko raksturo nezināma iemesla hipogammaglobulinēmija ar specifisku antivielu nepietiekamu veidošanos pēc imunizācijas, kas izraisa atkārtotas bakteriālas infekcijas, parasti ar kapsulētām baktērijām. Tās izplatība Eiropas izcelsmes cilvēkiem tiek lēsta 1:25 000, un tā skar gan vīriešus, gan sievietes.
