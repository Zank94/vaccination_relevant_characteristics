label: Ķirurgs
description: Ķirurgi ir ārsti, kuri praktizē ļoti tehnisku specialitāti. Viņi veic fiziskas iejaukšanās ķermeņa audos, labo nopietnas traumas, koriģē kroplības, ārstē infekcijas, izņem slimus orgānus u. c. Tāpēc ķirurgi ir īpaši pakļauti asins piesārņojumam. Ir daudz ķirurģijas specialitāšu.
