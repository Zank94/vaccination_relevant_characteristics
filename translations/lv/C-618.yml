label: Atteikšanās no meningokoka ACWY vakcinācijas
description: "Bieži saukta par meningīta vakcīnu, tā novērš nopietnas infekcijas (meningītu vai septicēmiju), ko izraisa A, C, W vai Y serogrupas meningokoki. Francijā tiek pārdotas divas šāda veida vakcīnas: Menveo vakcīna un Nimenrix vakcīna."
