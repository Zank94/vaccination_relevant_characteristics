---
label: Smaga hroniska neitropēnija
description: Pacientiem ar hronisku neitropēniju neitrofilu skaits pastāvīgi vai atkārtoti samazinās zem 1500 uz mm3, padarot tos uzņēmīgus pret bakteriālām infekcijām (stafilokokiem, streptokokiem, gramnegatīviem baciļiem) un mikotiskām infekcijām (kandidozi, sistēmisku aspergilozi). Tās cieš arī no gingivostomatīta. Smaga neitropēnija tiek definēta kā neitrofilu skaits, kas mazāks par 500 mm3.
