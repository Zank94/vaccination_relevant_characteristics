label: Grūtniece svītā
description: "Personas, kurām vajadzētu atzīmēt šo lodziņu, ir: grūtnieces laulātais un bērni; personas, kas varētu būt ciešā un ilgstošā kontaktā ar nedzimušo bērnu pirmos 6 mēnešus (tostarp vecvecāki, aukles u. c.). Bet tikai tad, ja grūtniece nav vakcinēta pret garo klepu."
