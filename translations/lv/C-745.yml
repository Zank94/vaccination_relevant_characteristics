label: Nesenais kontakts ar covid 19 gadījumu
description: 'Nesens kontakts: pēdējais kontakts pēdējo 10 dienu laikā. Kontaktpersona, kas pakļauta riskam, ir persona, kura, ja kontakta laikā nav veikti efektīvi aizsardzības pasākumi,ir dzīvojusi vienā dzīves telpā ar apstiprinātu vai varbūtēju saslimšanas gadījumu;ir bijusi tiešā tiešā saskarsmē ar saslimušo personu mazāk nekā viena metra attālumā uz jebkuru laiku (piemēram, saruna, ēdināšana, flirts, apskāvieni, skūpsti). Tomēr par riska kontaktpersonām neuzskata cilvēkus, kas īslaicīgi sastapušies sabiedriskā vietā;ir veicis vai saņēmis higiēnas vai aprūpes pakalpojumus;ir uzturējies ar saslimušo slēgtā telpā (birojā vai sanāksmju telpā, personīgajā transportlīdzeklī u. c.) vismaz 15 minūtes pēc kārtas vai kumulatīvi 24 stundu laikā vai ir bijis ar saslimušo aci pret aci vairāku klepus vai šķaudīšanas epizožu laikā;ir skolēns vai skolotājs vienā skolas klasē (bērnudārzā, pamatskolā, vidusskolā, augstskolas mācību grupā).Ierobežota telpa ir tāda telpa, kurā nav iespējams izpildīt sociālā attāluma kritēriju, t. i., minimālais attālums ap personu ir 2 m. Visbeidzot, par efektīviem aizsardzības līdzekļiem netiek uzskatīti šādi līdzekļi: uz letes novietota lokšņu plākšņu loksne, "paštaisītas" auduma maskas un caurspīdīgi plastmasas aizsegi, ko valkā vienatnē.'
