---
label: Persona ar ilgstošiem kovid 19 simptomiem (long covid)
description: Nav vienprātības par to, kā definēt pacientu grupu ar ilgstošiem simptomiem (dažkārt dēvēta par "covid long"). Tie ir cilvēki, kuriem simptomi saglabājas ilgāk nekā 3, 4 vai pat 12 nedēļas pēc infekcijas sākuma, un šo ilgstošo simptomu biežums dažādos pētījumos atšķiras, bet dažkārt pārsniedz 50 %. Visbiežāk ziņotie ilgstoši simptomi ir nogurums, sāpes locītavās, sāpes krūtīs, sirdsklauves, elpošanas grūtības, kognitīvo spēju pasliktināšanās un dzīves kvalitātes pasliktināšanās.
