---
label: Citi nopietnas pneimokoku infekcijas riska faktori (bērniem)
description: |-
  Bērnu grupas ar augstu invazīvās pneimokoku infekcijas risku ir :
  - inficēšanās ar cilvēka imūndeficīta vīrusu (HIV)
  - sirpjveida šūnu slimība, funkcionāla vai anatomiska asplēnija
  cerebrāli-meningeālās barjeras defekts/fistula
  - Kochleārais implants
  - Hroniskas slimības, piemēram, sirds un asinsvadu slimības, plaušu slimības (izņemot astmu), aknu slimības, nefrotiskais sindroms, diabēts.
  - konstitucionāli imūndeficīti (tostarp komplementa un properdīna deficīts) vai imunosupresīvas ārstēšanas (limfomas, leikēmijas, vēzis, orgānu transplantācija) sekundāri izraisīti imūndeficīti.
   - Priekšlaicīgi dzimušiem bērniem, kuru gestācijas vecums ir mazāks par 32 nedēļām, un zīdaiņiem, kuru dzimšanas svars ir mazāks par 1500 g, ir augsts invazīvās pneimokoku infekcijas risks, kas īslaicīgi pastāv līdz 24 mēnešu vecumam.
