---
label: Zobārsta asistents
description: Zobārsta asistenta darbs ir veikt tīrīšanas un sterilizācijas operācijas. Viņi var darboties arī kā operāciju asistenti. Zobārsta asistenti ir pakļauti B hepatīta vīrusa iedarbībai, jo viņi strādā ar asiem priekšmetiem pēc tam, kad tie ir izmantoti pacientam. Pētījumā, kas veikts no 1995. līdz 2001. gadam ASV, 75 % nelaimes gadījumu, kas saistīti ar saskarsmi ar asinīm, notika zobārstniecības praksēs.
