label: Farmaceits
description: Farmaceiti ir zāļu speciālisti. Viņi ir atbildīgi par ārsta izrakstīto zāļu izsniegšanu slimnīcā vai vietējā aptiekā, pārbaudot, vai nav mijiedarbības vai citu faktoru, kas varētu ietekmēt ārstēšanas drošību vai efektivitāti. Farmaceitiem ir arī citas funkcijas, piemēram, profilakses jomā. Tagad viņiem ir atļauts vakcinēt pieaugušos pret gripu.
