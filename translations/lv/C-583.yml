label: Brutona slimība (ar X saistītā agammaglobulinēmija)
description: "X saistītā agammaglobulinēmija izpaužas ar atkārtotām bakteriālām infekcijām elpceļos un gremošanas traktā un predisponē uz hronisku enterovīrusu infekciju risku. Tās sastopamība ir aptuveni 1/200 000 dzimušo. Tā ir saistīta ar imūnglobulīnu veidošanās trūkumu. Tā ir ar X saistīta recesīvi pārmantota pārmantota slimība. Slimību izraisa mutācijas gēnā, kas kodē Btk tirozīnkināzi. Tai raksturīga B limfocītu nenobriešana. Ārstēšana galvenokārt balstās uz regulāru imūnglobulīnu ievadīšanu vēnā vai zemādas ceļā (avots: Orphanet)."
