---
label: Anderer Risikofaktor für eine schwere Pneumokokkeninfektion (Kind)
description: |-
  Kindergruppen mit hohem Risiko für eine invasive Pneumokokkeninfektion sind :
  - Infektion mit dem Human Immunodeficiency Virus (HIV).
  - Sichelzellenanämie, funktionelle oder anatomische Asplenie
  Defekt/Fistel der Zerebral-Meningus-Schranke
  - Cochlea-Implantat
  - Chronische Erkrankungen wie Herz-Kreislauf-Erkrankungen, Lungenerkrankungen (außer Asthma), Lebererkrankungen, nephrotisches Syndrom, Diabetes.
  - Konstitutionelle Immundefekte (einschließlich Komplement- und Properdinmangel) oder sekundäre Immundefekte nach immunsuppressiver Behandlung (Lymphome, Leukämie, Krebs, Organtransplantationen).
  - Frühgeborene mit einem Gestationsalter von weniger als 32 Wochen und Säuglinge mit einem Geburtsgewicht von weniger als 1500 g haben vorübergehend bis zum Alter von 24 Monaten ein hohes Risiko einer invasiven Pneumokokkeninfektion.
