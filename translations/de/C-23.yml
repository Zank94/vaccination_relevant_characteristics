---
label: Homozygote Sichelzellenanämie
description: Die homozygote Sichelzellenanämie ist eine genetische Blutkrankheit, bei der zwei abnormale Kopien des Hämoglobin-Gens, das als HbS bezeichnet wird, vorhanden sind. Dies führt zur Produktion von abnormalem Hämoglobin, Hämoglobin S, das die roten Blutkörperchen statt zu ihrer normalen Form zu einer Sichel verformt. Diese sichelförmigen roten Blutkörperchen können die Blutgefäße verstopfen, was zu starken Schmerzattacken, Gefäßkomplikationen und Anämie führt. Die homozygote Sichelzellenanämie ist eine schwere Form der Krankheit und erfordert eine ständige medizinische Versorgung.
