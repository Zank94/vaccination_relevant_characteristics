---
label: Apotheker
description: Der Apotheker ist ein Spezialist für Arzneimittel. Er ist im Krankenhaus oder in einer Stadtapotheke dafür zuständig, die von einem Arzt verschriebenen Medikamente abzugeben und dabei zu überprüfen, dass keine Wechselwirkungen oder andere Faktoren vorliegen, die die Sicherheit oder Wirksamkeit der Behandlung beeinflussen könnten. Der Apotheker hat noch weitere Aufgaben, z. B. im Bereich der Prävention. Er darf nun auch Erwachsene gegen Grippe impfen.
