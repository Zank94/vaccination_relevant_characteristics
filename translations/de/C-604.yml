---
label: Risiko der Exposition gegenüber biologischen Arbeitsstoffen
description: Betrifft insbesondere die Gesundheitsberufe (Arzt, Apotheker, Krankenschwester, Hebamme, Zahnarzt usw.), entweder aufgrund von Tätigkeiten mit biologischen Arbeitsstoffen (industrielle Impfstoffherstellung, Labor für medizinische Analysen, virologische Forschung usw.) oder aufgrund von Expositionen, die durch die berufliche Tätigkeit verursacht werden, ohne dass diese biologische Arbeitsstoffe zum Gegenstand hat (Gesundheitsversorgung von Menschen oder Tieren, Landwirtschaft usw.).Das Risiko einer Exposition gegenüber biologischen Arbeitsstoffen kann durch den Kontakt mit Patienten, dem Körper von Verstorbenen oder biologischen Produkten entstehen, entweder direkt, auch durch Spritzen, oder indirekt, insbesondere bei der Handhabung und dem Transport von medizinischen Geräten, biologischen Proben, Wäsche oder infektiösen Abfällen aus der Gesundheitsfürsorge. Der Arbeitsmediziner beurteilt das Expositionsrisiko individuell anhand der Merkmale des Arbeitsplatzes, den diese Personen innehaben, und verschreibt die erforderlichen Impfungen.
