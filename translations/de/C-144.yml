---
label: Familie, die die CMU, CMUc oder AME erhält
description: Die Couverture maladie universelle (CMU) ist ein obligatorischer Krankenversicherungsschutz für Personen, die in Frankreich wohnen und nicht bereits durch ein anderes obligatorisches Krankenversicherungssystem abgedeckt sind. Die C.M.U. complémentaire (CMUc) ist ein ergänzender Schutz (vergleichbar mit einer Krankenkasse), der aufgrund von Bedürftigkeitskriterien gewährt wird. Die Aide Médicale de l'Etat (AME) ermöglicht ausländischen Personen, die sich in Frankreich aufhalten, den Zugang zur Gesundheitsversorgung.
