---
label: Freiwilliger Praktikant des angepassten Militärdienstes (SMA)
description: Die SMA ist eine militärische Maßnahme zur sozialen und beruflichen Eingliederung für arbeitsmarktferne Jugendliche zwischen 18 und 25 Jahren in den Überseegebieten. Ein Jahr lang leben diese Freiwilligen in einem Internat unter militärischen Bedingungen. Die militärische Betreuung wird ihnen helfen, sich ein "savoir-être" anzueignen, das ihnen später den Erwerb von beruflichem Know-how erleichtern wird. Langfristig soll ihre Beschäftigungsfähigkeit in einem angespannten Beruf und in ihrer Region gefördert werden.
