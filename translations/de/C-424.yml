label: Akuter disseminierter Lupus erythematodes
description: Der akute systemische Lupus erythematodes, oft auch als "Lupus" abgekürzt, ist eine systemische Autoimmunkrankheit, die verschiedene Organe und Gewebe des Körpers befällt. Sie ist gekennzeichnet durch Entzündungssymptome wie schmetterlingsförmige Hautausschläge im Gesicht, Gelenkschmerzen, Fieber, Müdigkeit und die Beeinträchtigung innerer Organe wie der Nieren oder des Herzens. Lupus wird durch eine abnormale Immunreaktion verursacht, bei der das Immunsystem die eigenen Zellen und Gewebe des Körpers angreift. Sein Verlauf ist unterschiedlich, mit Perioden der Remission und Krankheitsschüben. Die Behandlung umfasst in der Regel immunsuppressive Medikamente, um die Entzündung und die Symptome zu kontrollieren.
