---
label: Schwangere Frau in der Umgebung
description: "Zu den Personen, die dieses Kästchen ankreuzen müssen, gehören: der Ehepartner und die Kinder der schwangeren Frau; alle Personen, die in den ersten sechs Monaten in engem und dauerhaftem Kontakt mit dem zukünftigen Säugling stehen könnten (dies kann Großeltern, Babysitter usw. betreffen). Aber nur, wenn die schwangere Frau nicht gegen Keuchhusten geimpft ist."
