label: Frühere schwere anaphylaktische Reaktion auf einen Impfstoff, ein Medikament oder ein Nahrungsmittel
description: "Die Anaphylaxie ist die spektakulärste und gefährlichste Form einer Allergie und kann tödlich enden. Sie kann verschiedene klinische Formen annehmen, die ein oder mehrere Organe mit unterschiedlicher Intensität betreffen: Urtikaria (brennnesselartiger Ausschlag), Gesichts- und Angioödem (Kehlkopfkrampf), Atembeschwerden, Asthmaanfall (Bronchialkrampf), Verdauungssymptome (Bauchschmerzen, Übelkeit, Erbrechen, Durchfall), Unwohlsein (Blässe, Todesangst, Blutdruckabfall), Bewusstlosigkeit oder Koma.Die Symptome treten meist sehr schnell auf, innerhalb von Minuten nach dem Kontakt mit dem Allergen. Eine Anaphylaxie entsteht durch eine unangemessene Aktivierung von Zellen des Immunsystems, den Mastzellen im Gewebe und den Basophilen im Blut, die innerhalb von Sekunden/Minuten zu einer massiven Freisetzung von Histamin führt, dem Molekül, das die Symptome hervorruft."
