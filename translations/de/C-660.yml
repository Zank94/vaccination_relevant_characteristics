---
label: Freiwilliger Praktikant des freiwilligen Militärdienstes (VMS)
description: Der VMS ist eine militärische Maßnahme zur sozio-professionellen Eingliederung zugunsten von Jugendlichen aus dem Mutterland im Alter von 18 bis 25 Jahren mit schulischen und/oder sozialen Schwierigkeiten. Ein Jahr lang leben diese Freiwilligen in einem Internat mit militärischem Status. Die militärische Betreuung wird ihnen helfen, sich ein "savoir-être" anzueignen, das später den Erwerb von beruflichem Know-how erleichtern wird. Letztendlich soll ihre Beschäftigungsfähigkeit in einem angespannten Beruf und in ihrer Region gefördert werden.
