---
label: Beschäftigte/r in einem Bestattungsunternehmen, das mit einer Vorsorge- oder Gesundheitseinrichtung verbunden ist
description: Artikel 1 von http://www.legifrance.gouv.fr/affichTexte.do?cidTexte=LEGITEXT000020375184 der Verordnung vom 15. März 1991 legt die Liste der öffentlichen oder privaten Einrichtungen oder Organisationen der Prävention oder Pflege fest, in denen Personen, die Ansteckungsrisiken ausgesetzt sind, gegen Hepatitis B, Diphtherie, Tetanus und Poliomyelitis immunisiert werden müssen, wenn sie eine berufliche Tätigkeit ausüben.Bestattungsunternehmen werden den in Artikel 1 genannten Einrichtungen und Organisationen gleichgestellt, da sie an deren Tätigkeit beteiligt sind.
