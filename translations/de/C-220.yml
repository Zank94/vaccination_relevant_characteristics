label: Schülerin Kinderpflegerin
description: Kinderpflegerinnen und Kinderpfleger führen Anregungen und Pflegemaßnahmen durch, die auf das Wohlbefinden, die Selbstständigkeit und die Entwicklung des Kindes abzielen. Ihre Rolle ist Teil eines ganzheitlichen Ansatzes und berücksichtigt die Beziehungsdimension der Pflege sowie die Kommunikation mit der Familie im Rahmen der Unterstützung der Elternschaft. Sie arbeiten meist in einem multiprofessionellen Team und in Einrichtungen des Gesundheits- oder Sozialwesens in Zusammenarbeit mit und unter der Verantwortung von Krankenschwestern oder Kinderkrankenschwestern.
