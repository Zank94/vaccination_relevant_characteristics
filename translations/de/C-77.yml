label: Techniker/in für biomedizinische Analysen
description: Der Techniker für medizinisch-biologische Analysen ist für die Durchführung medizinisch-biologischer Untersuchungen zuständig, die es dem Arzt ermöglichen, eine Diagnose zu bestätigen oder eine Krankheit zu erkennen. Der Beruf kann sowohl in einem Krankenhaus, einer Klinik oder in der Stadt ausgeübt werden.
