---
label: Chronische Polypathologie
description: "Mindestens zwei der folgenden Erkrankungen: chronisch obstruktive Lungenerkrankung, Krebs (onkologisch oder hämatologisch), der aktiv ist oder kürzlich eine Chemotherapie erhalten hat, Diabetes, schwere chronische Nierenerkrankung (einschließlich dialysepflichtiger Erkrankungen), komplizierter Bluthochdruck, Fettleibigkeit (;#8805; 30 kg/m2), Herzversagen, chronische Atemwegserkrankung, Organ- oder Knochenmarktransplantation und Trisomie 21, eine seltene Erkrankung (siehe Liste im entsprechenden Abschnitt)."
