---
label: Chronische neuromuskuläre Erkrankungen mit dem Risiko eines falschen Schluckens
description: Dazu gehören chronische neuromuskuläre Erkrankungen mit dem Risiko einer Pneumopathie durch falsches Schlucken (Amyotrophe Lateralsklerose (ALS), Myasthenia gravis, Muskeldystrophie, Polymyositis und Dermatomyositis, angeborene myasthenische Syndrome, Parkinson-Krankheit, Schlaganfall).
