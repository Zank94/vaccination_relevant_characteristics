label: "Schwangerschaft: Vorzugsweise sollte das Kind bei der Geburt gegen RSV immunisiert werden"
description: "Um einer Bronchiolitis (RSV-Infektion) bei Säuglingen vorzubeugen, gibt es zwei Möglichkeiten: die Impfung der Mutter während der Schwangerschaft oder die Verabreichung von RSV-Antikörpern an das Neugeborene."
