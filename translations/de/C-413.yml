label: Andere immunsuppressive Behandlung
description: "Es kann sich um Behandlungen handeln, die bei Patienten mit Autoimmunerkrankungen, Organ- oder Knochenmarktransplantationen oder Krebs (Chemotherapie, Strahlentherapie) durchgeführt werden. Diese Behandlungen senken die Immunabwehr und setzen Sie einem erhöhten Infektionsrisiko aus, das bestimmte Impfungen rechtfertigen kann. Umgekehrt können andere Impfungen (insbesondere mit Lebendimpfstoffen) kontraindiziert sein. Nach dem Absetzen einer immunsuppressiven Therapie ist die Frist für die Verabreichung eines Lebendimpfstoffs unterschiedlich lang. Sie beträgt mindestens drei Monate. Beispiele für immunsuppressive Behandlungen (nicht erschöpfende Liste): Kortikosteroide, Methotrexat, Ciclosporin, Tacrolimus, Azathioprin oder Cyclophosphamid."
