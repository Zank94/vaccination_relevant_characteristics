label: Nachgewiesene Vorgeschichte von Covid 19
description: Ein biologischer Nachweis ist erforderlich (RT-PCR oder Antigen-Test). Eine positive Serologie zeugt von einem früheren Kontakt mit dem Virus, wenn sie vor der Impfung oder gleichzeitig mit der Impfung durchgeführt wird. Füllen Sie auch den Abschnitt Biologische Untersuchungen aus und sprechen Sie mit Ihrem Arzt darüber.
