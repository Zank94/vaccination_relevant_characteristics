---
label: Periarteritis nodosa
description: Die Periarteritis nodosa, auch mikroskopische Polyangiitis genannt, ist eine entzündliche Erkrankung der Blutgefäße (Vaskulitis), die vor allem die kleinen und mittleren Arterien befällt. Diese Autoimmunerkrankung führt zu einer Entzündung der Arterienwände, was zu einer Verengung oder Blockierung der Arterien führen kann, wodurch der Blutfluss zu verschiedenen Organen und Geweben gestört wird. Die Symptome der Periarteriitis nodosa variieren je nach den betroffenen Arterien, können aber Muskelschmerzen, Fieber, Müdigkeit und Probleme mit Organen wie Nieren, Nerven oder dem Magen-Darm-Trakt umfassen. Die Behandlung umfasst in der Regel immunsuppressive Medikamente, um die Entzündung zu kontrollieren und Gefäßschäden zu verhindern.
