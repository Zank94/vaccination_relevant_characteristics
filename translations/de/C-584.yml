label: Mangel an IgG-Unterklassen
description: Immunglobuline vom Typ G bestehen aus vier Untergruppen, die als IgG-Unterklassen bezeichnet werden. Normales Serum enthält eine Mischung aus allen vier IgG-Unterklassen mit etwa 65 % IgG1, 25 % IgG2, 5 % IgG3 und 2,5 % IgG4.Sie haben besondere Eigenschaften, z. B. sind IgG2 und IgG4 für den Großteil der Immunantwort gegen eingekapselte Bakterien (Pneumokokken, Haemophilus influenzae Typ b) verantwortlich.Ein Mangel an IgG-Subklassen ist für wiederholte Infektionen (insbesondere der oberen Luftwege) und Autoimmunerkrankungen (Vaskulitis) verantwortlich.
