---
label: Krankenschwester/-pfleger
description: Krankenschwestern und Krankenpfleger arbeiten in freiberuflichen Praxen, Gesundheitszentren, Krankenhäusern oder Vorsorgeeinrichtungen. Krankenschwestern und Krankenpfleger führen die von Ärzten verordnete Pflege durch und können bestimmte Maßnahmen selbst verordnen. Das Risiko, bestimmten Infektionskrankheiten ausgesetzt zu sein, hängt mit den Arbeitsbedingungen zusammen.
