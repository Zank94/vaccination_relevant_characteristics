label: Pflegehelfer/in
description: "Als Teil eines Pflegeteams unterstützt der Krankenpflegehelfer die Krankenschwester bei den täglichen Pflegetätigkeiten. Sie trägt zum Wohlbefinden der Patienten bei, indem sie sie bei allen Handlungen des täglichen Lebens begleitet und ihnen hilft, ihre Selbstständigkeit zu erhalten. In Zusammenarbeit mit der Krankenschwester und unter ihrer Verantwortung führt die Krankenpflegehelferin die Hygiene- und Komfortpflege des Kranken durch: Waschen, Essen, Betten machen, Aufnahme, Unterbringung und Verlegung der Patienten. Der Beruf des Krankenpflegehelfers wird sowohl in Krankenhäusern als auch in Kliniken ausgeübt."
