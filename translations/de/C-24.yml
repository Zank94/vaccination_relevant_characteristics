---
label: HIV-Infektion
description: HIV (oder HIV) steht für Human Immunodeficiency Virus. Es ist ein Virus, das die Immunabwehr des Körpers angreift und zu einer Immunschwäche führen kann, die ein erhöhtes Risiko für virale oder bakterielle Infektionen mit sich bringt. Das Ausmaß des Defizits hängt vom Wert der Immunzellen ab, die als CD4 bezeichnet werden.
