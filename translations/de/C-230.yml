label: Technikerschüler für biomedizinische Analysen
description: "Der Medizinisch-biologische Analytiker ist für die Durchführung von medizinisch-biologischen Untersuchungen zuständig, die es dem Arzt ermöglichen, eine Diagnose zu bestätigen oder eine Krankheit zu erkennen. Auf der Grundlage der ärztlichen Verschreibungen führt er die Untersuchungen durch: Er sucht im Blut oder in Körperflüssigkeiten, die der Arzt entnommen hat, nach möglichen Anomalien und nimmt Blutproben.Dieser Berufsangehörige bereitet die Instrumente und die zu verwendenden Produkte vor. Nach der Durchführung der Untersuchung übermittelt er die Ergebnisse an den zuständigen Biologen, der sie validiert und interpretiert. Der Beruf kann in Krankenhäusern, Kliniken oder in der Stadt ausgeübt werden.In Krankenhäusern muss dieser Beruf manchmal eine therapeutische Betreuung in Verbindung mit den Patienten und dem Pflegepersonal sicherstellen und kann bei sehr spezialisierten Untersuchungen mitwirken.Wenn er in einem privaten Labor in der Stadt arbeitet, übernimmt der Techniker für medizinisch-biologische Analysen verschiedene Aufgaben: Entnahme von Proben, Ablesen und Weiterleiten der Ergebnisse. Er ist vielseitig tätig und kann verschiedene Bereiche der medizinischen Biologie abdecken: Hämatologie, Biochemie, Mikrobiologie, Immunologie usw."
