---
label: Zahnarzt
description: Der Zahnarzt befasst sich medizinisch mit dem Mund, den Zähnen, dem Zahnfleisch und den Kiefern. Er lindert, repariert und sorgt auch für die Ästhetik des Lächelns. Er behandelt Karies und schwerere Infektionen der Mundhöhle. Er setzt Prothesen ein. Der Zahnarzt kann daher mit Blut oder anderen biologischen Flüssigkeiten in Berührung kommen.
