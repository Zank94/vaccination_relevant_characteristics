---
label: Hämophilie
description: Hämophilie ist eine Gerinnungsstörung, die auf einen Mangel an gerinnungsfördernden Proteinen zurückzuführen ist. Dies führt zu häufigeren Blutungen und Hämatomen bei der kleinsten Verletzung. Die Krankheit wird meist bei der Geburt erworben. Im Erwachsenenalter auftretende Formen sind die Ausnahme.
