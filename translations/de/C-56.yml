---
label: Arzt
description: Der Arzt ist der zentrale Beruf im Gesundheitswesen. Er untersucht, stellt eine Diagnose, ordnet Untersuchungen an und verordnet die erforderliche pharmazeutische oder stationäre Behandlung. Er betreut seine Patienten und verwaltet deren Gesundheit ganzheitlich. Es gibt Allgemeinmediziner und Ärzte, die sich auf eine bestimmte Krankheit spezialisiert haben.
