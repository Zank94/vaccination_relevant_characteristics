label: Bruton-Krankheit (X-bedingte Agammaglobulinämie)
description: "Die X-chromosomale Agammaglobulinämie äußert sich in rezidivierenden bakteriellen Infektionen der Atemwege und des Verdauungstrakts und prädisponiert für das Risiko chronischer Infektionen mit Enteroviren. Die Inzidenz liegt bei etwa 1/200.000 Geburten. Sie hängt mit der fehlenden Produktion von Immunglobulinen zusammen. Es handelt sich um eine Erbkrankheit, die X-gebunden rezessiv vererbt wird. Die Krankheit wird durch Mutationen des Gens verursacht, das für die Tyrosinkinase Btk kodiert. Sie ist durch einen Reifungsfehler der B-Lymphozyten gekennzeichnet. Die Behandlung beruht hauptsächlich auf der regelmäßigen Verabreichung von Immunglobulinen über die Vene oder subkutan (Quelle: Orphanet)."
