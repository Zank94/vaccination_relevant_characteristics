---
label: Person mit lang anhaltenden Symptomen von Covid 19 (Covid lang)
description: Die Definition der Gruppe von Patienten mit lang anhaltenden Symptomen (manchmal auch als "covid long" bezeichnet) ist nicht konsensfähig. Die Häufigkeit von lang anhaltenden Symptomen ist von Studie zu Studie unterschiedlich, liegt aber manchmal bei über 50 %. Die am häufigsten berichteten lang anhaltenden Symptome sind Müdigkeit, Gelenkschmerzen, Brustschmerzen, Herzklopfen, Atembeschwerden, eine Verschlechterung des kognitiven Zustands und eine Abnahme der Lebensqualität.
