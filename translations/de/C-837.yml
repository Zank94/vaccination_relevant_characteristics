label: Person mit Anzeichen von Covid 19 und einem positiven RT-PCR-Test
description: Covid 19 kann sich durch das plötzliche Auftreten eines oder mehrerer der folgenden Anzeichen bemerkbar machen:Infektionszeichen (Fieber oder Fiebergefühl, Schüttelfrost),Husten oder Atembeschwerden, unerklärliche Müdigkeit, unerklärlicher Muskelkater,Kopfschmerzen außerhalb einer bekannten Migräne,Verlust oder Verminderung des Geruchs- und Geschmackssinns.Die Diagnose von Covid 19 in der akuten Phase beruht auf dem Nachweis des genetischen Materials des Virus in einer Nasopharyngeal- oder Rhinopharyngealprobe, die mit einem Tupfer entnommen wurde (RT-PCR-Test).
