label: Arbeitet in einer Einrichtung zur Betreuung von Kindern im Vorschulalter (Kinderkrippe, Kinderhort...).
description: Einrichtungen, Dienste und Zentren, die Kinder unter sechs Jahren aufnehmen; erwähnt in Artikel L.2324-1 des Gesetzbuchs über das öffentliche Gesundheitswesen. Erlass vom 15. März 1991 zur Festlegung der Liste der öffentlichen oder privaten Einrichtungen oder Organisationen der Prävention oder Pflege, in denen das exponierte Personal geimpft werden muss.
