---
label: Schwerer kombinierter Immundefekt
description: "Der schwere kombinierte Immundefekt (SCID) oder Agammaglobulinämie Typ Alymphocytose ist ein erblicher Defekt, der autosomal-rezessiv vererbt wird. Er ist durch einen Mangel an Differenzierung von T- und B-Lymphozyten gekennzeichnet. Es gibt verschiedene Formen: Mangel an RAG-1- oder RAG-2-Protein, Mangel an Artemis-Protein, der durch eine übermäßige Empfindlichkeit der Zellen gegenüber ionisierenden Strahlen gekennzeichnet ist. ICSD äußert sich bei Kindern ab den ersten Lebensmonaten durch wiederkehrende bakterielle oder virale Infektionen (Cytomegalovirus, Pneumocistis carinii), schwere Diarrhöe und eine Verzögerung der Staturopondie. Bei verdächtigen Personen sollte die Verwendung von Lebendimpfstoffen sowie die Transfusion von nicht bestrahlten Blutprodukten untersagt werden. Die Inzidenz liegt bei etwa 1/500.000 Geburten. Die Behandlung besteht in der allogenen Transplantation von hämatopoetischen Stammzellen. Die antenatale Diagnose von ICSD beruht im Wesentlichen auf dem Nachweis des Fehlens der verschiedenen Lymphozytenpopulationen und damit ihrer Funktion. Diese Diagnose wird in der 20. Schwangerschaftswoche durch Punktion von fetalem Blut durchgeführt. In Familien, in denen eine Mutation des RAG-Gens identifiziert oder die genetische Verbindung der Krankheit mit dem auf Chromosom 10p vorhandenen Locus nachgewiesen werden konnte, kann eine antenatale Diagnose in der 11. Amenorrhoewoche durch Trophoblastbiopsie durchgeführt werden. Quelle: Orphanet."
