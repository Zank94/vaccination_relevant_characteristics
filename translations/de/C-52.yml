label: Schwangerschaft - Datum der letzten Periode
description: Eine bestehende Schwangerschaft kann je nach der zu verhindernden Krankheit und je nach Person besondere Impfempfehlungen oder Impfkontraindikationen begründen. Um das Datum des Schwangerschaftsbeginns zu erhalten, müssen Sie zum Datum der letzten Periode 14 Tage addieren.
