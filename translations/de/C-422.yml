---
label: Medizinische(r) Sekretär(in), der/die Patienten empfängt
description: Die medizinische Sekretärin unterstützt den Arzt und ist der erste Ansprechpartner für den Patienten - am Telefon, wenn er einen Termin vereinbaren möchte, oder beim Empfang in der Arztpraxis oder in der Krankenhausabteilung. Sie baut Vertrauen auf und beantwortet Fragen.
