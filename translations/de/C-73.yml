label: Rettungssanitäter/in
description: "Der Rettungssanitäter übt seine Tätigkeit in einem privaten Unternehmen für Krankentransporte oder in einer Gesundheitseinrichtung aus. Er übernimmt auf ärztliche Anordnung oder in einem medizinischen Notfall die Betreuung und den Transport von Kranken und Verletzten in geeigneten Krankentransportfahrzeugen. Er informiert sich bei der Einrichtung, für die er arbeitet, über den Schweregrad der Patienten und die Art ihrer Verletzungen: Rettungsdienst, Krankenhaus, Rotes Kreuz usw. Er bedient die Kranken, sorgt für ihr Wohlbefinden, richtet sie während der Fahrt ein und kann in Notfällen sogar Erste Hilfe leisten. Der Rettungssanitäter muss dafür sorgen, dass sein Fahrzeug gewartet und die Ausrüstung sterilisiert wird. Er kann auch bei den Einreise- und Ausreiseformalitäten für Kranke behilflich sein."
