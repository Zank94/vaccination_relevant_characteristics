---
label: BCG-Impfnarbe
description: Diese Narbe befindet sich in der Regel hinter dem Deltamuskel, dem üblichen Ort der intradermalen Injektion von BCG. Sie zeigt, dass dieser Impfstoff, der die Entwicklung einer Immunantwort gegen den Koch'schen Bazillus (den Bazillus, der die Tuberkulose verursacht) ermöglicht, verabreicht wurde. Wenden Sie sich an Ihren Arzt, um weitere Informationen zu diesem Thema zu erhalten.
