label: Apothekenvorbereiter/in, der/die Patienten empfängt
description: Diese Fachkraft kennt sich mit Medikamenten und deren Anwendung aus. Unter der Verantwortung des Apothekers bereitet der Apotheker die ärztlichen Verschreibungen vor und hält sich dabei an die Dosierungen und die Hygienestandards. Er verwaltet auch die Arzneimittelbestände in einer Offizin- oder Krankenhausapotheke.
