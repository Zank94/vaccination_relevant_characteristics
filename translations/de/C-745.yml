label: Kürzlicher Kontakt mit einem Fall von Covid 19
description: "Kürzlicher Kontakt: letzter Kontakt innerhalb der letzten 10 Tage.Eine Risikoperson ist eine Person, die, wenn während der gesamten Kontaktdauer keine wirksamen Schutzmaßnahmen ergriffen wurden,mit dem bestätigten oder wahrscheinlichen Fall denselben Lebensraum geteilt hat;direkten Kontakt mit einem Fall hatte, von Angesicht zu Angesicht, in einem Abstand von weniger als einem Meter, unabhängig von der Dauer (z. B. Gespräch, Essen, Flirt, Umarmung, Kuss). Personen, denen man flüchtig im öffentlichen Raum begegnet, gelten nicht als Kontaktpersonen mit erhöhtem Risiko;Hygiene- oder Pflegemaßnahmen durchgeführt oder in Anspruch genommen hat;einen geschlossenen Raum (Büro oder Besprechungsraum, Privatfahrzeug usw.) für mindestens 15 aufeinanderfolgende oder kumulierte Minuten innerhalb von 24 Stunden mit einem Fall geteilt hat oder einem Fall während mehrerer Husten- oder Niesepisoden gegenübergestanden hat;Schüler oder Lehrer derselben Schulklasse ist (Kindergarten, Grundschule, Sekundarstufe, Tutorien an der Universität).Ein geschlossener Raum ist ein Raum, in dem das Kriterium der sozialen Distanzierung nicht erfüllt ist, d. h. ein Mindestabstand von 2 m zu einer Person.Schließlich gelten folgende Maßnahmen nicht als wirksame Schutzmaßnahmen: eine Plexiglasplatte auf einem Tresen, selbstgemachte Stoffmasken und allein getragene durchsichtige Kunststoffschirme."
