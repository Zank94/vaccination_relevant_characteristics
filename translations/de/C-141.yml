label: Langfristige oder hochdosierte Kortikosteroidtherapie
description: "In Bezug auf die Kortikosteroidtherapie sind die Dosis und die Dauer, über die hinaus die Verabreichung eines Lebendimpfstoffs kontraindiziert ist (immunsuppressive Kortikosteroidtherapie), wie folgt.  Bei Erwachsenen: 10 mg Prednisonäquivalent pro Tag, seit mehr als zwei Wochen. Bei Kindern: 2 mg/kg Prednisonäquivalent pro Tag (und mehr als 20 mg pro Tag bei Kindern mit einem Gewicht von mehr als 10 kg), seit mehr als zwei Wochen. Kortikoidboli sind ein Kontraindikator für die Verabreichung eines Lebendimpfstoffs in den folgenden drei Monaten."
