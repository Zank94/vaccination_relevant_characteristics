---
label: Kontaktperson mit Mpox-Risiko
description: |-
  Es gibt zwei Risikosituationen:
  - Jede Person, die ungeschützten direkten physischen Kontakt mit der verletzten Haut oder den Körperflüssigkeiten eines wahrscheinlichen oder bestätigten symptomatischen Falls hatte, unabhängig von den Umständen, einschließlich Geschlechtsverkehr, medizinischer oder paramedizinischer Pflegehandlungen oder gemeinsamer Nutzung von Toilettenutensilien oder Kontakt mit Textilien (Kleidung, Badewäsche, Bettwäsche) oder schmutzigem Geschirr, die von dem wahrscheinlichen oder bestätigten symptomatischen Fall benutzt wurden.
  - Jede Person, die ungeschützten Kontakt mit einem wahrscheinlichen oder bestätigten symptomatischen Fall in einem Abstand von weniger als 2 Metern über 3 Stunden (kumulativ über 24 Stunden) hatte (z. B. enger oder intimer Freund, üblicher Sexualpartner, auch wenn kein Geschlechtsverkehr stattfindet, Personen, die denselben Wohnort teilen, aber keine intime Beziehung haben, Nachbar bei einem längeren Transport, Personen, die dasselbe Büro, dieselbe Pflege- oder Hygienehandlung, dieselbe Schulklasse, TD-Halle der Universität, Sportverein für Kontaktsportarten, Sporthallen... teilen).
