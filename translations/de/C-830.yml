---
label: Hyper-IgM-Syndrom
description: "Dieses Syndrom ist durch eine Hypogammaglobulinämie gekennzeichnet, die sich auf IgG und IgA bezieht und einen normalen oder erhöhten IgM-Spiegel aufweist.Es können mehrere Krankheitsbilder unterschieden werden, von denen folgende zu unterscheiden sind:1) Situationen, die mit einem Defizit der zellulären Immunität einhergehen:Mutation des Gens, das für CD40-Ligand kodiert, ein Molekül, das bei der isotypischen Umschaltung im Keimzentrum bei Antigenstimulation beteiligt ist;Mutation des NEMO-Gens.2) Hyper-IgM-Syndrome mit isoliertem humoralen Defizit, die mit einer intrinsischen Anomalie der B-Lymphozyten durch Mutationen der für AID und UNG kodierenden Gene verbunden sind, die die isotypische Umschaltung verhindern und nicht mit T-Zelldefekten assoziiert sind.Wie bei anderen Hypogammaglobulinämien werden Infektionen von Atemwegs- und HNO-Infektionen mit abgekapselten Bakterien (S. pneumoniae, Haemophilus), seltener mit Pyogenen, dominiert. P. aeruginosa wird bei einer Bronchialerweiterung isoliert. Infektionen des Verdauungstrakts sind häufig mit einer hohen Prävalenz von Giardiasis.Bei einem assoziierten Zellmangel sind andere Keime involviert: Pneumocystis, Cryptosporidien, die für Diarrhöe und sklerosierende Cholangitis verantwortlich sind."
