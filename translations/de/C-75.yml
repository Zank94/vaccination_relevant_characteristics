label: Manipulator/in für medizinische Elektroradiologie
description: Der Fachmann für medizinische Elektroradiologie ist ein Fachmann im Gesundheitswesen, der sowohl Pflegepersonal als auch Techniker ist. In der medizinischen Bildgebung ist er an medizinischen Untersuchungen beteiligt (Radiologie, CT, MRT, Nuklearmedizin, Elektrophysiologie), deren Ziel die Erstellung einer Diagnose ist.
