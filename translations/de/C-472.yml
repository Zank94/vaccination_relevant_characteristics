label: Andere Autoimmunkrankheit
description: 'Autoimmunerkrankungen sind eine Gruppe von Krankheiten, die mit dem Immunsystem zusammenhängen. Sie zeichnen sich dadurch aus, dass der Körper von seinen eigenen Immunzellen angegriffen wird. Die Behandlung dieser Art von Krankheiten zielt daher auf die Unterdrückung des überreagierenden Immunsystems ab und wird als "Immunsuppressiva" bezeichnet. Beispiele: Gougerot-Sjögren-Syndrom, Dermatomyositis, Polymyositis.'
