---
label: Partieller kombinierter Immundefekt
description: "Der partielle kombinierte Immundefekt wird mit mehreren seltenen Krankheiten in Verbindung gebracht. Dazu gehören das Job-Buckley-Syndrom, das Wiskott-Aldrich-Syndrom, das Di-George-Syndrom (oder 22q11-Mikrodeletionssyndrom) und das Louis-Bar-Syndrom (oder Ataxia telangiectasia). "
