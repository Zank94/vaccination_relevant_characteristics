---
label: Variabler gemeinsamer Immundefekt (Variable Common Immunodeficiency, VCD)
description: "Der variable gemeinsame Immundefekt (CVID) ist eine heterogene Gruppe von Erkrankungen, die durch eine Hypogammaglobulinämie unbekannter Ursache mit mangelnder Produktion spezifischer Antikörper nach der Immunisierung gekennzeichnet ist und rezidivierende bakterielle Infektionen, in der Regel durch abgekapselte Bakterien, hervorruft. Die Prävalenz wird auf 1/25.000 in der Bevölkerung europäischen Ursprungs geschätzt und es sind sowohl Männer als auch Frauen betroffen. "
