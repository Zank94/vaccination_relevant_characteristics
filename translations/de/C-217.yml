---
label: Schülerin im Rettungsdienst
description: Der Rettungssanitäter arbeitet in einem privaten Unternehmen für Krankentransporte oder in einer Gesundheitseinrichtung.Er übernimmt auf ärztliche Anordnung oder in medizinischen Notfällen die Betreuung und den Transport von Kranken und Verletzten in geeigneten Krankentransportfahrzeugen für die Behandlung oder Diagnose.Dieser Beruf kennt den Notfallzustand seiner Patienten. Er informiert sich bei der Einrichtung, für die er arbeitet (Rettungsdienst, Krankenhaus, Rotes Kreuz usw.), über den Schweregrad der Patienten und die Art ihrer Verletzungen. Er bedient die Patienten, sorgt für ihr Wohlbefinden, richtet sie während der Fahrt ein und kann in Notfällen sogar Erste Hilfe leisten. Der Rettungssanitäter muss dafür sorgen, dass sein Fahrzeug gewartet und die Ausrüstung sterilisiert wird. Er kann auch bei den Einreise- und Ausreiseformalitäten für Kranke behilflich sein.
