---
label: Sichelzellenanämie, die mit Hydroxyurea (Hydrea, Siklos) behandelt wird
description: Hydroxyurea in niedrigen Dosen wird Menschen mit Sichelzellenanämie regelmäßig verschrieben, um wiederkehrenden schmerzhaften vaso-okklusiven Krisen vorzubeugen, und zwar bei Kindern über zwei Jahren und bei Erwachsenen mit symptomatischer Sichelzellenanämie. In diesem Zusammenhang werden zwei Medikamente verschrieben, Hydrea und Siklos. Es gibt keine klinischen Belege für eine durch die Einnahme von niedrig dosiertem Hydroxyurea induzierte Immunsuppression bei Sichelzellenanämie und die verfügbaren Daten lassen vermuten, dass Lebendimpfstoffe wahrscheinlich auch an Personen verabreicht werden könnten, die mit niedrig dosiertem Hydroxyurea behandelt werden. Die Zulassung von Hydrea, das im Übrigen bei Sichelzellenanämiepatienten außerhalb der Zulassung verwendet wird, macht dieses Medikament jedoch in Verbindung mit abgeschwächten Lebendimpfstoffen kontraindiziert. Die Zulassung von Siklos rät von der gleichzeitigen Anwendung von Hydroxycarbamid mit einem Lebendvirusimpfstoff ab. Sie besagt, dass die Behandlung mit Siklos und die gleichzeitige Immunisierung mit Lebendvirusimpfstoffen nur durchgeführt werden sollten, wenn der Nutzen die potenziellen Risiken deutlich übersteigt.
