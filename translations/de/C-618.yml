label: Verweigerung der Impfung gegen Meningokokken ACWY
description: "Er wird oft als Meningitis-Impfstoff bezeichnet und verhindert schwere Infektionen (Meningitis oder Sepsis), die durch Meningokokken der Serogruppen A, C, W oder Y verursacht werden.Es gibt zwei Impfstoffe dieser Art, die in Frankreich auf dem Markt sind: den Menveo-Impfstoff und den Nimenrix-Impfstoff."
