label: Masseur/in und Physiotherapeut/in
description: Der Physiotherapeut sorgt für die Rehabilitation von Personen mit Lähmungen, neurologischen Störungen und Unfallopfern. Er hilft Kindern und Erwachsenen, die an Atemwegs-, Kreislauf- oder rheumatischen Erkrankungen leiden, eine normale motorische Funktion wiederzuerlangen.
