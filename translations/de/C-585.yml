label: IgA-Mangel
description: "Der selektive Immunglobulin-A-Mangel ist ein primärer (oder angeborener) Immundefekt; er ist der häufigste primäre Antikörpermangel. Mit einer Inzidenz von 1/325 Menschen in der westlichen Welt ist er keine seltene Krankheit. Aufgrund des teilweisen oder vollständigen Fehlens von IgA, das eine wichtige Rolle beim Schutz der Schleimhäute vor Infektionen spielt, leiden die Betroffenen an wiederkehrenden Infektionen der Atemwege oder des Magen-Darm-Trakts. Sie können auch einen variablen gemeinsamen Immundefekt aufweisen, und die Inzidenz von Autoimmunerkrankungen ist erhöht. Die Ätiologie des selektiven Immunglobulin-A-Mangels ist nicht geklärt, aber eine familiäre Vererbung, die in 20 bis 25 % der Fälle beobachtet wird, deutet auf einen genetischen Einfluss hin. Es gibt keine spezifische Behandlung für diese Krankheit, Infektionen müssen hingegen wirksam behandelt werden. Patienten mit selektivem totalem IgA-Mangel sollten das Pflegepersonal wegen des potenziellen Risikos einer anaphylaktischen Reaktion bei der Transfusion von Blutprodukten darüber informieren. Quelle: Orphanet."
