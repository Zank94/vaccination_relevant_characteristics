---
label: Person, die mit dem Hepatitis-B-Virus infiziert ist, oder chronischer Träger des HBs-Antigens in der Umgebung
description: Es handelt sich um Personen, die mit dem Hepatitis-B-Virus (HBV) infiziert sind oder das HBs-Antigen (ein biologischer Marker, der auf eine chronische HBV-Infektion hinweist) tragen. Betroffen sind alle Personen, die im selben Haushalt leben.
