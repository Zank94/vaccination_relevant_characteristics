---
label: Chronisch obstruktive Lungenerkrankung (COPD)
description: "Die chronisch obstruktive Lungenerkrankung (COPD) ist eine häufige Lungenerkrankung, die den Luftstrom verringert und Atemprobleme verursacht. Sie wird auch als Emphysem oder chronische Bronchitis bezeichnet.\r

  \r

  Bei COPD können Sekrete die Lunge beschädigen oder verstopfen. Zu den Symptomen gehören Husten (manchmal mit schleimigem Auswurf), Atembeschwerden, pfeifende Atmung und Müdigkeit.\r

  \r

  Rauchen und Luftverschmutzung sind die Hauptursachen. Die Patienten haben ein höheres Risiko, andere Gesundheitsprobleme zu haben.\r

  \r

  COPD ist nicht heilbar, aber man kann sie lindern, indem man Rauchen und Luftverschmutzung vermeidet und sich impfen lässt, um Infektionen vorzubeugen. Sie wird mit Medikamenten, Sauerstoff und pulmonaler Rehabilitation behandelt."
