---
label: Positiver Hepatitis-A-Serologietest
description: Bei dieser Serologie wird das Vorhandensein von Gesamtantikörpern (IgG und IgM) gegen das Hepatitis-A-Virus (HAV) nachgewiesen. Eine positive Serologie weist auf eine zuvor aufgetretene Hepatitis A hin. Eine solche Hepatitis kann auch bei Kindern auftreten, ohne klinische Anzeichen zu verursachen. Wenn Sie bereits eine Hepatitis A hatten, sind Sie definitiv gegen diese Krankheit geschützt und eine Impfung gegen Hepatitis A ist nicht erforderlich.
