---
label: Arbeitet in einer Wäscherei
description: Erlass vom 15. März 1991 zur Festlegung der Liste der öffentlichen oder privaten Einrichtungen oder Organisationen für Prävention oder Pflege, in denen das exponierte Personal geimpft werden muss. Wäschereien werden den in Artikel 1 dieses Erlasses genannten öffentlichen oder privaten Einrichtungen und Organismen für Prävention oder Pflege gleichgestellt, sofern sie an deren Tätigkeit beteiligt sind.
