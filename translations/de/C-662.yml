---
label: Thanatopraktiker
description: Thanatopraktiker werden auf Wunsch der Familie an den Körpern von Verstorbenen tätig, um Pflegemaßnahmen durchzuführen, die dem Toten ein vorzeigbares Aussehen verleihen. In Frankreich wird bei etwa jedem vierten Todesfall ein solcher Techniker hinzugezogen.
