---
label: Angeborene zyanogene Herzkrankheit
description: Eine angeborene zyanotische Herzkrankheit ist ein von Geburt an vorhandener Herzfehler, der zu einer abnormalen Vermischung von sauerstoffreichem und sauerstofffreiem Blut im Herzen führt, was eine Zyanose (bläuliche Färbung der Haut und der Lippen) zur Folge hat. Häufige Beispiele für angeborene zyanotische Herzfehler sind die Fallot'sche Tetralogie und die Transposition der großen Gefäße. Zu den Symptomen gehören Müdigkeit, Atembeschwerden und langsames Wachstum.
