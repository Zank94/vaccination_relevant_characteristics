---
label: Immunsupprimierte Person in der Umgebung
description: Das Umfeld von immungeschwächten Personen ist eine potenzielle Quelle für die Übertragung von Infektionserregern über die Luft oder die Haut. Da die Wirksamkeit der Impfung bei immungeschwächten Personen ungewiss ist und Lebendimpfstoffe bei diesen Patienten kontraindiziert sind, wird zur Schaffung eines "Schutzkreises" dringend empfohlen, den Impfstatus der Personen in ihrer unmittelbaren Umgebung zu überprüfen und die erforderlichen Aktualisierungen gemäß dem geltenden Impfkalender vornehmen zu lassen. Die unmittelbare Umgebung ist definiert als alle Personen, die unter demselben Dach leben oder als Betreuer fungieren können (Kindergärtnerin, Familie, Pfleger, ...), sowie das Gesundheitspersonal, das sie betreuen könnte.
