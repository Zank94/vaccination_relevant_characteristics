---
label: Schwere chronische Neutropenie
description: Patienten mit chronischer Neutropenie weisen dauerhaft oder wiederholt einen Abfall der Neutrophilenzahl auf unter 1500 Neutrophile pro mm3 auf, was zu einer Anfälligkeit für bakterielle Infektionen (Staphylokokken, Streptokokken, gramnegative Bazillen) und mykotische Infektionen (Candidose, systemische Aspergillose) führt. Außerdem treten bei ihnen Gingivostomatitiden auf. Von einer schweren Neutropenie spricht man, wenn die Neutrophilenzahl unter 500 mm3 liegt.
