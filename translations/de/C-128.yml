---
label: Bronchopulmonale Dysplasie
description: Die Dysplasie stellt ein besonderes Risiko für eine schwere Grippe- oder Pneumokokkeninfektion dar, wenn sie in den vorangegangenen sechs Monaten mit mechanischer Beatmung oder einer längeren Sauerstofftherapie oder einer medikamentösen Dauerbehandlung mit Kortikoiden, Bronchodilatatoren oder Diuretika behandelt wurde.Die bronchopulmonale Dysplasie stellt eine der häufigsten Komplikationen der Frühgeburtlichkeit dar. Sie äußert sich durch Atemnot. Neugeborene mit dieser Erkrankung sind anfälliger für Atemwegsinfektionen, die manchmal sehr schwerwiegend sein können.
