---
label: Säugling unter 6 Monaten, Frühgeburt oder chronisch Kranker, der in der Umgebung dieser Person lebt
description: D. h., wenn es sich um einen Säugling unter 6 Monaten handelt, der einen der folgenden Risikofaktoren für eine schwere Grippe aufweist:Frühgeborenes, insbesondere wenn es an respiratorischen Folgeerkrankungen wie Bronchodysplasie leidet, die in den vorangegangenen sechs Monaten mit mechanischer Beatmung oder verlängerter Sauerstofftherapie oder medikamentöser Dauerbehandlung (Kortikosteroide, Bronchodilatatoren oder Diuretika) behandelt wurden,mit einer Herzerkrankung,mit einem angeborenen (d. h. bei der Geburt erworbenen) Immundefekt,mit einer Lungen-, neurologischen oder neuromuskulären Erkrankung,die wegen einer Langzeiterkrankung behandelt wird.Der Begriff "Umfeld" umfasst das familiäre Umfeld (Personen, die unter demselben Dach wohnen), die Tagesmutter und alle Personen, die regelmäßig Kontakt mit dem Säugling haben.
