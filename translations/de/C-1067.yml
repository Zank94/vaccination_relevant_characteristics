---
label: Enger und längerer Kontakt mit der lokalen Bevölkerung
description: |-
  Frage wurde gestellt, weil ein enger und längerer Kontakt mit der einheimischen Bevölkerung die Übertragung von Meningokokken begünstigen kann. Meningokokken befinden sich nämlich im Rachenraum bestimmter Personen, die als "Meningokokkenträger" bezeichnet werden. Die Übertragung von Meningokokken von einem Träger auf eine andere Person über Speicheltröpfchen (die dann möglicherweise eine Meningitis auslöst) wird begünstigt durch : 
  - Nahe Kontakte, d. h. in einem Abstand von weniger als einem Meter (Speicheltröpfchen sind ziemlich schwer und fallen schnell ab) ;
  - Häufiger oder längerer Kontakt (z. B. länger als eine Stunde). 
  Beispiele für Risikosituationen während des Aufenthalts: Unterkunft bei Einheimischen, Nachtclubbesuche, lange oder überfüllte Transportmittel, Kontaktsportarten, Schulpraktika, Unterbringung in einem Internat usw.
