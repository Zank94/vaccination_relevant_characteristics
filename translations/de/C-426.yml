label: Progressive generalisierte Sklerodermie
description: Die progressive generalisierte Sklerodermie ist eine seltene chronische Autoimmunkrankheit, die das Bindegewebe des Körpers befällt. Sie ist durch eine übermäßige Kollagenproduktion gekennzeichnet, was zu einer Verdickung und Verhärtung der Haut, der Gelenke und der inneren Organe führt. Dieser Zustand kann sich allmählich entwickeln und verschiedene Körpersysteme betreffen, was zu Symptomen wie Gelenkschmerzen, Steifheit, Funktionsstörungen der inneren Organe, Hautgeschwüren und Durchblutungsstörungen führt. Die Prognose der progressiven generalisierten Sklerodermie kann unterschiedlich sein, und die Behandlung zielt darauf ab, die Symptome zu lindern, die Entzündung zu kontrollieren und Komplikationen zu verhindern. Sie kann immunsuppressive Medikamente und einen sorgfältigen Umgang mit den spezifischen Problemen jedes einzelnen Patienten umfassen.
