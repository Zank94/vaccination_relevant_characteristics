---
label: Datum des Schwangerschaftsbeginns
description: Das Datum des Schwangerschaftsbeginns ist der Zeitpunkt der Befruchtung. Eine Schwangerschaft beginnt etwa 15 Tage nach der letzten Menstruation. Diese Information ist wichtig, da einige Impfungen bei schwangeren Frauen empfohlen werden (Grippe, Keuchhusten), während andere kontraindiziert sind (insbesondere Impfungen, bei denen Lebendimpfstoffe verwendet werden).
