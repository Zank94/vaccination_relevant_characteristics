label: Beschäftigte(r) in einem Unternehmen, das Leichen vor der Einsargung befördert, in Verbindung mit einer Vorsorge- oder Gesundheitseinrichtung
description: Artikel 1 von http://www.legifrance.gouv.fr/affichTexte.do?cidTexte=LEGITEXT000020375184 der Verordnung vom 15. März 1991 legt die Liste der öffentlichen oder privaten Einrichtungen oder Organisationen der Prävention oder Pflege fest, in denen Personen, die Ansteckungsrisiken ausgesetzt sind, gegen Hepatitis B, Diphtherie, Tetanus und Poliomyelitis immunisiert werden müssen, wenn sie eine berufliche Tätigkeit ausüben.Unternehmen, die Leichen vor der Einsargung transportieren, werden den in Artikel 1 genannten Einrichtungen und Organisationen gleichgestellt, da sie an deren Tätigkeit beteiligt sind.
