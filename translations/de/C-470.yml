---
label: Entzündliches Rheuma
description: Entzündlicher Rheumatismus ist ein Sammelbegriff für eine Gruppe chronischer rheumatischer Erkrankungen, die durch eine anhaltende Entzündung der Gelenke und des Bindegewebes gekennzeichnet sind. Diese Erkrankungen sind häufig autoimmun, d. h. das Immunsystem greift irrtümlich das körpereigene Gewebe an, was zu Entzündungen und Gelenkschäden führen kann. Häufige Beispiele für entzündliches Rheuma sind rheumatoide Arthritis, Morbus Bechterew und systemischer Lupus erythematodes. Zu den typischen Symptomen gehören Gelenkschmerzen, Steifheit, Schwellungen und Müdigkeit. Die Behandlung zielt darauf ab, die Entzündung zu reduzieren, die Symptome zu lindern und bleibende Gelenkschäden zu verhindern, oft mithilfe von immunsuppressiven Medikamenten.
