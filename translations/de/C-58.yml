---
label: Hebamme
description: Die Hebamme hat die Aufgabe, schwangere Frauen während der gesamten Schwangerschaft zu betreuen, von der Diagnose bis zum Tag der Entbindung. Im weiteren Sinne ist sie auch für die gynäkologische Betreuung zuständig. Dieser schwierige Beruf erfordert sowohl medizinische als auch psychologische Fähigkeiten. Hebammen dürfen auch impfen.
