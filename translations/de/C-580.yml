---
label: Mangel an phagozytierenden Zellen (septische Granulomatose)
description: Es handelt sich um eine unspezifische Immunschwäche, die geschlechtsgebunden rezessiv vererbt wird. Er äußert sich in den ersten Lebensmonaten bei Jungen durch Infektionen mit verschiedenen Keimen, Bakterien oder Pilzen, die die Haut, das Lymphsystem, den Bronchialbaum, die Leber und die Milz befallen.
