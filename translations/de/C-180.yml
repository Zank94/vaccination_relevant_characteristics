---
label: Psychomotoriker/in
description: Auf ärztliche Anordnung hilft der Psychomotoriker Menschen, die an verschiedenen psychomotorischen Störungen leiden. Mithilfe von Entspannungstechniken, Bewegungserziehung, körperlichem und plastischem Ausdruck sowie Spiel-, Rhythmus- und Koordinationsübungen versucht der Psychomotoriker, diese psychisch bedingten Schwierigkeiten, die bei Erwachsenen oder Kindern auftreten können, zu beheben. Er ist vor allem in Krankenhäusern tätig, kann aber auch in freier Praxis arbeiten.
