label: Anti-VHA-Ak (IgG oder Gesamt-Ig in IU/L)
description: Bei dieser Serologie wird das Vorhandensein von Gesamtantikörpern (IgG und IgM) gegen das Hepatitis-A-Virus (HAV) nachgewiesen. Eine positive Serologie, die vor der Impfung durchgeführt wurde (Prä-Impfserologie), weist auf das frühere Auftreten einer Hepatitis A hin. Eine solche Hepatitis kann bei Kindern auftreten, ohne klinische Anzeichen zu verursachen. Personen, die eine Hepatitis A durchgemacht haben, sind definitiv gegen diese Krankheit geschützt und eine Hepatitis-A-Impfung ist nicht erforderlich. Die Hepatitis-A-Serologie, die nach der Impfung durchgeführt wird, kann zur Überprüfung der Wirksamkeit der Impfung verwendet werden, insbesondere bei immungeschwächten Personen. Der Schwellenwert für eine positive Reaktion liegt bei 20 IU/L.
