---
label: Multiple Sklerose
description: Multiple Sklerose (MS) ist eine chronische neurologische Autoimmunerkrankung des zentralen Nervensystems, insbesondere des Gehirns und des Rückenmarks. Sie ist durch die Bildung von Demyelinisierungsplaques gekennzeichnet, bei denen die Schutzhülle, die die Nervenfasern umgibt, geschädigt wird, was zu einer Störung der Übertragung von Nervensignalen führt. Die Symptome der MS sind vielfältig und können starke Müdigkeit, Sehstörungen, Koordinationsprobleme, Taubheitsgefühle, kognitive Beeinträchtigungen und Mobilitätsprobleme umfassen. MS verläuft in der Regel in Schüben und Remissionen, wobei auf Zeiten mit verschärften Symptomen Phasen der teilweisen Erholung folgen. Obwohl es keine heilende Behandlung gibt, können verschiedene Therapien die Symptome reduzieren, das Fortschreiten der Krankheit verlangsamen und die Lebensqualität der Patienten verbessern.
