---
label: Datum der letzten Keuchhustenanamnese
description: Sie müssen sicher sein, dass es sich tatsächlich um Keuchhusten handelt (nachgewiesen durch einen biologischen Test, den Sie mit Ihrem Arzt abklären sollten). Man geht davon aus, dass eine Person, die Keuchhusten hatte, etwa 10 Jahre lang vor einer erneuten Keuchhusteninfektion geschützt ist. Wenn dieses Kästchen angekreuzt ist, gilt die Impfung als nicht erforderlich.Wenn die Krankheit vor dem Alter von zwei Jahren aufgetreten ist, wird das Impfprogramm normal fortgesetzt.
