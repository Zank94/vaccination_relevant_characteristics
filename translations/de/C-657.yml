label: Schüler/in Zahnmedizinische/r Fachangestellte/r
description: Die Aufgabe des Zahnarzthelfers besteht darin, Reinigungs- und Sterilisationsarbeiten durchzuführen. Er kann auch die Funktion eines Operationsgehilfen übernehmen. Zahnarzthelferinnen sind dem Hepatitis-B-Virus ausgesetzt, da sie nach dem Gebrauch für einen Patienten mit scharfen oder spitzen Gegenständen umgehen. In einer Studie, die zwischen 1995 und 2001 in den USA durchgeführt wurde, ereigneten sich 75 % der Unfälle mit Blutexposition in Zahnarztpraxen.
