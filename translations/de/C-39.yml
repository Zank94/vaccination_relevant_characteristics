label: Chronische Ateminsuffizienz
description: Chronisch obstruktive oder restriktive Ateminsuffizienz jeglicher Ursache, einschließlich neuromuskulärer Erkrankungen mit dem Risiko einer Atemdekompensation, Missbildungen der oberen oder unteren Atemwege, Lungenmissbildungen oder Missbildungen des Brustkorbs.
