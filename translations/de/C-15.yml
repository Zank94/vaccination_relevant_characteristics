---
label: Neugeborenes Kind einer Mutter, die HBs-Antigen trägt
description: Das HBs-Antigen (oder HBs-Ag) ist ein Bestandteil des Hepatitis-B-Virus. Ein Träger des HBs-Antigens bedeutet, dass man mit dem Hepatitis-B-Virus lebt. Diese Trägerschaft kann unbemerkt bleiben und keine Anzeichen von Hepatitis B verursachen. Dennoch kann es zu einer Infektion des Neugeborenen führen.
