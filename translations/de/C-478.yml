---
label: Antikoagulierende Behandlung
description: Die Antikoagulationstherapie dient der Blutverdünnung bei bestimmten Venenerkrankungen (tiefe Venenthrombose, Lungenembolie) oder Herzerkrankungen (insbesondere Arrhythmie). Die wichtigsten Wirkstoffe sind Fluidione (Previscan) und Coumadine (Sintron).
