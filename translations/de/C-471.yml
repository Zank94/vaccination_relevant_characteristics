---
label: Chronisch entzündliche Darmerkrankung
description: Eine chronisch-entzündliche Darmerkrankung (CED) ist eine Gruppe von Magen-Darm-Erkrankungen, einschließlich Morbus Crohn und Colitis ulcerosa, die durch eine anhaltende und wiederkehrende Entzündung der Darmschleimhaut gekennzeichnet sind. IBD verursacht Symptome wie Bauchschmerzen, Durchfall und rektale Blutungen und kann die Lebensqualität der Patienten erheblich beeinträchtigen. Die Behandlung zielt darauf ab, die Entzündung zu kontrollieren und die Symptome zu lindern.
