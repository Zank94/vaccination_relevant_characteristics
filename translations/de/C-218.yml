---
label: Schülerin in der Krankenpflegehilfe
description: "Als Teil eines Pflegeteams unterstützt der Pflegehelfer die Krankenschwester bei den täglichen Pflegetätigkeiten. Sie trägt zum Wohlbefinden der Patienten bei, indem sie sie bei allen Verrichtungen des täglichen Lebens begleitet und ihnen hilft, ihre Selbstständigkeit zu erhalten.In Zusammenarbeit mit der Krankenschwester und unter ihrer Verantwortung führt die Krankenpflegehelferin bei den Patienten Hygiene- und Komfortpflegemaßnahmen durch: Waschen, Essen, Betten machen, Aufnahme, Unterbringung und Verlegung der Patienten.Sie übermittelt ihre Beobachtungen schriftlich und mündlich, um die Kontinuität der Pflege zu gewährleisten. Er beteiligt sich an der Durchführung von Animationen für Personen, die in Nachsorge- und Rehabilitationszentren aufgenommen werden. Der Krankenpflegehelfer muss unter Umständen nachts, am Wochenende und an Feiertagen arbeiten. Der Beruf des Krankenpflegehelfers wird sowohl in Krankenhäusern als auch in Kliniken ausgeübt."
