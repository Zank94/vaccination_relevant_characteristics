---
label: Thrombozytopenische Purpura
description: Bei der thrombozytopenischen Purpura handelt es sich um einen Abfall der Blutplättchen, der zu kleinen oberflächlichen Blutungen auf der Haut führt, die als Purpura bezeichnet werden. Der Rückgang der Blutplättchen wird durch einen Bluttest nachgewiesen. Ein starker Rückgang der Blutplättchen kann in manchen Fällen zu Blutungen führen (Nasenbluten, Blutungen im Mund, Hämatome ...).
