label: Allergie gegen Ei
description: Allergie gegen das Ei. Die Eierallergie ist eine der häufigsten Nahrungsmittelallergien bei Kindern (1 bis 3 % der Kinder unter 3 Jahren). Da sie meist mit zunehmendem Alter verschwindet, ist diese Allergie bei Erwachsenen viel seltener. Meistens treten die allergischen Manifestationen kurz nach dem Verzehr von Eiern oder Lebensmitteln, die Eier enthalten, auf, insbesondere wenn es sich um rohe oder wenig gekochte Eier handelt (selbst gemachte Mousse au Chocolat, gekochte Eier...). Die am häufigsten beobachteten Anzeichen sind Rötung und Juckreiz um den Mund, Schwellung des Mundes oder des Rachens, Nesselsucht, Erbrechen, Unwohlsein, Atembeschwerden oder niedriger Blutdruck. Allergie gegen Hühnerfleisch. Die Hühnerallergie bezeichnet die Allergie gegen Hühnerfleisch im Gegensatz zur Allergie gegen Federn. Wenn Sie glauben, dass Sie gegen Ei oder Huhn allergisch sind, sollten Sie Ihren Arzt aufsuchen, falls Sie das noch nicht getan haben. Eine Allergie gegen Ei oder Huhn kann bei einigen Impfstoffen, die Spuren von Ei oder Huhn enthalten können, zu einer Kontraindikation oder Vorsichtsmaßnahmen bei der Anwendung führen.
