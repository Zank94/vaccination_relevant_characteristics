---
label: Erwachsener, der in den kommenden Monaten oder Jahren voraussichtlich Eltern wird
description: Es handelt sich also um Erwachsene, die in den kommenden Monaten oder Jahren Eltern werden könnten, auch im Rahmen einer Adoption. Diese Frage wird gestellt, um herauszufinden, ob die Strategie des Cocooning angewendet werden soll, die darin besteht, die Eltern zu schützen, um eine Ansteckung der Säuglinge mit dem Bakterium zu verhindern, das für den Keuchhusten verantwortlich ist, eine sehr schwere Krankheit bei sehr kleinen Kindern. Es geht auch darum, werdenden Müttern eventuell eine Impfung gegen Windpocken zu empfehlen.
