label: Patient mit Komplementmangel oder Behandlung mit Soliris® (Eculizumab) oder Ultomiris® (Ravulizumab) im Bekanntenkreis
description: Kreuzen Sie dieses Feld an, wenn eine Person, die im selben Haushalt lebt oder betreut wird, einen Komplementmangel (terminale Fraktion oder Properdin) hat oder mit Soliris® behandelt wird.Soliris® (Eculizumab) ist eine Anti-C5-Therapie, die die Wirkung des Komplements hemmt. Das Komplement ist eine Gruppe von Proteinen (C5 ist eines davon) mit antibakteriellen Eigenschaften, die eine wichtige Rolle bei Entzündungen und der Immunität spielen. Soliris® ist für die Behandlung der paroxysmalen nächtlichen Hämoglobinurie oder des atypischen hämolytisch-urämischen Syndroms (atypisches HUS) indiziert.Die Anfälligkeit dieser Patienten mit Komplementmangel (angeborener Mangel oder durch eine Behandlung mit Soliris® bedingt) für bestimmte Infektionen erklärt, warum Impfempfehlungen für ihre Umgebung gelten.
