---
label: Chirurg
description: Der Chirurg ist ein Doktor der Medizin, der ein sehr technisches Fachgebiet ausübt. Er nimmt physikalische Eingriffe an Körpergeweben vor, repariert schwere Traumata, korrigiert Missbildungen, behandelt Infektionen, entfernt kranke Organe usw. Daher ist der Chirurg besonders anfällig für Blutverunreinigungen. Es gibt viele verschiedene chirurgische Fachrichtungen.
