label: SNI (SNLGM ou HSF) actif ou GEM active et/ou soumis à un traitement immunosuppresseur
description: 'Traitement immunosuppresseur exposant la personne à un risque accru de forme grave en cas de covid 19 : corticothérapie prolongée, anti CD20, mycophénolate mofétil, azathioprine, cyclophosphamide, anticalcineurines (Ciclopsorine, Prograf).'
