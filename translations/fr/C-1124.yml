label: Date de l'administration du vaccin anti-VRS à la mère pendant la grossesse
description: 'La vaccination d''une femme enceinte avec le vaccin anti-VRS (Abrysvo) permet de protéger le nourrisson contre la bronchiolite à VRS grâce à la transmission d''anticorps anti-VRS par voie transplacentaire. Si la naissance intervient dans un délai de moins de 14 jours après la vaccination ou en cas de naissance prématurée, un rattrapage par immunisation passive par anticorps monoclonal est recommandé. '
