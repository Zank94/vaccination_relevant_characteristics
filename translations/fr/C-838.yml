---
label: Personne avec symptômes prolongés de covid 19 (covid long)
description: La définition du groupe de patients ayant des symptômes prolongés (parfois nommé « covid long ») n'est pas consensuelle. Sont considérées les personnes ayant des symptômes persistants au-delà de 3, 4 voire 12 semaines après le début de l'infection.La fréquence de ces symptômes prolongés est variable d'une étude à l'autre mais excède parfois 50 %. Les symptômes prolongés rapportés le plus fréquemment sont la fatigue, les douleurs articulaires, les douleurs thoraciques, les palpitations, les difficultés respiratoires, une dégradation de l'état cognitif, et la diminution de la qualité de vie.
