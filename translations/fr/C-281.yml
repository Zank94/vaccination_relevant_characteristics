label: Bronchopneumopathie chronique obstructive (BPCO)
description: "La bronchopneumopathie chronique obstructive (BPCO) est une maladie pulmonaire courante qui réduit le flux d’air et cause des problèmes respiratoires. On l’appelle aussi emphysème ou bronchite chronique.\r

  \r

  En cas de BPCO, des sécrétions peuvent endommager ou obstruer les poumons. Les symptômes comprennent une toux (parfois avec expectorations muqueuses), une difficulté à respirer, une respiration sifflante et de la fatigue.\r

  \r

  Le tabagisme et la pollution de l’air sont les principales causes. Les patients présentent un risque plus élevé d’avoir d’autres problèmes de santé.\r

  \r

  La BPCO n’est pas curable, mais on peut la soulager en évitant le tabagisme et la pollution de l’air et en se faisant vacciner pour prévenir les infections. Elle se traite par médicaments, oxygène et réadaptation pulmonaire."
