---
label: Dysplasie broncho-pulmonaire
description: La dysplasie présente un risque particulier d'infection grippale ou à pneumocoque grave si elle a été traitée au cours des six mois précédents par ventilation mécanique ou oxygénothérapie prolongée ou traitement médicamenteux continu par corticoïdes, bronchodilatateurs ou diurétiques.La dysplasie bronchopulmonaire représente l'une des complications les plus fréquentes de la prématurité. Elle se manifeste par une détresse respiratoire. Les nouveau-nés atteints par cette maladie ont une plus grande susceptibilité aux infections respiratoires qui peuvent être parfois très graves.
