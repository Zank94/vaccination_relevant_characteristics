label: Prednisone ou équivalent
description: "Cochez cette case en cas de traitement par cette molécule.\r\nTraitement corticostéroïdes potentiellement immunosuppressif à partir de 20 mg/jour de prednisone ou équivalent ou 2 mg/kg pendant 15 jours. \r\nL’administration d’un vaccin vivant atténué doit être différée de 12 semaines après l’arrêt du traitement à ces doses."
