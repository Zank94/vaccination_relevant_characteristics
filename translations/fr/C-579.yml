---
label: Biothérapie entrainant une immunodépression
description: "Les biothérapies sont dirigées contre une cible immunitaire spécifique. Les plus utilisées sont des anti-TNF et des anti-IL-1. Elles sont indiquées dans les rhumatismes inflammatoires et les maladies auto-immunes. Actuellement, les thérapeutiques anti-TNF sont le traitement de référence dans les formes sévères et actives de polyarthrite rhumatoïde et de spondylarthropathie.Exemples de médicaments utilisés : infliximab (Inflectra®, Remicade®, Remsima®), adalimumab (Humira®, Trudexa®), etanercept (Enbrel®), anakinra (Kineret®), rituximab (MabThera®), abatacept (Orencia®) et brodalumab (Kyntheum®). Après l'arrêt d'une biothérapie, le délai à respecter pour l'administration d'un vaccin vivant est variable. Il est au minimum de trois mois (six mois après un traitement par rituximab)."
