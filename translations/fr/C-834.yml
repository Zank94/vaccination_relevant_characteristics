---
label: Drépanocytose traitée par hydroxyurée (Hydrea, Siklos)
description: L'hydroxyurée à doses faibles est régulièrement prescrite à des personnes souffrant de drépanocytose afin de prévenir les crises vaso-occlusives douloureuses récurrentes, chez l'enfant de plus de deux ans et chez l'adulte souffrant de drépanocytose symptomatique. Deux médicaments sont prescrits dans ce cadre, l'Hydrea et le Siklos. Il n'y a pas d'évidence clinique d'immunodépression induite par la prise d'hydroxyurée à faibles doses chez les drépanocytaires et les données disponibles laissent penser que les vaccins vivants pourraient probablement être administrés à des sujets traités par hydroxyurée à faible dose. Toutefois, l'AMM de l'Hydrea, utilisé par ailleurs hors AMM chez le drépanocytaire, contre-indique ce médicament en association avec les vaccins vivants atténués. L'AMM du Siklos déconseille l'utilisation concomitante d'hydroxycarbamide avec un vaccin à virus vivant. Elle précise que le traitement par Siklos et l'immunisation concomitante aux vaccins à virus vivant ne doivent être réalisés que si les bénéfices sont nettement supérieurs aux risques potentiels.
