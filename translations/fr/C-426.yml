label: Sclérodermie généralisée évolutive
description: La sclérodermie généralisée évolutive est une maladie auto-immune chronique rare qui affecte le tissu conjonctif du corps. Elle se caractérise par une production excessive de collagène, ce qui entraîne un épaississement et une durcissement de la peau, des articulations et des organes internes. Cette condition peut évoluer progressivement et affecter divers systèmes corporels, provoquant des symptômes tels que des douleurs articulaires, une raideur, une dysfonction des organes internes, des ulcères cutanés et des problèmes circulatoires. Le pronostic de la sclérodermie généralisée évolutive peut être variable, et le traitement vise à soulager les symptômes, à contrôler l'inflammation et à prévenir les complications. Il peut comprendre des médicaments immunosuppresseurs et une gestion attentive des problèmes spécifiques à chaque patient.
