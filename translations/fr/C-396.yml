---
label: Sérologie de l'hépatite A positive
description: Cette sérologie consiste à détecter la présence d'anticorps totaux (IgG et IgM) contre le virus de l'hépatite A (VHA). Une sérologie positive témoigne de la survenue antérieure d'une hépatite A. Une telle hépatite peut survenir chez l'enfant sans entrainer des signes cliniques. Si vous avez déjà eu une hépatite A, vous êtes définitivement protégé contre cette maladie et la vaccination anti-hépatite A n'est alors pas nécessaire.
