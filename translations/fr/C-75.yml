---
label: Manipulateur(rice) en électroradiologie médicale
description: Le manipulateur d'électroradiologie médicale est un professionnel de santé, à la fois soignant et technicien. En imagerie médicale, il participe à des examens médicaux (radiologie, scanner, IRM, médecine nucléaire électrophysiologie) dont la visée est l'établissement d'un diagnostic.
