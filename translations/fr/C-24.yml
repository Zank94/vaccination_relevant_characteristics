---
label: Infection à VIH
description: Le VIH (ou HIV) signifie virus de l'immunodeficience humaine. C'est un virus qui s'attaque aux défenses immunitaires de l'organisme, pouvant aboutir à un déficit de l'immunité avec un risque d'infections virales ou bacteriennes augmenté. L'importance du déficit dépend de la valeur des cellules immunitaires appelées CD4.
