label: Ambulancier (ère)
description: "The ambulance driver exercises his activity within a private company of medical transport or a health establishment. He ensures, on medical prescription or in the event of medical emergency, the assumption of responsibility and the transport of patients, of wounded, in vehicles of adapted medical transport. He informs himself on the degree of gravity of the patients and their types of injuries with the structure for which he works: SAMU, hospital, Red Cross... He is at the service of the patients, takes care of their comfort, installs them during the journey and can even intervene in case of emergency to provide first aid. The ambulance driver must take care of the maintenance of his vehicle and the sterilization of the material. He can also assist the patient for the formalities of entry and exit of the patients."
