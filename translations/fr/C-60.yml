---
label: Chirurgien
description: Le chirurgien est un docteur en médecine qui exerce une spécialité très technique. Il pratique des interventions physiques sur des tissus corporels, répare des traumatismes graves, corrige des malformations, soigne des infections, retire des organes malades… Le chirurgien est donc particulièrement exposé à une contamination par le sang. Il existe de nombreuses spécialités chirurgicales.
