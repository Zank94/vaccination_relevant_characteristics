---
label: Insuffisance respiratoire chronique
description: Insuffisance respiratoire chronique obstructive ou restrictive quelle que soit la cause, y compris les maladies neuromusculaires à risque de décompensation respiratoire, les malformations des voies aériennes supérieures ou inférieures, les malformations pulmonaires ou les malformations de la cage thoracique.
