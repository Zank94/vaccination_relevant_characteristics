---
label: Déficit immunitaire commun variable (DICV)
description: 'Le déficit immunitaire commun variable (DICV) est un groupe hétérogène de maladies caractérisées par une hypogammaglobulinémie de cause inconnue avec déficit de production d''anticorps spécifiques après immunisation, provoquant des infections bactériennes récidivantes, en général par bactéries encapsulées. Sa prévalence est estimée à 1/25.000 dans la population d''origine européenne et il atteint aussi bien les hommes que les femmes. '
