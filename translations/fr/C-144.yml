---
label: Famille bénéficiaire de la CMU, de la CMUc ou de l'AME
description: La Couverture maladie universelle (CMU) est une protection maladie obligatoire pour les personnes résidant en France et qui ne sont pas déjà couvertes par un autre régime obligatoire d'Assurance Maladie. La C.M.U. complémentaire (CMUc) est une protection complémentaire (comparable à une mutuelle) accordée sur critères de ressources. L'Aide Médicale de l'Etat (AME) permet l'accès aux soins des personnes étrangères résidant en France.
