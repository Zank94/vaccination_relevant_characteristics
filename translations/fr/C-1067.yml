---
label: Contact étroit et prolongé avec la population locale
description: "Question posée car des contacts étroits et prolongés avec la population locale peuvent favoriser la transmission du méningocoque. En effet, le méningocoque se trouve dans la gorge de certaines personnes appelées \"porteurs de méningocoque\". La transmission du méningocoque d'un porteur à une autre personne par l'intermédiaire des gouttelettes de salive (qui risque alors de déclencher une méningite) est favorisée par : \r

  - Des contacts proches, c'est-à-dire à une distance de moins de 1 mètre (les gouttelettes de salive sont assez lourdes et tombent rapidement) ;\r

  - Des contacts fréquents ou prolongés (par exemple plus d'une heure). \r

  Exemples de situation à risque durant le séjour : logement chez l'habitant, sorties en boite de nuit, transports de longue durée ou bondés, pratique de sports de contacts, stages en milieu scolaire, logement en internat..."
