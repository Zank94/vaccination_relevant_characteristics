---
label: Autre cancer avec atteinte de la moelle osseuse ou du système lymphatique
description: 'Cela concerne les cancers suivants : leucémie aiguë myéloïde (LAM), leucémie aiguë lymphoblastique (LAL), leucémie myéloïde chronique (LMC), leucémie lymphoïde chronique (LLC), myélome multiple, syndromes myélodysplasiques, syndromes myéloprolifératifs, lymphome de Hodgkin, lymphomes non hodgkiniens (notamment les formes diffus à grandes cellules B, folliculaire, du manteau, T périphérique), ainsi que la leucémie/lymphome à cellules T de l’adulte associée au virus HTLV-1.'
