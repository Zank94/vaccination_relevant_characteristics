label: Refus de vaccination contre les méningocoques ACWY
description: "Souvent appelé vaccin contre la méningite, il permet de prévenir les infections graves (méningite ou septicémie) dues aux méningocoques de sérogroupe A, C, W ou Y.Il existe deux vaccins de ce type commercialisés en France : le vaccin Menveo et le vaccin Nimenrix."
