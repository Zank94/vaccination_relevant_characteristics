label: Personne présentant des signes de covid 19 avec un test RT-PCR positif
description: 'La covid 19 peut se manifester par l''apparition brutale d''un ou plusieurs des signes suivants :signes infectieux (fièvre ou sensation de fièvre, frissons),toux ou gêne respiratoire, fatigue inexpliquée, courbatures inexpliquées,maux de tête en dehors d''une migraine connue,perte ou diminution de l''odorat et du goût.Chez les personnes de plus de 80 ans, d''autres signes sont évocateurs : baisse de l''état général, chutes à répétition, apparition ou aggravation de troubles cognitifs, confusion, diarrhée, aggravation d''une maladie chronique.Le diagnostic de la covid 19 en période aiguë repose sur la détection du matériel génétique du virus dans un échantillon nasopharyngé ou rhinopharyngé prélevé avec un écouvillon (test de RT-PCR).'
