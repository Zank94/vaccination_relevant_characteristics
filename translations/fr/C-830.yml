label: Syndrome d'hyper IgM
description: 'Ce syndrome est caractérisé par une hypogammaglobulinémie portant sur les IgG et les IgA avec un taux normal ou augmenté d''IgM.Plusieurs pathologies peuvent être individualisées parmi lesquelles il faut distinguer :1) Les situations s''accompagnant d''un déficit de l''immunité cellulaire :mutation du gène codant pour CD40 ligand, molécule intervenant dans la commutation isotypique dans le centre germinatif lors de la stimulation antigénique ;mutation du gène NEMO.2) Les syndromes d''hyper IgM avec déficit humoral isolé lié à une anomalie intrinsèque des lymphocytes B par mutations des gènes codant pour AID et UNG empêchant la commutation isotypique et non associés à des défauts cellulaires T.Comme au cours des autres hypogammaglobulinémies, les infections sont dominées par les infections respiratoires et ORL à bactéries encapsulées (S. pneumoniae, Haemophilus), plus rarement à pyogènes. P. aeruginosa est isolé en cas de dilatation des bronches. Les infections digestives sont fréquentes avec une prévalence élevée des giardiases.En cas de déficit cellulaire associé, d''autres germes sont impliqués : Pneumocystis, cryptosporidie responsables de diarrhée et de cholangites sclérosantes.'
