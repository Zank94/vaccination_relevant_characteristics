---
label: Risque d'exposition à des agents biologiques
description: Concerne notamment les professions de santé (médecin, pharmacien, infirmière, sage-femme, dentiste, etc.), soit du fait d'activités sur des agents biologiques (production industrielle de vaccins, laboratoire d'analyses médicales, recherche en virologie...) ;soit du fait d'expositions générées par l'activité professionnelle sans que celle-ci ait des agents biologiques pour objet (soins de santé humaine ou vétérinaire, agriculture...).Le risque d'exposition à des agents biologiques peut être lié à un contact  avec  des  patients,  le  corps  de  personnes  décédées ou  des  produits  biologiques soit directement, y compris par projection, soit indirectement, notamment lors de la manipulation et du transport de dispositifs médicaux, de prélèvements  biologiques,  de linge  ou de déchets  d'activité  de soins  à risque  infectieux. Le médecin du travail apprécie individuellement le risque d'exposition en fonction des caractéristiques du poste occupé par celles-ci et prescrit les vaccinations nécessaires.
