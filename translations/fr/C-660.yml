---
label: Volontaire stagiaire du service militaire volontaire (SMV)
description: Le SMV est un dispositif militaire d'insertion socioprofessionnelle au profit des jeunes de métropole âgés de 18 à 25 ans en difficulté scolaire et/ou sociale. Pendant une année, ces volontaires vont vivre en internat, sous statut militaire. L'encadrement militaire va les aider à acquérir un savoir-être qui par la suite va faciliter l'acquisition d'un savoir-faire professionnel. À terme, l'objectif est de favoriser leur employabilité dans un métier en tension et dans leur région.
