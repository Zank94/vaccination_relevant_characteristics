---
label: Personne immunodéprimée dans l'entourage
description: L'entourage des personnes immunodéprimées est une source potentielle de transmission d'agents infectieux par voie aérienne ou cutanée. En raison des incertitudes sur l'efficacité de la vaccination chez les personnes immunodéprimées et de la contre-indication des vaccins vivants chez ces patients, il est fortement recommandé afin de créer un « cercle de protection » de vérifier le statut vaccinal de leur entourage immédiat et de faire les mises à jour nécessaires conformément au calendrier vaccinal en vigueur. L'entourage immédiat est défini comme toute personne vivant sous le même toit ou susceptible d'assurer la garde (assistante maternelle, famille, garde-malade,...) et les personnels de santé susceptibles de les prendre en charge.
