---
label: Maladie de Bruton (agammaglobulinémie liée à l'X)
description: "L'agammaglobulinémie liée à l'X se manifeste par des infections bactériennes récidivantes des voies respiratoires et digestives et prédispose au risque d'infections chroniques par les entérovirus. Son incidence est de l'ordre de 1/200 000 naissances. Elle est liée à l'absence de production d'immunoglobulines. C'est une maladie héréditaire transmise sur le mode récessif lié à l'X. Cette maladie est provoquée par des mutations du gène codant pour la tyrosine kinase Btk. Elle se caractérise par un défaut de maturation des lymphocytes B. Le traitement repose principalement sur l'administration régulière d'immunoglobulines par voie veineuse ou sous-cutanée (source : Orphanet)."
