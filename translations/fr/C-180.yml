---
label: Psychomotricien(ne)
description: Sur prescription médicale, le psychomotricien aide les personnes souffrant de différents troubles psychomoteurs. Au moyen de techniques de relaxation, d'éducation gestuelle, d'expression corporelle et plastique et par des activités de jeu, de rythme, de coordination, le psychomotricien cherche à corriger ces difficultés d'origine psychique que peuvent rencontrer les adultes ou les enfants. Il exerce surtout à l'hôpital, mais peut aussi travailler en milieu libéral.
