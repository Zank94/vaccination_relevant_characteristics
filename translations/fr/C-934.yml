---
label: Autre facteur de risque d'infection grave à pneumocoque (enfant)
description: |-
  Les groupes d’enfants à risque élevé d'infection invasive à pneumocoque sont :
  - Infection par le virus de l’immunodéficience humaine (VIH)
  - Drépanocytose, asplénie fonctionnelle ou anatomique
  Défaut/fistule de la barrière cérébro-méningée
  - Implant cochléaire
  - Maladies chroniques telles que maladies cardio-vasculaires, pulmonaires (à l’exception de l’asthme), hépatique, syndrome néphrotique, diabète
  - Déficits immunitaires constitutionnels (y compris les déficits en complément et en properdine) ou secondaires aux traitements immunosuppresseurs (lymphomes, leucémies, cancers, transplantations d’organes)
  - Les prématurés d’âge gestationnel de moins de 32 semaines et les nourrissons de poids de naissance inférieur à 1500 g présentent, transitoirement jusqu’à l’âge de 24 mois, un risque élevé d’infection invasive à pneumocoque.
