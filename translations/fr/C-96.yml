---
label: Travaille dans une blanchisserie
description: Arrêté du 15 mars 1991 fixant la liste des établissements ou organismes publics ou privés de prévention ou de soins dans lesquels le personnel exposé doit être vacciné. Les blanchisseries sont assimilées aux établissements et organismes publics ou privés de prévention ou de soins mentionnés à l'article 1 de ce décret, dans la mesure où ils participent à l'activité de ces derniers.
