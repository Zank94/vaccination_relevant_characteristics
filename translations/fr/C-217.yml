label: Elève ambulancier
description: 'L''ambulancier exerce son activité au sein d''une entreprise privée de transport sanitaire ou d''un établissement de santé.Il assure, sur prescription médicale ou en cas d''urgence médicale, la prise en charge et le transport de malades, de blessés, dans des véhicules de transport sanitaire adaptés pour des raisons de soins ou de diagnostic.Ce professionnel connait l''état d''urgence de ses malades. En effet, il se renseigne sur le degré de gravité des patients et leurs types de blessures auprès de la structure pour laquelle il travaille : SAMU, hôpital, Croix-Rouge…Il est au service des malades, veille à leur confort, les installe durant le trajet et peut même intervenir en cas d''urgence pour prodiguer les premiers secours. L''ambulancier doit veiller à l''entretien de son véhicule et à la stérilisation du matériel. Il peut également assister le malade pour les formalités d''entrée et de sortie des malades.'
