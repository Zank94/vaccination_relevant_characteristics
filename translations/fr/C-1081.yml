---
label: Date de début de grossesse
description: La date de début de grossesse correspond au moment de la fécondation. Une grossesse commence environ 15 jours après les dernières menstruations. Cette information est importante car certaines vaccinations sont recommandées chez la femme enceinte (grippe, coqueluche) tandis que d'autres sont contre-indiquées (notamment celles utilisant des vaccins vivants).
