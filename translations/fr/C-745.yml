label: Contact récent avec un cas de covid 19
description: "Contact récent : dernier contact dans les 10 derniers jours.La personne contact à risque est une personne qui, en l'absence de mesures de protection efficaces pendant toute la durée du contact,a partagé le même lieu de vie que le cas confirmé ou probable ;a eu un contact direct avec un cas, en face à face, à moins d'un mètre, quelle que soit la durée (ex. conversation, repas, flirt, accolades, embrassades). En revanche, des personnes croisées dans l'espace public de manière fugace ne sont pas considérées comme des personnes contacts à risque ;a prodigué ou reçu des actes d'hygiène ou de soins ;a partagé un espace confiné (bureau ou salle de réunion, véhicule personnel…) pendant au moins 15 minutes consécutives ou cumulées sur 24 h avec un cas, ou étant resté en face à face avec un cas durant plusieurs épisodes de toux ou d'éternuement ;est élève ou enseignant de la même classe scolaire (maternelle, primaire, secondaire, groupe de travaux dirigés à l'université).Un espace confiné est un espace qui ne permet pas de respecter le critère de distanciation sociale soit une distance minimale de 2 mètres autour d'une personne.Enfin, ne sont pas considérés comme mesures de protection efficaces : une plaque de plexiglas posée sur un comptoir, les masques en tissu « maison » ainsi que les visières en plastique transparent portées seules."
