---
label: Déficit des cellules phagocytaires (granulomatose septique)
description: Il s'agit d'un déficit immunitaire de l'immunité non spécifique, de transmission récessive liée au sexe. Elle se manifeste dans les premiers mois de la vie, chez le garçon, par des infections à germes divers, bactéries ou champignons, atteignant la peau, le système lymphatique, l'arbre broncho pulmonaire, le foie et la rate.
