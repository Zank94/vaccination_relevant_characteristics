label: Chimiothérapie en cours pour hémopathie maligne (leucémie)
description: 'Chimiothérapie en cours pour leucémie : il s''agit d''un traitement lourd destiné à détruire les cellules tumorales, mais pouvant aussi affaiblir l''organisme et entrainer une immunodépression pendant le traitement et plusieurs mois après.'
