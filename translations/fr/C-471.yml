---
label: Maladie inflammatoire chronique intestinale
description: Une maladie inflammatoire chronique intestinale (MICI) est un groupe de troubles gastro-intestinaux, notamment la maladie de Crohn et la rectocolite hémorragique, caractérisés par une inflammation persistante et récurrente de la muqueuse intestinale. Les MICI provoquent des symptômes tels que des douleurs abdominales, des diarrhées, des saignements rectaux et peuvent avoir des répercussions importantes sur la qualité de vie des patients. Le traitement vise à contrôler l'inflammation et à soulager les symptômes.
