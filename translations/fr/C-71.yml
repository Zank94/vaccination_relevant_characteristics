label: Aide-soignant(e)
description: "Intégré à une équipe de soins, l'aide-soignant assiste l'infirmier dans les activités quotidiennes de soins. Il contribue au bien-être des malades, en les accompagnant dans tous les gestes de la vie quotidienne et en aidant au maintien de leur autonomie. En collaboration avec l'infirmier et sous sa responsabilité, l'aide-soignant réalise les soins d'hygiène et de confort du malade : toilette, repas, réfection des lits, accueil, installation et transfert des patients. Le métier d'aide-soignant s'exerce aussi bien à l'hôpital qu'en clinique."
