---
label: Infirmier(ère)
description: Les infirmières exercent dans des cabinets libéraux, dans des centres de santé ou dans des services hospitaliers ou de prévention. Les infirmières dispensent les soins prescrits par les médecins et peuvent elles-mêmes prescrire certains actes. Les risques d'exposition à certaines maladies infectieuses sont liés aux conditions de travail.
