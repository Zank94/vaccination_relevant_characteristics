label: Sclérose en plaques
description: La sclérose en plaques (SEP) est une maladie neurologique auto-immune chronique du système nerveux central, notamment du cerveau et de la moelle épinière. Elle se caractérise par la formation de plaques de démyélinisation, où la gaine protectrice entourant les fibres nerveuses est endommagée, entraînant une perturbation de la transmission des signaux nerveux. Les symptômes de la SEP sont divers et peuvent inclure une fatigue intense, des troubles de la vision, des problèmes de coordination, des engourdissements, des troubles cognitifs et des problèmes de mobilité. La SEP évolue généralement par poussées et rémissions, avec des périodes de symptômes exacerbés suivies de phases de rétablissement partiel. Bien qu'il n'existe pas de traitement curatif, divers traitements permettent de réduire les symptômes, de ralentir la progression de la maladie et d'améliorer la qualité de vie des patients.
