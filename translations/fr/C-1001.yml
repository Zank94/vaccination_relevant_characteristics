---
label: Personne-contact à risque de mpox
description: "Il y a deux situations à risque :\r\n- Toute personne ayant eu un contact physique direct non protégé avec la peau lésée ou les fluides biologiques d’un cas probable ou confirmé symptomatique, quelles que soient les circonstances y compris rapport sexuel, actes de soin médical ou paramédical, ou partage d’ustensiles de toilettes, ou contact avec des textiles (vêtements, linge de bain, literie) ou de la vaisselle sale utilisés par le cas probable ou confirmé symptomatique.\r\n- Toute personne ayant eu un contact non protégé à moins de 2 mètres pendant 3 heures (cumulées durant 24h) avec un cas probable ou confirmé symptomatique (ex. ami proche ou intime, partenaire sexuel habituel même en l’absence de rapports sexuels, personnes partageant le même lieu de vie sans lien intime, voisin pour un transport de longue durée, personnes partageant le même bureau, acte de soin ou d’hygiène, même classe scolaire, salle de TD universitaire, club de sport pour les sports de contacts, salles de sports…)."
