---
label: Purpura thrombopénique
description: Le purpura thrombopénique correspond à une baisse des plaquettes entraînant des petits saignements superficiels au niveau de la peau appelé purpura. La baisse des plaquettes est mis en évidence sur une prise de sang. La baisse importante des plaquettes peut dans certains cas aboutir à des hémorragies (saignement de nez, hémorragies buccales, hématomes…)
