label: Déficit en IgA
description: 'Le déficit sélectif en immunoglobuline A est un déficit immunitaire primaire (ou congénital) ; c''est le plus fréquent des déficits primaires en anticorps. Avec une incidence de 1/325 personnes en occident, ce n''est pas une maladie rare. Du fait de l''absence partielle ou totale des IgA qui jouent un rôle majeur dans la protection des muqueuses contre les infections, les individus affectés souffrent d''épisodes récurrents d''infections respiratoires ou gastro-intestinales. Ils peuvent aussi présenter une immunodéficience commune variable et l''incidence des désordres autoimmuns est augmentée. L''étiologie du déficit sélectif en immunoglobuline A n''est pas élucidée, mais une transmission familiale observée dans 20 à 25% des cas suggère une influence génétique. Il n''y a pas de traitement spécifique de cette maladie, en revanche, les infections doivent être soignées efficacement. Les patients atteints de déficit sélectif total en IgA doivent en informer le personnel soignant en raison du risque potentiel de réaction anaphylactique lors de la transfusion de produits sanguins. Source : Orphanet.'
