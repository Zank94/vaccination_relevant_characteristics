---
label: Cardiopathie congénitale cyanogène
description: Une cardiopathie congénitale cyanogène est une malformation cardiaque présente dès la naissance qui provoque un mélange anormal de sang oxygéné et non oxygéné dans le cœur, conduisant à une cyanose (teinte bleuâtre de la peau et des lèvres). Parmi les exemples courants de cardiopathies congénitales cyanogènes, on trouve la tétralogie de Fallot et la transposition des gros vaisseaux. Les symptômes incluent une fatigue, des difficultés respiratoires et une croissance lente.
