---
label: Neutropénie chronique sévère
description: Les patients atteints de neutropénie chronique présentent en permanence ou de façon récurrente une baisse de neutrophiles en dessous de 1 500 neutrophiles par mm3, entraînant une susceptibilité aux infections bactériennes (staphylocoque, streptocoque, bacilles à coloration de Gram négative) et aux infections mycotiques (candidose, aspergillose systémique). Ils présentent aussi des gingivostomatites. On parle de neutropénie sévère si le chiffre des neutrophiles est inférieur à 500 mm3.
