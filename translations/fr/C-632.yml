---
label: Date du dernier antécédent de coqueluche
description: Il faut être certain qu'il s'agit bien d'une coqueluche (prouvée par un test biologique, à vérifier avec votre médecin). On estime qu'une personne qui a eu la coqueluche est protégée contre la survenue d'une nouvelle infection coquelucheuse pendant environ 10 ans. Lorsque cette case est cochée, on considère que la vaccination n'est pas pas nécessaire.Si la maladie est survenue avant l'âge de deux ans, le programme vaccinal est poursuivi normalement.
