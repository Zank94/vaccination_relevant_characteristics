---
label: Préparateur(ice) en pharmacie, accueillant des patients
description: Ce professionnel connaît bien les médicaments et leur usage. Sous la responsabilité du pharmacien, le préparateur prépare les prescriptions médicales en respectant les doses et les normes d'hygiène. Il gère également les stocks de médicaments dans une pharmacie d'officine ou hospitalière.
