---
label: Secrétaire médical(e), accueillant des patients
description: La secrétaire médicale assiste le médecin et est le premier interlocuteur du patient, au téléphone lorsqu'il souhaite prendre rendez-vous, ou lors de son accueil dans le cabinet médical ou le service hospitalier. Elle met en confiance les personnes et répond à leurs questions.
