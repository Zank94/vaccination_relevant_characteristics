---
label: Patient présentant un déficit en complément ou traité par Soliris® (eculizumab) ou Ultomiris® (ravulizumab) dans l'entourage
description: Cochez cette case si une personne vivant ou gardée sous le même toit présente un déficit en complément (fraction terminale ou properdine) ou est traitée par Soliris®.Le Soliris® (eculizumab) est un traitement anti-C5 qui inhibe l'action du complément. Le complément est un ensemble de protéines (C5 étant l'une d'entre elles) aux propriétés anti-bactériennes, qui jouent un rôle important dans l'inflammation et l'immunité. Soliris® est indiqué pour le traitement de l'hémoglobinurie paroxystique nocturne ou du syndrome hémolytique et urémique atypique (SHU atypique).La fragilité de ces patients présentant un déficit en complément (déficit congénital ou lié à un traitement par Soliris®) pour certaines infections explique pourquoi des recommandations vaccinales s'appliquent à leur entourage.
