---
label: Exposition au virus Mpox en zone endémique
description: 'Personnes qui se rendent dans des zones géographiques où la prévalence de l''infection est élevée et où l''exposition au MPXV dans l''environnement immédiat ou dans le cadre de l''exercice de la profession (exemple : contact avec la population locale dans le cadre d’une ONG) peut constituer un risque accru d''infection.'
