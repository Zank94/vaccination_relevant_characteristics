---
label: Lupus érythémateux aigu disséminé
description: Le lupus érythémateux aigu disséminé, souvent abrégé en "lupus", est une maladie auto-immune systémique qui affecte divers organes et tissus du corps. Il se caractérise par des symptômes inflammatoires tels que des éruptions cutanées en forme de papillon sur le visage, des douleurs articulaires, de la fièvre, de la fatigue et des atteintes des organes internes, comme les reins ou le cœur. Le lupus est causé par une réponse immunitaire anormale où le système immunitaire attaque les propres cellules et tissus du corps. Son évolution est variable, avec des périodes de rémission et de poussées de la maladie. Le traitement implique généralement des médicaments immunosuppresseurs pour contrôler l'inflammation et les symptômes.
