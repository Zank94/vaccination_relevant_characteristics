---
label: Maladie neuromusculaire chronique avec risque de fausse déglutition
description: Il s'agit des maladies neuromusculaires (myopathies) chroniques avec risque de pneumopathie par fausse déglutition (sclérose latérale amyotrophique (SLA), myasthénie grave, dystrophie musculaire, polymyosite et dermatomyosite, syndromes myasthéniques congénitaux, maladie de Parkinson, accident vasculaire cérébral).
