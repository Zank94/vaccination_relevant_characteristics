label: Antécédent de réaction anaphylactique grave à un vaccin, un médicament ou un aliment
description: 'L''anaphylaxie représente la forme la plus spectaculaire et dangereuse de l''allergie : l''issue peut être fatale. Elle peut revêtir différentes formes cliniques, affectant un ou plusieurs organes avec une intensité variable :urticaire (éruption similaire à des piqûres d''orties), œdème du visage et œdème de Quincke (spasme laryngé),difficultés respiratoires, crise d''asthme (spasme bronchique),signes digestifs (douleurs abdominales, nausée, vomissement, diarrhée),malaise (pâleur, sensation de mort imminente, chute de tension), perte de connaissance voire coma.Les symptômes apparaissent le plus souvent très rapidement, dans les minutes suivant le contact avec l''allergène. Dans environ 10 % des cas, une deuxième réaction survient quelques heures après la réaction initiale : on parle d''anaphylaxie biphasique, un phénomène qui justifie une hospitalisation pour surveillance après le constat d''une anaphylaxie.L''anaphylaxie est due à une activation innapropriée de cellules du système immunitaire, les mastocytes des tissus et des basophiles du sang, provoquant en quelques secondes/minutes une libération massive d''histamine, molécule à l''origine des symptômes.'
