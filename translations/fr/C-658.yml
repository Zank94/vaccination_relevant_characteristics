---
label: Assistant(e) dentaire
description: La mission de l'assistant dentaire est d'effectuer les opérations de nettoyage et de stérilisation. Il est susceptible d'assurer la fonction d'aide-opératoire. Les assistants dentaires sont exposés au virus de l'hépatite B car ils manipulent des objets piquants ou tranchants après usage pour un patient. Dans une étude réalisée entre 1995 et 2001 aux Etats Unis, 75 % des accidents avec exposition au sang surviennent dans les cabinets dentaires.
