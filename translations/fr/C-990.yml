---
label: Dosage postvaccinal des anticorps antitétaniques (UI/mL)
description: Ce dosage doit être réalisé entre 4 et 8 semaines après l'administration d'une dose de vaccin contenant la valence tétanique combinée à d'autres valences. Une valeur élevée traduit l'existence d'un effet rappel et signifie que la personne avait déjà été vaccinée.
