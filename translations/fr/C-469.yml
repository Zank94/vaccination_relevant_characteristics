label: Périartérite noueuse
description: La périartérite noueuse, également appelée polyangéite microscopique, est une maladie inflammatoire des vaisseaux sanguins (vasculite) qui affecte principalement les petites et moyennes artères. Cette affection auto-immune provoque une inflammation des parois des artères, ce qui peut entraîner leur rétrécissement ou leur blocage, perturbant ainsi la circulation sanguine vers divers organes et tissus. Les symptômes de la périartérite noueuse varient en fonction des artères touchées, mais ils peuvent inclure des douleurs musculaires, de la fièvre, de la fatigue et des problèmes d'organes tels que les reins, les nerfs ou le tractus gastro-intestinal. Le traitement implique généralement des médicaments immunosuppresseurs pour contrôler l'inflammation et prévenir les dommages vasculaires.
