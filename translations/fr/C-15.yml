---
label: Nouveau-né de mère porteuse de l'antigène HBs
description: L'antigène HBs (ou Ag HBs) est un constituant du virus de l'hépatite B. Être porteur de l'antigène HBs signifie que l'on vit avec le virus de l'hépatite B. Ce portage peut passer inaperçu et ne pas entraîner de signes d'hépatite B. Malgré cela il peut être à l'origine d'une infection du nouveau-né.
