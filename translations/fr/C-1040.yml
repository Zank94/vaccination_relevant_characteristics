---
label: Ac Anti-VHA (IgG ou Ig totales en UI/L)
description: Cette sérologie consiste à détecter la présence d'anticorps totaux (IgG et IgM) contre le virus de l'hépatite A (VHA). Une sérologie positive réalisée avant la vaccination (sérologie pré-vaccinale) témoigne de la survenue antérieure d'une hépatite A. Une telle hépatite peut survenir chez l'enfant sans entrainer des signes cliniques. Les personnes qui ont eu une hépatite A sont définitivement protégées contre cette maladie et la vaccination anti-hépatite A n'est alors pas nécessaire. Réalisée après la vaccination, la sérologie de l'hépatite A peut être utilisée pour vérifier l'efficacité de la vaccination, en particulier chez les personnes immunodéprimées. Le seuil de positivité est de 20 UI/L.
