---
label: Sage-femme
description: La sage-femme a pour mission d'accompagner les femmes enceintes tout au long de leur grossesse, de l'établissement du diagnostic jusqu'au jour de l'accouchement. Plus largement, elle assure aussi le suivi gynécologique. Ce métier difficile demande à la fois des compétences médicales et psychologiques. Les sages-femmes peuvent également vacciner.
