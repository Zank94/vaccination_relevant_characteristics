---
label: Polypathologie chronique
description: 'Aux moins deux affections parmi les suivantes : bronchopneumopathie chronique obstructive, cancer (oncologique ou hématologique) actif ou avec chimiothérapie récente, diabète, maladie rénale chronique grave (incluant celles nécessitant une dialyse), hypertension artérielle compliquée, obésité (;#8805; 30 kg/m2), insuffisance cardiaque, insuffisance respiratoire chronique, greffe d''organes ou de moelle et trisomie 21, maladie rare (voir la liste dans la rubrique correspondante).'
