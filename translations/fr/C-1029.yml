label: Date du dernier antécédent de dengue
description: "Un antécédent de dengue est défini par l'existence d'une preuve documentée d’une infection antérieure par un virus de la dengue, c’est-à-dire biologiquement confirmée en laboratoire (RT-PCR, antigénémie NS1, sérologie IgM/IgG) OU cliniquement diagnostiquée en contexte épidémique de dengue et inscrite dans un document médical (ex. : carnet de santé).\r

  Si un antécédent de dengue est déclaré après 6 mois, donnez une date approximative."
