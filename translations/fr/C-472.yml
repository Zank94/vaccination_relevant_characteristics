---
label: Autre maladie auto-immune
description: "Les maladies auto-immunes sont un ensemble de maladies liées au système immunitaire. Elles se caractérisent par une agression de l'organisme par ses propres cellules de l'immunité. Les traitements de ce type de maladie visent donc à réprimer le système immunitaire trop réactif et sont appelés « immunosuppresseurs ». Exemples : syndrome de Gougerot-Sjögren, dermatomyosite, polymyosite."
