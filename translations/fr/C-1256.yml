label: Employé(e) de fermes avicoles ou d'élevage d'animaux à fourrure
description: Les employé(e)s des fermes avicoles et d’élevage d’animaux à fourrure travaillent dans des exploitations spécialisées dans l’élevage de volailles pour la viande et les œufs, ainsi que d’animaux comme les visons ou les renards pour leur fourrure.
