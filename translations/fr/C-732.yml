---
label: Risque élevé d'exposition à la tuberculose (évalué par le médecin du travail)
description: Personnels susceptibles d'être très exposés, tels que les professionnels en contact répété avec des patients tuberculeux et tout particulièrement ceux à risque de tuberculose multi résistante, ou les personnels de laboratoires travaillant sur les mycobactéries (cultures, modèles animaux…).
