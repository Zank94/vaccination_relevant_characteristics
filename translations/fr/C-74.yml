label: Auxiliaire de puériculture
description: L'auxiliaire de puériculture réalise des activités d'éveil et des soins visant au bien-être, à l'autonomie et au développement de l'enfant. Son rôle s'inscrit dans une approche globale et prend en compte la dimension relationnelle des soins ainsi que la communication avec la famille dans le cadre du soutien à la parentalité. L'auxiliaire de puériculture participe à l'accueil des enfants et à l'intégration sociale d'enfants porteurs de handicap, atteints de maladies chroniques ou en situation de risque d'exclusion.L'auxiliaire travaille le plus souvent dans une équipe pluri-professionnelle et dans des structures sanitaires ou sociales, en collaboration et sous la responsabilité de l'infirmier ou de la puéricultrice.
