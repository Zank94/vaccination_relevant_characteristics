label: Adulte susceptible de devenir parent dans les mois ou années à venir
description: Il s'agit donc des adultes susceptibles de devenir parents dans les mois ou années à venir, y compris dans le cadre d'une adoption. Cette question est posée pour savoir s'il faut appliquer la stratégie du cocooning, consistant à protéger les parents pour éviter la contamination des nourrissons par la bactérie responsable de la coqueluche, une maladie très grave chez le tout petit. Il s'agit aussi de recommander éventuellement la vaccination contre la varicelle aux futures mamans.
