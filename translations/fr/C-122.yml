label: Personne infectée par le virus de l'hépatite B ou porteur chronique de l'antigène HBs dans l'entourage
description: Il s'agit des personnes infectées par le virus de l'hépatite B (ou VHB) ou porteurs de l'antigène HBs (un marqueur biologique quitémoigne de l'existence d'une infection chronique par le VHB). Les personnes concernées sont celles vivant sous le même toit.
