label: Déficit en sous-classes d'IgG
description: Les immunoglobulines de type G sont composées de 4 sous-groupes appelés sous-classes d'IgG. Le sérum normal contient un mélange des quatre sous-classes IgG avec environ 65 % d'IgG1, 25 % d'IgG2, 5 % d'IgG3 et 2,5 % d'IgG4.Elles ont des propriétés particulières, par exemple les IgG2 et IgG4 sont responsables de la majorité de la réponse immune contre les bactéries encapsulées (pneumocoque, Haemophilus influenzae de type b).Le déficit en sous classes des IgG est responsable d'infections à répétition (notamment des voies aériennes supérieures)et de manifestations autoimmunes (vascularites).
