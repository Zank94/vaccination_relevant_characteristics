---
label: Chirurgien-dentiste
description: Le chirurgien-dentiste s'occupe médicalement de la bouche, des dents, des gencives et des maxillaires. Il soulage, répare et veille aussi à l'esthétique du sourire. Il traite les caries et les infections plus graves de la cavité buccale. Il pose des prothèses. Le chirurgien-dentiste peut donc être exposé au sang ou à d'autres liquides biologiques.
