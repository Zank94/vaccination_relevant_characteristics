label: Autre traitement immunosuppresseur
description: "Il peut s'agir de traitements administrés à des patients présentant une maladie auto-immune, une greffe d'organe ou de moelle osseuse ou atteints de cancer (cures de chimiothérapie, radiothérapie). Ces traitements diminuent les défenses immunitaires et exposent à un risque accru d'infections, pouvant justifier certaines vaccinations. A l'inverse, ils peuvent contre-indiquer d'autres vaccinations (notamment par un vaccin vivant). Après l'arrêt d'un traitement immunosuppresseur, le délai à respecter pour l'administration d'un vaccin vivant est variable. Il est au minimum de trois mois. Exemples de traitements immunosuppresseurs (liste non exhaustive) : corticoïdes, méthotrexate, ciclosporine, tacrolimus, azathioprine ou cyclophosphamide."
