label: Antécédent prouvé de covid 19
description: Une preuve biologique est nécessaire (RT-PCR ou test antigénique). Une sérologie positive témoigne d'un contact antérieur avec le virus si elle est pratiquée avant la vaccination ou en même temps qu'elle. Complétez aussi la rubrique Examens biologiques et parlez-en à votre médecin.
