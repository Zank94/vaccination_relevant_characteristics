---
label: Nourrisson de moins de 6 mois, prématuré ou souffrant d'une maladie chronique vivant dans l'entourage de cette personne
description: C'est-à-dire s'il s'agit d'un nourrisson de moins de 6 mois présentant l'un des facteurs de risque de grippe grave suivants :prématuré, surtout s'il souffre de séquelles respiratoires à type de broncho dysplasie traitée au cours des six mois précédents par ventilation mécanique ou oxygénothérapie prolongée ou traitement médicamenteux continu (corticoïdes, bronchodilatateurs ou diurétiques,atteint d'une maladie du cœur,présentant un déficit immunitaire congénital (c'est-à-dire acquis à la naissance),atteint d'une maladie pulmonaire, neurologique ou neuromusculaire,soigné pour une affection de longue durée.En cas de doute, demandez conseil à votre médecin.La notion d'entourage comprend le milieu familial (personnes résidant sous le même toit), la nourrice et toutes les personnes ayant des contacts réguliers avec le nourrisson.
