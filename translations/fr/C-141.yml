---
label: Corticothérapie prolongée ou à forte dose
description: "Concernant la corticothérapie, la dose et la durée au delà desquelles l'administration d'un vaccin vivant est contre indiquée (corticothérapie immunosuppressive) sont les suivantes.  Chez l’adulte : 10 mg d’équivalent-prednisone par jour, depuis plus de deux semaines. Chez l’enfant : 2 mg/kg d’équivalent-prednisone par jour (et au-delà de 20 mg par jour chez les enfants de plus de 10 kg), depuis plus de deux semaines. Les « bolus » de corticoïdes contre-indiquent l’administration d’un vaccin vivant durant les trois mois qui suivent."
