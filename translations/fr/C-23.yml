---
label: Drépanocytose homozygote
description: La drépanocytose homozygote est une maladie génétique du sang caractérisée par la présence de deux copies anormales du gène de l'hémoglobine, appelé HbS. Cela provoque la production d'hémoglobine anormale, l'hémoglobine S, qui déforme les globules rouges en forme de faucille au lieu de leur forme normale. Ces globules rouges en forme de faucille peuvent obstruer les vaisseaux sanguins, provoquant des crises de douleur intense, des complications vasculaires et une anémie. La drépanocytose homozygote est une forme grave de la maladie et nécessite des soins médicaux constants.
