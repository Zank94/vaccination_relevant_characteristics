label: Hémophilie
description: L'hémophilie est une maladie de la coagulation du à un manque de protéines coagulantes. Il en résulte des saignements plus fréquents et des hématomes au moindre traumatisme. Cette maladie est le plus souvent contractée des la naissance. Les formes apparaissant à l'age adulte sont exceptionelles.
