---
label: Employé(e) dans une entreprise de transport de corps avant mise en bière, en lien avec un établissement de prévention ou de soins
description: L'article 1 de http://www.legifrance.gouv.fr/affichTexte.do?cidTexte=LEGITEXT000020375184 l'arrêté du 15 mars 1991 fixe la liste des établissements ou organismes publics ou privés de prévention ou de soins dans lesquels toute personne exposée à des risques de contamination doit être immunisée contre l'hépatite B, la diphtérie, le tétanos et la poliomyélite lorsqu'elle exerce une activité professionnelle.Les entreprises de transport de corps avant mise en bière sont assimilées aux établissements et organismes mentionnés à l'article 1, dans la mesure où ils participent à l'activité de ces derniers.
