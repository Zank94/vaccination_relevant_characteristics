label: Allergie à l'oeuf
description: Allergie à l'oeuf. L'allergie aux œufs est l'une des allergies alimentaires les plus communes chez les enfants (1 à 3 % des enfants de moins de 3 ans). Comme elle disparaît le plus souvent avec l'âge, cette allergie est beaucoup moins fréquente chez l'adulte. Le plus souvent, les manifestations allergiques surviennent peu de temps après la consommation d'œufs ou d'aliments contenant des œufs, surtout s'il s'agit d'œufs crus ou peu cuits (mousse au chocolat maison, œufs à la coque...). Les signes les plus souvent observés sont des rougeurs et des démangeaisons autour de la bouche, un gonflement de la bouche ou de la gorge, une urticaire, des vomissements, un inconfort, de la difficulté à respirer ou une hypotension. Allergie au poulet. L'allergie au poulet désigne l'allergie à la chair de poulet, par opposition à l'allergie aux plumes. Elle est très rare.Si vous pensez être allergique à l'oeuf ou au poulet, consultez votre médecin si ce n'est pas encore fait. L'allergie à l'oeuf ou au poulet peut entraîner une contre-indication ou des précautions d'emploi pour certains vaccins pouvant contenir des traces d'oeuf ou de poulet.
