---
label: Déficit immunitaire combiné sévère
description: "Le déficit immunitaire combiné sévère (DICS) ou agammaglobulinémie type alymphocytose est un déficit héréditaire de transmission autosomique récessive. Il se caractérise par un défaut de différenciation des lymphocytes T et B. Il en existe plusieurs formes : déficits en protéine RAG-1 ou RAG-2, déficit en protéine Artemis caractérisé par une sensibilité cellulaire excessive aux radiations ionisantes. Le DICS se manifeste chez l'enfant, dès les premiers mois de vie, par des infections récurrentes bactériennes ou virales (cytomégalovirus, Pneumocistis carinii), une diarrhée sévère et un retard staturopondéral. Il faut prohiber chez les sujets suspects l'utilisation de vaccins vivants ainsi que la transfusion de produits sanguins non irradiés. L'incidence est de l'ordre de 1/500 000 naissances. Le traitement consiste en l'allogreffe de cellules souches hématopoïétiques. Le diagnostic anténatal du DICS repose essentiellement sur la mise en évidence de l'absence des différentes populations lymphocytaires et donc de leur fonction. Ce diagnostic est réalisé à 20 semaines de grossesse sur ponction de sang foetal. Dans les familles où une mutation du gène RAG a pu être identifiée, ou dont la liaison génétique de la maladie au locus présent sur le chromosome 10p a pu être établie, un diagnostic anténatal peut être réalisé à 11 semaines d'aménorrhée sur biopsie de trophoblaste. Source : Orphanet."
