---
label: Pharmacien
description: Le pharmacien est un spécialiste du médicament. Il est chargé à l'hôpital ou dans une pharmacie de ville de délivrer les médicaments prescrits sur ordonnance par un médecin en vérifiant l'absence d'interaction ou de tout élément pouvant influencer la sécurité ou l'efficacité du traitement. Le pharmacien a d'autres rôles, par exemple dans le domaine de la prévention. Il est maintenant autorisé à vacciner les adultes contre la grippe.
