---
label: Emphysème
description: L'emphysème est une affection pulmonaire chroniquecaractérisée par une dilatation des alvéoles pulmonaires (petits sacs d'air à l'extrémité des bronchioles terminales, où se font les échanges gazeux avec la circulation sanguine) et par une destruction des cloisons séparant les alvéoles.Le tabagisme en est la principale cause.
