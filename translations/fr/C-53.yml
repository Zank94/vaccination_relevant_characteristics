---
label: Femme enceinte dans l’entourage, NON VACCINEE contre la coqueluche pendant la grossesse
description: "Les personnes devant cocher cette case sont notamment : le conjoint et les enfants de la femme enceinte ; toute personne susceptible d'être en contact étroit et durable avec le futur nourrisson au cours de ses 6 premiers mois (ceci peut concerner les grands-parents, les baby-sitters...). Mais seulement si la femme enceinte n'est pas vaccinée contre la coqueluche."
