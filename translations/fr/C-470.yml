label: Rhumatisme inflammatoire
description: "Le rhumatisme inflammatoire est un terme générique désignant un groupe de maladies rhumatismales chroniques caractérisées par une inflammation persistante des articulations et des tissus conjonctifs. Ces affections sont souvent auto-immunes, ce qui signifie que le système immunitaire attaque errone les propres tissus du corps, pouvant entrainer une inflammation et des dommages articulaires. Exemples courants de rhumatismes inflammatoires : polyarthrite rhumatoïde, spondylarthrite ankylosante et lupus érythémateux systémique. Les symptômes typiques incluent des douleurs articulaires, une raideur, un gonflement et une fatigue. Le traitement vise à réduire l'inflammation, à soulager les symptômes et à prévenir les dommages articulaires permanents, souvent grâce à des médicaments immunosuppresseurs."
