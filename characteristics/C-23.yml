label: Homozygous sickle cell disease
description: "Sickle cell anemia is a constitutional corpuscular hemolytic anemia related to a structural abnormality of hemoglobin. It is a hereditary disease that is widespread throughout the world, mainly among blacks in equatorial Africa, but also in the Mediterranean region, the Middle East, the Indian continent and areas where these populations migrate (e.g. black Americans). Heterozygous subjects are asymptomatic and clinically healthy, and SS homozygotes are ill. Other Hb abnormalities can be associated with sickle cell disease: HbC, a ;#61538;;#61472;or ;#61537;thalassemia (double heterozygotes). The disease is characterized by acute attacks of occlusion of small arteries (vaso-oclusive attacks). and is complicated by hemolysis. The main expression is intense pain accompanied by fever."
