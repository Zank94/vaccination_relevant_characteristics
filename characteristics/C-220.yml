label: Student childcare assistant
description: The childcare assistant carries out awakening activities and care aimed at the well-being, autonomy and development of the child. His/her role is part of a global approach and takes into account the relational dimension of care as well as communication with the family within the framework of parental support. The childcare assistant participates in the reception of children and the social integration of children with disabilities, chronic illnesses or at risk of exclusion. The assistant usually works in a multi-professional team and in health or social structures, in collaboration with and under the responsibility of the nurse or the childcare worker.
