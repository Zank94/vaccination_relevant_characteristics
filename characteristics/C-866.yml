label: History of severe anaphylactic reaction to a vaccine, drug or food
description: "Anaphylaxis is the most spectacular and dangerous form of allergy: the outcome can be fatal. It can take different clinical forms, affecting one or more organs with varying intensity: urticaria (rash similar to nettle stings), facial edema and angioedema (laryngeal spasm), breathing difficulties, asthma attack (bronchial spasm), digestive signs (abdominal pain, nausea, vomiting, diarrhea), malaise (pallor, sensation of imminent death, drop in blood pressure), loss of consciousness or even coma.Symptoms usually appear very quickly, within minutes of contact with the allergen. In about 10% of cases, a second reaction occurs a few hours after the initial reaction: this is known as biphasic anaphylaxis, a phenomenon that justifies hospitalization for monitoring after anaphylaxis has been observed.anaphylaxis is due to an inappropriate activation of cells of the immune system, mast cells in the tissues and basophils in the blood, causing a massive release of histamine, the molecule that causes symptoms, in just a few seconds/minutes."
