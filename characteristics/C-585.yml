label: IgA deficiency
description: "Selective immunoglobulin A deficiency is a primary (or congenital) immune deficiency and is the most common primary antibody deficiency. With an incidence of 1/325 people in the West, it is not a rare disease. Due to the partial or total absence of IgA antibodies, which play a major role in the protection of mucous membranes against infections, affected individuals suffer from recurrent episodes of respiratory or gastrointestinal infections. They may also have a variable common immunodeficiency and the incidence of autoimmune disorders is increased. The etiology of selective immunoglobulin A deficiency is not elucidated, but familial transmission observed in 20-25% of cases suggests a genetic influence. There is no specific treatment for this disease, but infections must be treated effectively. Patients with selective total IgA deficiency should inform their caregivers because of the potential risk of an anaphylactic reaction when transfusing blood products. Source: Orphanet."
