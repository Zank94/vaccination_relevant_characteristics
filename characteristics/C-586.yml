label: Severe combined immune deficiency
description: 'Severe combined immunodeficiency (SCID) or agammaglobulinemia of the alymphocytosis type is an autosomal recessive inherited disorder. It is characterized by a defect in the differentiation of T and B lymphocytes. There are several forms: RAG-1 or RAG-2 protein deficiency, Artemis protein deficiency characterized by excessive cellular sensitivity to ionizing radiation. DICS manifests itself in children, from the first months of life, by recurrent bacterial or viral infections (cytomegalovirus, Pneumocistis carinii), severe diarrhea and delayed growth. The use of live vaccines and the transfusion of non-irradiated blood products should be prohibited in suspected cases. The incidence is about 1/500,000 births. Treatment consists of allogeneic hematopoietic stem cell transplantation. The antenatal diagnosis of SCID is based essentially on the identification of the absence of the various lymphocyte populations and therefore of their function. This diagnosis is made at 20 weeks of pregnancy by fetal blood sampling. In families where a mutation of the RAG gene has been identified, or where the genetic link of the disease to the locus present on chromosome 10p has been established, an antenatal diagnosis can be made at 11 weeks of amenorrhea on trophoblast biopsy. Source: Orphanet.'
