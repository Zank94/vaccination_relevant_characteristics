id: 604
label: Risk of exposure to biological agents
description: This concerns in particular the health professions (doctors, pharmacists, nurses, midwives, dentists, etc.), either because of activities involving biological agents (industrial production of vaccines, medical analysis laboratories, virology research, etc.) or because of exposures generated by the professional activity without biological agents being the object (human or veterinary health care, agriculture, etc.)The risk of exposure to biological agents may be related to contact with patients, the bodies of deceased persons or biological products, either directly, including by spraying, or indirectly, in particular during the handling and transport of medical devices, biological samples, linen or waste from care activities involving infectious risks. The occupational physician assesses the risk of exposure individually according to the characteristics of the position occupied by the worker and prescribes the necessary vaccinations.
