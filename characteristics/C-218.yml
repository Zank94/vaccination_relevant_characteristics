label: Student caregiver
description: "As part of a care team, the caregiver assists the nurse in daily care activities. In collaboration with the nurse and under his/her responsibility, the caregiver provides patients with hygiene and comfort care: toileting, meals, bed making, reception, installation and transfer of patients... He/she transmits his/her observations in writing and verbally to ensure continuity of care. He/she participates in the realization of animations for people admitted in follow-up care and rehabilitation centers. The nursing assistant may be required to work at night, on weekends and on public holidays. The profession of nursing assistant is practiced in hospitals as well as in clinics."
