label: Biomedical analysis technician student
description: "The medical biology analysis technician is responsible for carrying out medical biology examinations that allow the physician to confirm a diagnosis or detect a disease. Based on medical prescriptions, he/she carries out the examinations: he/she looks for possible anomalies in the blood or in body fluids taken by the doctor, takes blood samples, prepares the instruments and products to be used. Once the examination has been performed, he or she sends the results to the biologist in charge, who is responsible for validating and interpreting them. They are also responsible for maintaining and checking the equipment.The job can be carried out in hospitals, clinics or in the city.In the hospital environment, this professional sometimes has to provide therapeutic follow-up in relation to the patients and the health care team and can intervene in very specialized examinations.When working in a private laboratory in the city, the medical biology analysis technician carries out various tasks: taking samples, taking readings and forwarding the results. He/she carries out a multi-purpose exercise that can cover several fields of medical biology: hematology, biochemistry, microbiology, immunology..."
