label: Periarteritis nodosa
description: Generalities. Periarteritis nodosa (PAN) is a disease caused by the inflammation of certain blood vessels. This inflammation impedes the flow of blood to the various organs, whose function may then be impaired. NAP affects all populations and all ages, including children, although it occurs more frequently between the ages of 40 and 60. The most frequently affected organs are the skin, kidneys, nervous system, muscles, digestive tract and heart. The most common signs are rapid weight loss, severe fatigue, muscle pain and fever.Treatment. The disease can be cured in about two out of three cases.
