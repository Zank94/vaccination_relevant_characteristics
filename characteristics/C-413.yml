label: Other immunosuppressive therapy
description: 'These may include treatments administered to patients with autoimmune diseases, organ or bone marrow transplants, or cancer (chemotherapy, radiotherapy). These treatments reduce the immune defenses and expose the patient to an increased risk of infections, which may justify certain vaccinations. Conversely, they may contraindicate other vaccinations (particularly with a live vaccine). It is therefore necessary to adapt the vaccination schedule. Do not hesitate to ask your doctor for advice if you think you may be concerned by this type of treatment. After stopping immunosuppressive treatment, the period of time to be respected for the administration of a live vaccine varies. Examples of immunosuppressive treatments (non-exhaustive list): corticosteroids, methotrexate, ciclosporin, tacrolimus, azathioprine or cyclophosphamide.'
