label: Student paramedic
description: "The ambulance driver carries out his activity within a private company of medical transport or a health establishment.he ensures, on medical prescription or in the event of medical emergency, the assumption of responsibility and the transport of patients, of wounded, in vehicles of medical transport adapted for reasons of care or diagnosis.this professional knows the state of urgency of his patients. This professional knows the emergency state of his patients. Indeed, he informs himself on the degree of gravity of the patients and their types of wounds near the structure for which he works: SAMU, hospital, Red Cross... He is with the service of the patients, takes care of their comfort, installs them during the way and can even intervene in the event of urgency to lavish the first aid. The ambulance driver must take care of the maintenance of his vehicle and the sterilization of the material. He can also assist the patient for the formalities of entry and exit of the patients."
